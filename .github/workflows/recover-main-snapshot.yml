name: Recover Main Snapshot

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'agent/recover-main-snapshot-20260722'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create repository snapshot
        run: tar --exclude=.git -czf /tmp/dkb-main-current.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: dkb-main-current
          path: /tmp/dkb-main-current.tar.gz
          retention-days: 1
