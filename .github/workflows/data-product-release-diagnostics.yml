name: Data Product Release Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Capture focused tests
        shell: bash
        run: |
          set +e
          python -m unittest -q tests.test_data_product_release \
            > "${RUNNER_TEMP}/release-tests.log" 2>&1
          echo $? > "${RUNNER_TEMP}/release-tests.exit"
          set -e
      - uses: actions/upload-artifact@v7
        with:
          name: data-product-release-diagnostics
          path: |
            ${{ runner.temp }}/release-tests.log
            ${{ runner.temp }}/release-tests.exit
          if-no-files-found: error
