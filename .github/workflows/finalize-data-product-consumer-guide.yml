name: Finalize Data Product Consumer Guide

on:
  push:
    branches:
      - feature/data-product-consumer-guide
    paths:
      - .github/workflows/finalize-data-product-consumer-guide.yml
      - tools/_finalize_data_product_consumer_guide.py

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: feature/data-product-consumer-guide
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply guide documentation and state
        run: python tools/_finalize_data_product_consumer_guide.py
      - name: Generate state summary
        run: python tools/project_state.py --apply
      - name: Run consumer guide checks
        run: python tests/data_product_consumer_guide_checks.py -q
      - name: Check canonical project state
        run: python tools/project_state.py --check
      - name: Remove temporary finalizer
        run: |
          git rm tools/_finalize_data_product_consumer_guide.py
          git rm .github/workflows/finalize-data-product-consumer-guide.yml
      - name: Commit finalized guide package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md CHANGELOG.md project/ROADMAP.md project/state.json project/STATE_SUMMARY.md
          git commit -m 'docs: finalize data product consumer guide'
          git push origin HEAD:feature/data-product-consumer-guide
