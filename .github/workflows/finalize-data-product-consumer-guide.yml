name: Finalize Data Product Consumer Guide

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-data-product-consumer-guide.yml
      - tools/_finalize_data_product_consumer_guide.py
      - project/guides/data-product-consumer-guide.md
      - tests/data_product_consumer_guide_checks.py

permissions:
  contents: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: feature/data-product-consumer-guide
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply guide documentation and state
        run: python tools/_finalize_data_product_consumer_guide.py
      - name: Generate state summary
        run: python tools/project_state.py --apply
      - name: Run consumer guide checks
        run: python tests/data_product_consumer_guide_checks.py -q
      - name: Check canonical project state
        run: python tools/project_state.py --check
      - name: Upload finalized guide files
        uses: actions/upload-artifact@v7
        with:
          name: finalized-data-product-consumer-guide
          path: |
            README.md
            CHANGELOG.md
            project/ROADMAP.md
            project/state.json
            project/STATE_SUMMARY.md
          if-no-files-found: error
          retention-days: 7
