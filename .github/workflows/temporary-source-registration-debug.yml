name: Temporary Source Registration Debug

on:
  push:
    branches:
      - agent/register-sandero-stepway-price-20260703

permissions:
  contents: read

jobs:
  failfast-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
      - name: Run fail-fast test discovery
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_*.py' -f -v > failfast-tests.log 2>&1
          status=$?
          tail -200 failfast-tests.log
          echo "$status" > failfast-status.txt
          exit 0
      - name: Upload diagnostic log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: temporary-source-registration-debug
          path: |
            failfast-tests.log
            failfast-status.txt
          if-no-files-found: error
          retention-days: 1
