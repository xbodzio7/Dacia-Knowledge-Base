name: Sandero Eco-G 120 Manual Reporting Finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'reporting/sandero-ecog120-manual'
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: reporting/sandero-ecog120-manual
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Materialize reporting contract and baseline
        run: |
          python - <<'PY'
          import csv
          import json
          from collections import Counter
          from pathlib import Path

          reporting = Path("data/reporting")
          source_spec = json.loads((reporting / "configuration_completeness.json").read_text(encoding="utf-8"))
          source_evidence = json.loads((reporting / "configuration_gap_evidence.json").read_text(encoding="utf-8"))
          with Path("data/master/configurations.csv").open(encoding="utf-8-sig", newline="") as handle:
              configurations = {row["code"]: row for row in csv.DictReader(handle)}

          expected_codes = {
              "sandero_iii_expression_ecog120_manual",
              "sandero_iii_journey_ecog120_manual",
              "sandero_stepway_iii_essential_ecog120_manual",
              "sandero_stepway_iii_expression_ecog120_manual",
              "sandero_stepway_iii_extreme_ecog120_manual",
          }
          selected = [
              item for item in source_spec["configurations"]
              if configurations[item["configuration_code"]]["transmission_type"] == "manual"
          ]
          selected_codes = {item["configuration_code"] for item in selected}
          assert selected_codes == expected_codes, selected_codes
          assert len(source_spec["technical_slots"]) == 45
          assert len(source_spec["equipment_attributes"]) == 69

          spec = {
              "version": source_spec["version"],
              "configuration_status": source_spec["configuration_status"],
              "configurations": selected,
              "technical_slots": source_spec["technical_slots"],
              "equipment_attributes": source_spec["equipment_attributes"],
              "not_applicable": source_spec["not_applicable"],
          }
          (reporting / "sandero_ecog120_manual_completeness.json").write_text(
              json.dumps(spec, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          decisions = [
              decision for decision in source_evidence["decisions"]
              if decision["configuration_code"] in selected_codes
          ]
          assert len(decisions) == 51
          assert Counter(item["classification"] for item in decisions) == Counter({"not_stated": 34, "out_of_scope": 17})
          assert Counter(item["domain"] for item in decisions) == Counter({"equipment": 47, "technical": 4})
          evidence = {key: value for key, value in source_evidence.items() if key != "decisions"}
          evidence["decisions"] = decisions
          (reporting / "sandero_ecog120_manual_gap_evidence.json").write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          state_path = Path("project/state.json")
          state = json.loads(state_path.read_text(encoding="utf-8"))
          state["baseline"]["tests"] = 579
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          replacements = 0
          for path in sorted(Path("tests").glob("test_*.py")):
              text = path.read_text(encoding="utf-8")
              updated = text.replace('baseline["tests"], 572', 'baseline["tests"], 579')
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
                  replacements += 1
          assert replacements >= 2, replacements
          PY
      - name: Synchronize generated documentation
        run: |
          python tools/dkb.py documentation-baseline --apply
          python tools/dkb.py project-state --apply
      - name: Generate reporting audit
        run: |
          mkdir -p "${RUNNER_TEMP}/sandero-ecog120-manual"
          python tools/dkb.py configuration-completeness \
            --spec data/reporting/sandero_ecog120_manual_completeness.json \
            --as-of 2026-06-26 \
            --json "${RUNNER_TEMP}/sandero-ecog120-manual/completeness.json"
          python tools/dkb.py source-coverage \
            --spec data/reporting/sandero_ecog120_manual_completeness.json \
            --as-of 2026-06-26 \
            --json "${RUNNER_TEMP}/sandero-ecog120-manual/source-coverage.json"
          python tools/dkb.py configuration-comparison \
            --completeness-spec data/reporting/sandero_ecog120_manual_completeness.json \
            --evidence-spec data/reporting/sandero_ecog120_manual_gap_evidence.json \
            --as-of 2026-06-26 \
            --json "${RUNNER_TEMP}/sandero-ecog120-manual/comparison.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temporary = Path(os.environ["RUNNER_TEMP"]) / "sandero-ecog120-manual"
          payload = {
              "completeness": json.loads((temporary / "completeness.json").read_text(encoding="utf-8")),
              "source_coverage": json.loads((temporary / "source-coverage.json").read_text(encoding="utf-8")),
              "comparison": json.loads((temporary / "comparison.json").read_text(encoding="utf-8")),
          }
          output = Path("project/audits/sandero-ecog120-manual-reporting.json")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo "Generated files are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md project/ROADMAP.md project/SESSION_STATE.md project/state.json project/STATE_SUMMARY.md \
            data/reporting/sandero_ecog120_manual_completeness.json \
            data/reporting/sandero_ecog120_manual_gap_evidence.json \
            project/audits/sandero-ecog120-manual-reporting.json \
            tests/test_jogger_payload_performance_ranges.py \
            tests/test_jogger_wltp_efficiency_ranges.py
          git commit -m "ci: finalize Sandero Eco-G 120 manual reporting"
          git push origin HEAD:reporting/sandero-ecog120-manual
