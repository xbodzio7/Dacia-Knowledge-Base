name: Configuration Comparison HTML Baseline Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'product/configuration-comparison-html'
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: product/configuration-comparison-html
          fetch-depth: 0
          persist-credentials: true
      - name: Update baseline assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = (
              Path("tests/test_jogger_payload_performance_ranges.py"),
              Path("tests/test_jogger_wltp_efficiency_ranges.py"),
          )
          for path in paths:
              text = path.read_text(encoding="utf-8")
              old = 'self.assertEqual(baseline["tests"], 586)'
              new = 'self.assertEqual(baseline["tests"], 593)'
              if old not in text and new not in text:
                  raise SystemExit(f"baseline assertion not found in {path}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")
          PY
      - name: Commit assertion updates
        run: |
          if git diff --quiet; then
            echo "No baseline assertion changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tests/test_jogger_payload_performance_ranges.py \
            tests/test_jogger_wltp_efficiency_ranges.py
          git commit -m "Synchronize reporting baseline assertions"
          git push origin HEAD:product/configuration-comparison-html
