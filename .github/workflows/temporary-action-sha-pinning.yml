name: Temporary Action SHA Pinning

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/temporary-action-sha-pinning.yml

permissions:
  contents: write

concurrency:
  group: temporary-action-sha-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pin-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: maintenance/github-actions-immutable-sha-pinning
          persist-credentials: false

      - name: Replace movable tags with verified commits
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "uses: actions/checkout@v7": (
                  "uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7"
              ),
              "uses: actions/setup-python@v6": (
                  "uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6"
              ),
              "uses: actions/setup-node@v6": (
                  "uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6"
              ),
              "uses: actions/upload-artifact@v7": (
                  "uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7"
              ),
              "uses: actions/download-artifact@v7": (
                  "uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7"
              ),
          }

          workflow_dir = Path(".github/workflows")
          paths = sorted((*workflow_dir.glob("*.yml"), *workflow_dir.glob("*.yaml")))
          counts = {source: 0 for source in replacements}
          changed = []

          for path in paths:
              original = path.read_text(encoding="utf-8")
              updated = original
              for source, target in replacements.items():
                  count = updated.count(source)
                  counts[source] += count
                  updated = updated.replace(source, target)
              if updated != original:
                  path.write_text(updated, encoding="utf-8", newline="\n")
                  changed.append(path.as_posix())

          missing = [source for source, count in counts.items() if count == 0]
          if missing:
              raise SystemExit(f"Expected movable references not found: {missing}")

          remaining = []
          for path in paths:
              text = path.read_text(encoding="utf-8")
              for source in replacements:
                  if source in text:
                      remaining.append(f"{path}: {source}")
          if remaining:
              raise SystemExit("Movable references remain:\n" + "\n".join(remaining))

          Path("pinned-workflow-manifest.json").write_text(
              __import__("json").dumps(
                  {
                      "changed_files": changed,
                      "replacement_counts": counts,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
              newline="\n",
          )
          print(Path("pinned-workflow-manifest.json").read_text(encoding="utf-8"))
          PY
          git diff --check

      - name: Create unreferenced candidate commit
        id: candidate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          python - <<'PY' > candidate-build.log 2>&1
          from __future__ import annotations

          import base64
          import json
          import os
          import subprocess
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          parent = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          base_tree = subprocess.check_output(
              ["git", "rev-parse", "HEAD^{tree}"], text=True
          ).strip()
          manifest = json.loads(
              Path("pinned-workflow-manifest.json").read_text(encoding="utf-8")
          )
          print(json.dumps({"repository": repository, "parent": parent, "base_tree": base_tree}))

          def post(endpoint: str, payload: dict[str, object]) -> dict[str, object]:
              result = subprocess.run(
                  ["gh", "api", "--method", "POST", endpoint, "--input", "-"],
                  input=json.dumps(payload),
                  text=True,
                  capture_output=True,
                  check=False,
              )
              print(json.dumps({"endpoint": endpoint, "returncode": result.returncode}))
              if result.stdout:
                  print(result.stdout)
              if result.stderr:
                  print(result.stderr)
              if result.returncode != 0:
                  raise SystemExit(result.returncode)
              return json.loads(result.stdout)

          entries: list[dict[str, object]] = []
          blobs: dict[str, str] = {}
          for relative in manifest["changed_files"]:
              path = Path(relative)
              blob = post(
                  f"repos/{repository}/git/blobs",
                  {
                      "content": base64.b64encode(path.read_bytes()).decode("ascii"),
                      "encoding": "base64",
                  },
              )
              sha = str(blob["sha"])
              blobs[relative] = sha
              entries.append(
                  {"path": relative, "mode": "100644", "type": "blob", "sha": sha}
              )

          entries.append(
              {"path": ".github/workflows/temporary-action-sha-pinning.yml", "sha": None}
          )
          tree = post(
              f"repos/{repository}/git/trees",
              {"base_tree": base_tree, "tree": entries},
          )
          commit = post(
              f"repos/{repository}/git/commits",
              {
                  "message": "Pin GitHub Actions to immutable SHAs",
                  "tree": tree["sha"],
                  "parents": [parent],
              },
          )
          Path("candidate-commit.json").write_text(
              json.dumps(
                  {
                      "commit_sha": commit["sha"],
                      "parent_sha": parent,
                      "tree_sha": tree["sha"],
                      "blobs": blobs,
                      **manifest,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY
          status=$?
          cat candidate-build.log
          exit ${status}

      - name: Upload candidate commit receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: immutable-sha-pinning-candidate
          path: |
            candidate-commit.json
            candidate-build.log
            pinned-workflow-manifest.json
          if-no-files-found: warn
          retention-days: 1
