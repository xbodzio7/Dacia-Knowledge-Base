name: Dispatch Authorized Data Product Release v1.0.0

on:
  push:
    branches:
      - release/data-products-v1.0.0-authorized

permissions:
  actions: write
  contents: read

jobs:
  dispatch-and-verify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TESTED_MAIN_SHA: 653ddacf9dcaeefa356f53e3c00e71666f5c5b3e
      RELEASE_VERSION: 1.0.0
    steps:
      - name: Require unchanged main
        shell: bash
        run: |
          actual="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          [[ "${actual}" == "${TESTED_MAIN_SHA}" ]] || {
            echo "main moved to ${actual}; refusing publication." >&2
            exit 1
          }

      - name: Dispatch audited publication workflow
        id: dispatch
        shell: bash
        run: |
          before="$(gh run list --workflow data-product-release.yml --event workflow_dispatch --branch main --limit 1 --json databaseId --jq '.[0].databaseId // 0')"
          gh workflow run data-product-release.yml --ref main -f version="${RELEASE_VERSION}"
          for attempt in $(seq 1 30); do
            run_id="$(gh run list --workflow data-product-release.yml --event workflow_dispatch --branch main --limit 1 --json databaseId,headSha --jq '.[0] | select(.databaseId != '"${before}"' and .headSha == "'"${TESTED_MAIN_SHA}"'") | .databaseId')"
            if [[ -n "${run_id}" ]]; then
              echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            sleep 2
          done
          echo "Unable to resolve dispatched workflow run." >&2
          exit 1

      - name: Wait for publication result
        shell: bash
        env:
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: gh run watch "${RUN_ID}" --exit-status

      - name: Record dispatch evidence
        shell: bash
        env:
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          gh run view "${RUN_ID}" --json databaseId,headSha,status,conclusion,url,workflowName,event > publication-dispatch-evidence.json
          cat publication-dispatch-evidence.json

      - name: Upload dispatch evidence
        uses: actions/upload-artifact@v7
        with:
          name: data-products-v1.0.0-dispatch-evidence
          path: publication-dispatch-evidence.json
          if-no-files-found: error
          retention-days: 90
