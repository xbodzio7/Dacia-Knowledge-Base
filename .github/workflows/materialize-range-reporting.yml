name: Materialize Range Reporting Integration

on:
  push:
    branches:
      - reporting/configuration-value-ranges

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out reporting branch
        uses: actions/checkout@v4
        with:
          ref: reporting/configuration-value-ranges
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PDF extraction backend
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils
      - name: Integrate ranges with reports
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def patch(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'patch anchor not found: {path}: {old[:120]!r}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Completeness: select the latest scalar or range observation.
          patch(
              'tools/_configuration_completeness_base.py',
              'from typing import Any, Iterable, Mapping, Sequence\n\n',
              'from typing import Any, Iterable, Mapping, Sequence\n\n'
              'from configuration_value_range_reporting import (\n'
              '    combine_latest_observations,\n'
              '    read_optional_ranges,\n'
              ')\n\n',
          )
          patch(
              'tools/_configuration_completeness_base.py',
              "    values = read_csv(master / 'configuration_attribute_values.csv')\n"
              "    availability = read_csv(master / 'configuration_attribute_availability.csv')\n",
              "    values = read_csv(master / 'configuration_attribute_values.csv')\n"
              "    ranges = read_optional_ranges(master, read_csv)\n"
              "    availability = read_csv(master / 'configuration_attribute_availability.csv')\n",
          )
          patch(
              'tools/_configuration_completeness_base.py',
              '            for row in values + availability\n',
              '            for row in values + ranges + availability\n',
          )
          patch(
              'tools/_configuration_completeness_base.py',
              "    scoped_values = [\n"
              "        row for row in values if row.get('configuration_code') in configuration_sources\n"
              "    ]\n"
              "    scoped_availability = [\n",
              "    scoped_values = [\n"
              "        row for row in values if row.get('configuration_code') in configuration_sources\n"
              "    ]\n"
              "    scoped_ranges = [\n"
              "        row for row in ranges if row.get('configuration_code') in configuration_sources\n"
              "    ]\n"
              "    scoped_availability = [\n",
          )
          patch(
              'tools/_configuration_completeness_base.py',
              "    current_values = latest(\n"
              "        scoped_values,\n"
              "        ('configuration_code', 'attribute_code', 'fuel_type_code'),\n"
              "        as_of,\n"
              "        'configuration values',\n"
              "    )\n",
              "    current_scalar_values = latest(\n"
              "        scoped_values,\n"
              "        ('configuration_code', 'attribute_code', 'fuel_type_code'),\n"
              "        as_of,\n"
              "        'configuration values',\n"
              "    )\n"
              "    current_range_values = latest(\n"
              "        scoped_ranges,\n"
              "        ('configuration_code', 'attribute_code', 'fuel_type_code'),\n"
              "        as_of,\n"
              "        'configuration value ranges',\n"
              "    )\n"
              "    current_values = combine_latest_observations(\n"
              "        current_scalar_values, current_range_values, CompletenessError\n"
              "    )\n",
          )

          # Source coverage: the combined current observation drives coverage.
          patch(
              'tools/_source_coverage_base.py',
              'from typing import Any, Iterable, Mapping, Sequence\n\n',
              'from typing import Any, Iterable, Mapping, Sequence\n\n'
              'from configuration_value_range_reporting import (\n'
              '    combine_latest_observations,\n'
              '    read_optional_ranges,\n'
              ')\n\n',
          )
          patch(
              'tools/_source_coverage_base.py',
              '    values = read_csv(master / "configuration_attribute_values.csv")\n'
              '    availability = read_csv(\n',
              '    values = read_csv(master / "configuration_attribute_values.csv")\n'
              '    ranges = read_optional_ranges(master, read_csv)\n'
              '    availability = read_csv(\n',
          )
          patch(
              'tools/_source_coverage_base.py',
              '            (values, "observation_date", "configuration value"),\n',
              '            (values, "observation_date", "configuration value"),\n'
              '            (ranges, "observation_date", "configuration value range"),\n',
          )
          patch(
              'tools/_source_coverage_base.py',
              '    scoped_values = [\n'
              '        row for row in values\n'
              '        if row.get("configuration_code") in scoped_configurations\n'
              '    ]\n'
              '    scoped_availability = [\n',
              '    scoped_values = [\n'
              '        row for row in values\n'
              '        if row.get("configuration_code") in scoped_configurations\n'
              '    ]\n'
              '    scoped_ranges = [\n'
              '        row for row in ranges\n'
              '        if row.get("configuration_code") in scoped_configurations\n'
              '    ]\n'
              '    scoped_availability = [\n',
          )
          patch(
              'tools/_source_coverage_base.py',
              '    current_values = latest_records(\n'
              '        scoped_values,\n'
              '        ("configuration_code", "attribute_code", "fuel_type_code"),\n'
              '        "observation_date",\n'
              '        as_of,\n'
              '        "configuration values",\n'
              '    )\n',
              '    current_scalar_values = latest_records(\n'
              '        scoped_values,\n'
              '        ("configuration_code", "attribute_code", "fuel_type_code"),\n'
              '        "observation_date",\n'
              '        as_of,\n'
              '        "configuration values",\n'
              '    )\n'
              '    current_range_values = latest_records(\n'
              '        scoped_ranges,\n'
              '        ("configuration_code", "attribute_code", "fuel_type_code"),\n'
              '        "observation_date",\n'
              '        as_of,\n'
              '        "configuration value ranges",\n'
              '    )\n'
              '    current_values = combine_latest_observations(\n'
              '        current_scalar_values, current_range_values, SourceCoverageError\n'
              '    )\n',
          )
          patch(
              'tools/_source_coverage_base.py',
              '        ("configuration_attribute_values", values),\n'
              '        ("configuration_attribute_availability", availability),\n',
              '        ("configuration_attribute_values", values),\n'
              '        ("configuration_attribute_value_ranges", ranges),\n'
              '        ("configuration_attribute_availability", availability),\n',
          )

          # Pairwise comparison: add range states and relations.
          patch(
              'tools/_configuration_comparison_base.py',
              'from typing import Any, Iterable, Mapping, Sequence\n\n',
              'from typing import Any, Iterable, Mapping, Sequence\n\n'
              'from configuration_value_range_reporting import (\n'
              '    combine_latest_observations,\n'
              '    range_relation,\n'
              '    read_optional_ranges,\n'
              ')\n\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '    values = read_csv(master / "configuration_attribute_values.csv")\n'
              '    availability = read_csv(\n',
              '    values = read_csv(master / "configuration_attribute_values.csv")\n'
              '    ranges = read_optional_ranges(master, read_csv)\n'
              '    availability = read_csv(\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '    scoped_values = [\n'
              '        row\n'
              '        for row in values\n'
              '        if row.get("configuration_code") in configuration_set\n'
              '    ]\n'
              '    scoped_availability = [\n',
              '    scoped_values = [\n'
              '        row\n'
              '        for row in values\n'
              '        if row.get("configuration_code") in configuration_set\n'
              '    ]\n'
              '    scoped_ranges = [\n'
              '        row\n'
              '        for row in ranges\n'
              '        if row.get("configuration_code") in configuration_set\n'
              '    ]\n'
              '    scoped_availability = [\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '    current_values = latest(\n'
              '        scoped_values,\n'
              '        (\n'
              '            "configuration_code",\n'
              '            "attribute_code",\n'
              '            "fuel_type_code",\n'
              '        ),\n'
              '        "observation_date",\n'
              '        as_of,\n'
              '        "configuration values",\n'
              '    )\n',
              '    current_scalar_values = latest(\n'
              '        scoped_values,\n'
              '        (\n'
              '            "configuration_code",\n'
              '            "attribute_code",\n'
              '            "fuel_type_code",\n'
              '        ),\n'
              '        "observation_date",\n'
              '        as_of,\n'
              '        "configuration values",\n'
              '    )\n'
              '    current_range_values = latest(\n'
              '        scoped_ranges,\n'
              '        (\n'
              '            "configuration_code",\n'
              '            "attribute_code",\n'
              '            "fuel_type_code",\n'
              '        ),\n'
              '        "observation_date",\n'
              '        as_of,\n'
              '        "configuration value ranges",\n'
              '    )\n'
              '    current_values = combine_latest_observations(\n'
              '        current_scalar_values, current_range_values, ComparisonError\n'
              '    )\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              'def evidence_state(decision: Mapping[str, Any]) -> dict[str, Any]:\n',
              'def recorded_range_state(\n'
              '    row: Mapping[str, str],\n'
              '    attribute: Mapping[str, str],\n'
              ') -> dict[str, Any]:\n'
              '    data_type = str(attribute.get("data_type", ""))\n'
              '    return {\n'
              '        "state": "recorded",\n'
              '        "minimum_value": normalize_value(str(row.get("minimum_value", "")), data_type),\n'
              '        "maximum_value": normalize_value(str(row.get("maximum_value", "")), data_type),\n'
              '        "lower_inclusive": str(row.get("lower_inclusive", "")) == "true",\n'
              '        "upper_inclusive": str(row.get("upper_inclusive", "")) == "true",\n'
              '        "data_type": data_type,\n'
              '        "unit": str(attribute.get("unit", "")),\n'
              '        "observation_date": str(row.get("observation_date", "")),\n'
              '        "source_code": str(row.get("source_code", "")),\n'
              '    }\n\n\n'
              'def technical_comparison_result(\n'
              '    left: Mapping[str, Any],\n'
              '    right: Mapping[str, Any],\n'
              ') -> tuple[str, str | None]:\n'
              '    if left.get("state") != "recorded" or right.get("state") != "recorded":\n'
              '        return "not_comparable", None\n'
              '    if "minimum_value" not in left and "minimum_value" not in right:\n'
              '        return comparison_result(left, right, comparable_key="normalized_value"), None\n'
              '    try:\n'
              '        relation = range_relation(left, right)\n'
              '    except ValueError as exc:\n'
              '        raise ComparisonError(str(exc)) from exc\n'
              '    return ("equal" if relation == "identical" else "different"), relation\n\n\n'
              'def evidence_state(decision: Mapping[str, Any]) -> dict[str, Any]:\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '            elif left_key in current_values:\n'
              '                left_state = recorded_technical_state(\n'
              '                    current_values[left_key],\n'
              '                    attribute,\n'
              '                )\n',
              '            elif left_key in current_values:\n'
              '                left_row = current_values[left_key]\n'
              '                left_state = (\n'
              '                    recorded_range_state(left_row, attribute)\n'
              '                    if left_row.get("_observation_kind") == "range"\n'
              '                    else recorded_technical_state(left_row, attribute)\n'
              '                )\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '            elif right_key in current_values:\n'
              '                right_state = recorded_technical_state(\n'
              '                    current_values[right_key],\n'
              '                    attribute,\n'
              '                )\n',
              '            elif right_key in current_values:\n'
              '                right_row = current_values[right_key]\n'
              '                right_state = (\n'
              '                    recorded_range_state(right_row, attribute)\n'
              '                    if right_row.get("_observation_kind") == "range"\n'
              '                    else recorded_technical_state(right_row, attribute)\n'
              '                )\n',
          )
          old_item = '''            technical_items.append(\n                {\n                    "attribute_code": attribute_code,\n                    "attribute_name": attribute["name"],\n                    "category": attribute["category"],\n                    "fuel_type_code": fuel,\n                    "unit": attribute["unit"],\n                    "left": left_state,\n                    "right": right_state,\n                    "comparison": comparison_result(\n                        left_state,\n                        right_state,\n                        comparable_key="normalized_value",\n                    ),\n                }\n            )\n'''
          new_item = '''            technical_comparison, relation = technical_comparison_result(\n                left_state, right_state\n            )\n            technical_item = {\n                "attribute_code": attribute_code,\n                "attribute_name": attribute["name"],\n                "category": attribute["category"],\n                "fuel_type_code": fuel,\n                "unit": attribute["unit"],\n                "left": left_state,\n                "right": right_state,\n                "comparison": technical_comparison,\n            }\n            if relation is not None:\n                technical_item["range_relation"] = relation\n            technical_items.append(technical_item)\n'''
          patch('tools/_configuration_comparison_base.py', old_item, new_item)
          patch(
              'tools/_configuration_comparison_base.py',
              'def difference_state_value(\n',
              'def range_state_value(state: Mapping[str, Any]) -> str:\n'
              '    lower = "[" if state.get("lower_inclusive") else "("\n'
              '    upper = "]" if state.get("upper_inclusive") else ")"\n'
              '    return (\n'
              '        f"{lower}{state.get(\'minimum_value\', \'\')},"\n'
              '        f"{state.get(\'maximum_value\', \'\')}{upper}"\n'
              '    )\n\n\n'
              'def difference_state_value(\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '    if domain == "technical":\n'
              '        return str(state.get("value", ""))\n',
              '    if domain == "technical":\n'
              '        if "minimum_value" in state:\n'
              '            return range_state_value(state)\n'
              '        return str(state.get("value", ""))\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '                    context = (\n'
              '                        f"fuel_type_code={fuel}"\n'
              '                        if fuel\n'
              '                        else "fuel_type_code="\n'
              '                    )\n',
              '                    context = (\n'
              '                        f"fuel_type_code={fuel}"\n'
              '                        if fuel\n'
              '                        else "fuel_type_code="\n'
              '                    )\n'
              '                    if item.get("range_relation"):\n'
              '                        context += (\n'
              '                            f";range_relation={item[\'range_relation\']}"\n'
              '                        )\n',
          )
          patch(
              'tools/_configuration_comparison_base.py',
              '    if domain == "technical":\n'
              '        value = str(state.get("value", ""))\n'
              '        unit = str(state.get("unit", ""))\n'
              '        return f"{value} {unit}".strip()\n',
              '    if domain == "technical":\n'
              '        value = (\n'
              '            range_state_value(state)\n'
              '            if "minimum_value" in state\n'
              '            else str(state.get("value", ""))\n'
              '        )\n'
              '        unit = str(state.get("unit", ""))\n'
              '        return f"{value} {unit}".strip()\n',
          )

          # Integration tests using existing compact fixtures.
          completeness_test = '''\n    def test_range_observations_satisfy_technical_slots(self) -> None:\n        with tempfile.TemporaryDirectory() as directory:\n            repository, spec = self.fixture(Path(directory))\n            master = repository / 'data' / 'master'\n            self.write_csv(\n                master / 'configuration_attribute_value_ranges.csv',\n                ['id', 'code', 'configuration_code', 'attribute_code',\n                 'fuel_type_code', 'minimum_value', 'maximum_value',\n                 'lower_inclusive', 'upper_inclusive', 'observation_date',\n                 'source_code', 'notes'],\n                [\n                    ['1', 'a_height', 'cfg_a', 'vehicle_height', '', '1600', '1650', 'true', 'true', '2026-06-01', 'src_a', ''],\n                    ['2', 'b_height', 'cfg_b', 'vehicle_height', '', '1640', '1700', 'true', 'true', '2026-06-01', 'src_b', ''],\n                ],\n            )\n            report = completeness.collect_report(repository, spec)\n        self.assertEqual(report['technical']['present'], 5)\n        self.assertEqual(report['technical']['missing'], 0)\n'''
          path = Path('tests/test_configuration_completeness.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('\n\nif __name__ == \'__main__\':', completeness_test + '\n\nif __name__ == \'__main__\':', 1)
          path.write_text(text, encoding='utf-8')

          coverage_test = '''\n    def test_range_observations_count_as_source_covered_technical_evidence(self) -> None:\n        with tempfile.TemporaryDirectory() as directory:\n            repository, spec = self.fixture(Path(directory))\n            master = repository / 'data' / 'master'\n            self.write_csv(\n                master / 'configuration_attribute_value_ranges.csv',\n                ['id', 'code', 'configuration_code', 'attribute_code',\n                 'fuel_type_code', 'minimum_value', 'maximum_value',\n                 'lower_inclusive', 'upper_inclusive', 'observation_date',\n                 'source_code', 'notes'],\n                [\n                    ['1', 'a_height', 'cfg_a', 'vehicle_height', '', '1600', '1650', 'true', 'true', '2026-06-01', 'src_a', ''],\n                    ['2', 'b_height', 'cfg_b', 'vehicle_height', '', '1640', '1700', 'true', 'true', '2026-06-01', 'src_b', ''],\n                ],\n            )\n            report = coverage.collect_report(repository, spec)\n        self.assertEqual(report['records']['technical']['present'], 4)\n        self.assertEqual(report['records']['technical']['missing'], 0)\n        self.assertEqual(len(report['gaps']), 2)\n'''
          path = Path('tests/test_source_coverage.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('\n\nif __name__ == \'__main__\':', coverage_test + '\n\nif __name__ == \'__main__\':', 1)
          path.write_text(text, encoding='utf-8')

          comparison_test = '''\n    def test_overlapping_ranges_preserve_relation_and_endpoints(self) -> None:\n        with tempfile.TemporaryDirectory() as directory:\n            repository, completeness, evidence = self.fixture(Path(directory))\n            master = repository / 'data' / 'master'\n            self.write_csv(\n                master / 'configuration_attribute_value_ranges.csv',\n                ['id', 'code', 'configuration_code', 'attribute_code',\n                 'fuel_type_code', 'minimum_value', 'maximum_value',\n                 'lower_inclusive', 'upper_inclusive', 'observation_date',\n                 'source_code', 'notes'],\n                [\n                    ['1', 'a_height', 'cfg_a', 'vehicle_height', '', '1600', '1650', 'true', 'true', '2026-06-01', 'src_a', ''],\n                    ['2', 'b_height', 'cfg_b', 'vehicle_height', '', '1640', '1700', 'true', 'true', '2026-06-01', 'src_b', ''],\n                ],\n            )\n            payload = json.loads(evidence.read_text(encoding='utf-8'))\n            payload['decisions'] = [\n                item for item in payload['decisions']\n                if item['attribute_code'] != 'vehicle_height'\n            ]\n            evidence.write_text(json.dumps(payload), encoding='utf-8')\n            report = comparison.collect_report(repository, completeness, evidence)\n            item = next(\n                item for item in report['pairs'][0]['technical']\n                if item['attribute_code'] == 'vehicle_height'\n            )\n            differences = comparison.render_difference_csv(report)\n        self.assertEqual(item['comparison'], 'different')\n        self.assertEqual(item['range_relation'], 'overlapping')\n        self.assertIn('[1600,1650]', differences)\n        self.assertIn('[1640,1700]', differences)\n        self.assertIn('range_relation=overlapping', differences)\n'''
          path = Path('tests/test_configuration_comparison.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('\n\nif __name__ == "__main__":', comparison_test + '\n\nif __name__ == "__main__":', 1)
          path.write_text(text, encoding='utf-8')

          state = json.loads(Path('project/state.json').read_text(encoding='utf-8'))
          state['reference_delivery'] = {
              'name': 'Configuration Value Range Storage and Import Architecture',
              'pull_request': 121,
              'head_sha': '98d99b570c09c5d2a180e81c53221ddd1f02e68c',
              'quality_run': 527,
          }
          state['baseline']['tests'] = 520
          state['current_package'] = {
              'name': 'Configuration Value Range Reporting Integration',
              'status': 'active',
              'goal': 'Count current ranges as technical evidence and preserve identical, overlapping and disjoint relation semantics in pairwise reports without importing source data.',
          }
          state['next_package'] = {
              'name': 'Jogger WLTP Efficiency Range Import Selection',
              'status': 'planned',
              'goal': 'Define the exact fuel-consumption and CO2 range denominator, configuration and fuel contexts, source text and first bounded import package.',
          }
          Path('project/state.json').write_text(json.dumps(state, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
          python tools/dkb.py project-state --apply
          python tools/dkb.py documentation-baseline --apply
      - name: Verify reporting integration
        id: verify
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q tools scripts tests
            python -m unittest discover -s tests -p 'test_*.py' -q
            python tools/dkb.py project-state --check
            python tools/dkb.py quality --concise --database "${RUNNER_TEMP}/dacia.sqlite"
          } > project/reviews/configuration-value-range-reporting-validation.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Finalize reporting package
        shell: bash
        run: |
          if [ "${{ steps.verify.outputs.status }}" = "0" ]; then
            rm -f project/reviews/configuration-value-range-reporting-validation.log
            python - <<'PY'
          from pathlib import Path
          path = Path('project/reviews/configuration-value-range-reporting-integration.md')
          text = path.read_text(encoding='utf-8').replace('`IMPLEMENTING`', '`IMPLEMENTED`', 1)
          text += '\n## Local validation\n\nThe package passed 520 tests, canonical-state verification and the complete local Quality gate before removing its temporary workflow.\n'
          path.write_text(text, encoding='utf-8')
          PY
          fi
          rm -f .github/workflows/materialize-range-reporting.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Materialize configuration value range reporting"
          git push origin HEAD:reporting/configuration-value-ranges
          if [ "${{ steps.verify.outputs.status }}" != "0" ]; then
            exit 1
          fi
