name: Jogger Hybrid 155 Reporting Discovery

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  discover:
    if: github.head_ref == 'reporting/jogger-hybrid155-automatic'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Discover exact reporting denominator
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          root = Path.cwd()
          selected = [
              "jogger_expression_5seat_hybrid155_automatic",
              "jogger_extreme_5seat_hybrid155_automatic",
              "jogger_journey_5seat_hybrid155_automatic",
              "jogger_expression_7seat_hybrid155_automatic",
              "jogger_extreme_7seat_hybrid155_automatic",
              "jogger_journey_7seat_hybrid155_automatic",
          ]
          selected_set = set(selected)

          def read_rows(path):
              with path.open(encoding="utf-8-sig", newline="") as handle:
                  return list(csv.DictReader(handle))

          scalar_rows = read_rows(root / "data/master/configuration_attribute_values.csv")
          range_rows = read_rows(root / "data/master/configuration_attribute_value_ranges.csv")

          scalar_by_configuration = {
              code: {
                  (row["attribute_code"], row["fuel_type_code"])
                  for row in scalar_rows
                  if row["configuration_code"] == code
              }
              for code in selected
          }
          range_by_configuration = {
              code: {
                  (row["attribute_code"], row["fuel_type_code"])
                  for row in range_rows
                  if row["configuration_code"] == code
              }
              for code in selected
          }

          scalar_sets = list(scalar_by_configuration.values())
          range_sets = list(range_by_configuration.values())
          assert all(items == scalar_sets[0] for items in scalar_sets), scalar_by_configuration
          assert all(items == range_sets[0] for items in range_sets), range_by_configuration
          assert len(scalar_sets[0]) == 23, scalar_sets[0]
          assert len(range_sets[0]) == 4, range_sets[0]
          assert not (scalar_sets[0] & range_sets[0])

          manual = json.loads(
              (root / "data/reporting/jogger_ecog120_manual_completeness.json").read_text(encoding="utf-8")
          )
          equipment = manual["equipment_attributes"]
          assert len(equipment) == 53

          scalar_slots = [
              {"attribute_code": attribute, "fuel_type_code": fuel}
              for attribute, fuel in sorted(scalar_sets[0])
          ]
          range_slots = [
              {"attribute_code": attribute, "fuel_type_code": fuel}
              for attribute, fuel in sorted(range_sets[0])
          ]
          technical_slots = sorted(
              scalar_slots + range_slots,
              key=lambda item: (item["attribute_code"], item["fuel_type_code"]),
          )
          assert len(technical_slots) == 27

          candidate = {
              "version": 1,
              "configuration_status": "active",
              "configurations": [
                  {
                      "configuration_code": code,
                      "source_code": "src_pl_jogger_price_my26_20260401",
                  }
                  for code in selected
              ],
              "technical_slots": technical_slots,
              "equipment_attributes": equipment,
              "not_applicable": {"technical": [], "equipment": []},
          }
          discovery = {
              "candidate_spec": candidate,
              "scalar_slots": scalar_slots,
              "range_slots": range_slots,
              "counts": {
                  "configurations": len(selected_set),
                  "scalar_slots": len(scalar_slots),
                  "range_slots": len(range_slots),
                  "technical_slots": len(technical_slots),
                  "equipment_attributes": len(equipment),
              },
          }
          output = Path("jogger-hybrid155-discovery.json")
          output.write_text(json.dumps(discovery, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(output.read_text(encoding="utf-8"))
          PY
      - name: Upload discovery artifact
        uses: actions/upload-artifact@v7
        with:
          name: jogger-hybrid155-reporting-discovery
          path: jogger-hybrid155-discovery.json
          if-no-files-found: error
          retention-days: 1
