name: Capture Local Data Product Workspace Index Base Tree

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/finalize-local-data-product-workspace-index.yml

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: feature/local-data-product-workspace-index
          fetch-depth: 1
          persist-credentials: false
      - name: Capture Git tree SHA
        run: git rev-parse 'HEAD^{tree}' > base-tree-sha.txt
      - name: Upload Git tree SHA
        uses: actions/upload-artifact@v7
        with:
          name: local-workspace-index-base-tree
          path: base-tree-sha.txt
          if-no-files-found: error
          retention-days: 1
