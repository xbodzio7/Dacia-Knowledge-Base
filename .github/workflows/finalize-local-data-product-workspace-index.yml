name: Finalize Local Data Product Workspace Index

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/_finalize_local_data_product_workspace_index.py
      - .github/workflows/finalize-local-data-product-workspace-index.yml
      - tests/__init__.py

permissions:
  contents: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: feature/local-data-product-workspace-index
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Preserve escaped newline in fixture anchor
        run: python -c "from pathlib import Path; path=Path('tools/_finalize_local_data_product_workspace_index.py'); text=path.read_text(encoding='utf-8'); old=\"    old_payload = '''        payload = self.root / \\\"payload\\\"\"; new=\"    old_payload = r'''        payload = self.root / \\\"payload\\\"\"; assert text.count(old)==1; path.write_text(text.replace(old,new),encoding='utf-8',newline='')"
      - name: Apply package integration and state
        run: python -c "import pathlib,subprocess,sys; result=subprocess.run([sys.executable,'tools/_finalize_local_data_product_workspace_index.py'],capture_output=True,text=True); output=result.stdout+result.stderr; pathlib.Path('finalizer-output.txt').write_text(output,encoding='utf-8'); print(output); raise SystemExit(result.returncode)"
      - name: Upload finalizer diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: local-workspace-index-finalizer-diagnostics
          path: finalizer-output.txt
          if-no-files-found: error
          retention-days: 7
      - name: Normalize shared fixture imports
        run: python -c "from pathlib import Path; paths=[Path('tests/test_data_product_release_download.py'),Path('tests/test_data_product_workspace_index.py')]; anchor='TOOLS = REPOSITORY / \"tools\"\nsys.path.insert(0, str(TOOLS))'; replacement='TOOLS = REPOSITORY / \"tools\"\nTESTS = REPOSITORY / \"tests\"\nsys.path.insert(0, str(TESTS))\nsys.path.insert(0, str(TOOLS))'; [(lambda text,path:(path.write_text(text.replace(anchor,replacement).replace('from tests.data_product_workspace_fixture import','from data_product_workspace_fixture import'),encoding='utf-8',newline='')))(path.read_text(encoding='utf-8'),path) for path in paths]"
      - name: Normalize path validation error type
        run: python -c "from pathlib import Path; path=Path('tools/reporting/data_product_workspace_index.py'); text=path.read_text(encoding='utf-8'); old='    record = _object(raw_record, label)\n    return safe_member_name(_string(record.get(\"path\"), f\"{label}.path\"))\n'; new='    record = _object(raw_record, label)\n    try:\n        return safe_member_name(\n            _string(record.get(\"path\"), f\"{label}.path\")\n        )\n    except ReleaseError as exc:\n        raise WorkspaceIndexError(str(exc)) from exc\n'; assert text.count(old)==1; path.write_text(text.replace(old,new),encoding='utf-8',newline='')"
      - name: Synchronize documentation counters
        run: python -c "import pathlib,subprocess,sys; result=subprocess.run([sys.executable,'tools/documentation_baseline.py','--apply'],capture_output=True,text=True); output=result.stdout+result.stderr; pathlib.Path('documentation-output.txt').write_text(output,encoding='utf-8'); print(output); raise SystemExit(result.returncode)"
      - name: Upload documentation diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: local-workspace-index-documentation-diagnostics
          path: documentation-output.txt
          if-no-files-found: error
          retention-days: 7
      - name: Compile changed Python sources
        run: python -m py_compile tools/reporting/data_product_workspace_index.py tools/reporting/data_product_release_download.py tools/data_product_release_download.py tests/__init__.py tests/data_product_workspace_fixture.py tests/test_data_product_workspace_index.py tests/test_data_product_release_download.py
      - name: Run focused regression tests
        run: python -c "import pathlib,subprocess,sys; result=subprocess.run([sys.executable,'-m','unittest','-v','tests.test_data_product_workspace_index','tests.test_data_product_release_download'],capture_output=True,text=True); output=result.stdout+result.stderr; pathlib.Path('focused-test-output.txt').write_text(output,encoding='utf-8'); print(output); raise SystemExit(result.returncode)"
      - name: Upload focused test diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: local-workspace-index-focused-test-diagnostics
          path: focused-test-output.txt
          if-no-files-found: error
          retention-days: 7
      - name: Verify canonical project state
        run: python tools/project_state.py --check
      - name: Upload finalized package files
        uses: actions/upload-artifact@v7
        with:
          name: finalized-local-data-product-workspace-index
          path: |
            .github/workflows/data-product-workspace-index.yml
            CHANGELOG.md
            README.md
            project/ROADMAP.md
            project/SESSION_STATE.md
            project/STATE_SUMMARY.md
            project/packages/local-data-product-workspace-index-html.md
            project/state.json
            tests/__init__.py
            tests/data_product_workspace_fixture.py
            tests/test_data_product_release_download.py
            tests/test_data_product_workspace_index.py
            tests/test_jogger_payload_performance_ranges.py
            tests/test_jogger_wltp_efficiency_ranges.py
            tools/data_product_release_download.py
            tools/reporting/data_product_release_download.py
            tools/reporting/data_product_workspace_index.py
          if-no-files-found: error
          retention-days: 7
