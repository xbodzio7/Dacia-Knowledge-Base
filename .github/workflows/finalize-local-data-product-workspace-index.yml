name: Finalize Local Data Product Workspace Index

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/_finalize_local_data_product_workspace_index.py
      - .github/workflows/finalize-local-data-product-workspace-index.yml

permissions:
  contents: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: feature/local-data-product-workspace-index
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply package integration and state
        run: python -c "import pathlib,subprocess,sys; result=subprocess.run([sys.executable,'tools/_finalize_local_data_product_workspace_index.py'],capture_output=True,text=True); output=result.stdout+result.stderr; pathlib.Path('finalizer-output.txt').write_text(output,encoding='utf-8'); print(output); raise SystemExit(result.returncode)"
      - name: Upload finalizer diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: local-workspace-index-finalizer-diagnostics
          path: finalizer-output.txt
          if-no-files-found: error
          retention-days: 7
      - name: Synchronize documentation counters
        run: python tools/documentation_baseline.py --apply
      - name: Compile changed Python sources
        run: python -m py_compile tools/reporting/data_product_workspace_index.py tools/reporting/data_product_release_download.py tools/data_product_release_download.py tests/data_product_workspace_fixture.py tests/test_data_product_workspace_index.py tests/test_data_product_release_download.py
      - name: Run focused regression tests
        run: python -m unittest -q tests.test_data_product_workspace_index tests.test_data_product_release_download
      - name: Verify canonical project state
        run: python tools/project_state.py --check
      - name: Upload finalized package files
        uses: actions/upload-artifact@v7
        with:
          name: finalized-local-data-product-workspace-index
          path: |
            .github/workflows/data-product-workspace-index.yml
            CHANGELOG.md
            README.md
            project/ROADMAP.md
            project/SESSION_STATE.md
            project/STATE_SUMMARY.md
            project/packages/local-data-product-workspace-index-html.md
            project/state.json
            tests/data_product_workspace_fixture.py
            tests/test_data_product_release_download.py
            tests/test_data_product_workspace_index.py
            tests/test_jogger_payload_performance_ranges.py
            tests/test_jogger_wltp_efficiency_ranges.py
            tools/data_product_release_download.py
            tools/reporting/data_product_release_download.py
            tools/reporting/data_product_workspace_index.py
          if-no-files-found: error
          retention-days: 7
