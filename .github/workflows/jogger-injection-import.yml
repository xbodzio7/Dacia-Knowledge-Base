name: Jogger Injection Import

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: jogger-injection-import
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-injection-type-import
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDF extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi

      - name: Materialize exact injection observations
        shell: bash
        run: |
          set -euo pipefail
          python tools/import_configuration_values.py \
            --spec data/imports/configuration_values/jogger-page6-injection-type-20260401.json \
            --apply
          python - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          readme_path = root / "README.md"
          readme = readme_path.read_text(encoding="utf-8")
          old = (
              "pomiary bagażnika, para pojemności LPG i pozostałe niezgodne semantycznie pola\n"
              "pozostają jawnym zakresem odroczonym.\n"
          )
          new = (
              "pomiary bagażnika, para pojemności LPG i pozostałe niezgodne semantycznie pola\n"
              "pozostają jawnym zakresem odroczonym. Dodatkowy kontrolowany import obejmuje\n"
              "32 dokładne wartości `injection_type`: osobne układy benzyny i LPG dla Eco-G\n"
              "oraz źródłowe wartości TCe 110 i Hybrid 155.\n"
          )
          if old not in readme:
              raise SystemExit("README Jogger boundary marker not found")
          readme_path.write_text(readme.replace(old, new, 1), encoding="utf-8", newline="\n")

          changelog_path = root / "CHANGELOG.md"
          changelog = changelog_path.read_text(encoding="utf-8")
          bullet = (
              "* Thirty-two exact Jogger injection-type observations with explicit petrol/LPG "
              "contexts and controlled existing-enum mappings.\n"
          )
          marker = "### Added\n\n"
          if bullet not in changelog:
              changelog = changelog.replace(marker, marker + bullet, 1)
          changelog_path.write_text(changelog, encoding="utf-8", newline="\n")
          PY
          python tools/dkb.py documentation-baseline --apply
          python tools/dkb.py project-state --apply

      - name: Verify complete package
        shell: bash
        run: |
          set -euo pipefail
          python tools/import_configuration_values.py \
            --spec data/imports/configuration_values/jogger-page6-injection-type-20260401.json \
            --verify
          python -m compileall -q tools scripts tests
          python -m unittest discover -s tests -p "test_*.py" -q
          python -m unittest -q \
            tests.project_state_contract \
            tests.autonomy_policy_contract \
            tests.quality_artifact_manifest_contract \
            tests.configuration_comparison_context_filter_contract \
            tests.configuration_comparison_pair_summary_contract
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python tools/dkb.py quality \
            --concise \
            --database "${RUNNER_TEMP}/dacia_knowledge_base.sqlite" \
            --log-file "${RUNNER_TEMP}/quality.log" \
            --summary-json "${RUNNER_TEMP}/quality-summary.json"

      - name: Commit final package
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/jogger-injection-import.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "data: import Jogger injection types"
          git push origin HEAD:data/jogger-injection-type-import
