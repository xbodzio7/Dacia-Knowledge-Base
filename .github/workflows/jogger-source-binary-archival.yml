name: Jogger Source Binary Archival

on:
  push:
    branches:
      - source/jogger-my26-binary-archival
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  archive-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out archival branch
        uses: actions/checkout@v7
        with:
          ref: source/jogger-my26-binary-archival
          persist-credentials: false

      - name: Download immutable official candidates
        shell: bash
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/jogger-candidates"
          mkdir -p "$output"
          candidates=(
            "89aced76f5"
            "7e010fc863"
          )
          for asset in "${candidates[@]}"; do
            url="https://cdn.group.renault.com/dac/pl/pdf/cenniki/jogger-price.pdf.asset.pdf/${asset}.pdf"
            curl --fail --location --retry 3 --retry-all-errors \
              --connect-timeout 20 --max-time 180 \
              --user-agent "Dacia-Knowledge-Base source verification" \
              "$url" --output "${output}/${asset}.pdf"
          done
          (
            cd "$output"
            sha256sum *.pdf > candidate-hashes.txt
            stat --format='%n %s' *.pdf > candidate-sizes.txt
          )
          cat "${output}/candidate-hashes.txt"
          cat "${output}/candidate-sizes.txt"

      - name: Upload exact CDN candidate bytes
        uses: actions/upload-artifact@v6
        with:
          name: jogger-official-cdn-candidates
          path: ${{ runner.temp }}/jogger-candidates
          if-no-files-found: error
          retention-days: 1
