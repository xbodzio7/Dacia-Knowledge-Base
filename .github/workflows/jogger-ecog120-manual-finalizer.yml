name: Jogger Eco-G 120 Manual Finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'reporting/jogger-ecog120-manual'
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: reporting/jogger-ecog120-manual
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Synchronize documentation baseline
        run: python tools/dkb.py documentation-baseline --apply
      - name: Generate reporting audit
        run: |
          mkdir -p "${RUNNER_TEMP}/jogger-manual"
          python tools/dkb.py configuration-completeness \
            --spec data/reporting/jogger_ecog120_manual_completeness.json \
            --as-of 2026-04-01 \
            --json "${RUNNER_TEMP}/jogger-manual/completeness.json"
          python tools/dkb.py source-coverage \
            --spec data/reporting/jogger_ecog120_manual_completeness.json \
            --as-of 2026-04-01 \
            --json "${RUNNER_TEMP}/jogger-manual/source-coverage.json"
          python tools/dkb.py configuration-comparison \
            --completeness-spec data/reporting/jogger_ecog120_manual_completeness.json \
            --evidence-spec data/reporting/jogger_ecog120_manual_gap_evidence.spec \
            --as-of 2026-04-01 \
            --json "${RUNNER_TEMP}/jogger-manual/comparison.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temporary = Path(os.environ["RUNNER_TEMP"]) / "jogger-manual"
          payload = {
              "completeness": json.loads((temporary / "completeness.json").read_text(encoding="utf-8")),
              "source_coverage": json.loads((temporary / "source-coverage.json").read_text(encoding="utf-8")),
              "comparison": json.loads((temporary / "comparison.json").read_text(encoding="utf-8")),
          }
          output = Path("project/audits/jogger-ecog120-manual-reporting.json")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo "Generated files are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md project/ROADMAP.md project/SESSION_STATE.md project/audits/jogger-ecog120-manual-reporting.json
          git commit -m "ci: finalize Jogger Eco-G 120 manual reporting"
          git push origin HEAD:reporting/jogger-ecog120-manual
