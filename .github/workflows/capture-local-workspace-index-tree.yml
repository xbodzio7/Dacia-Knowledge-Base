name: Capture Current Local Workspace Index Tree

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/capture-local-workspace-index-tree.yml

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: feature/local-data-product-workspace-index
          fetch-depth: 1
          persist-credentials: false
      - name: Capture current tree
        run: git rev-parse 'HEAD^{tree}' > current-tree-sha.txt
      - name: Upload current tree
        uses: actions/upload-artifact@v7
        with:
          name: local-workspace-index-current-tree
          path: current-tree-sha.txt
          if-no-files-found: error
          retention-days: 1
