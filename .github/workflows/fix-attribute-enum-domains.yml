name: Fix Attribute Enum Domain Contracts

on:
  push:
    branches:
      - architecture/attribute-enum-domains

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: architecture/attribute-enum-domains
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PDF extraction backend
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils
      - name: Repair focused regression contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def patch(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'patch anchor not found: {path}: {old[:80]!r}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          patch(
              'tools/documentation_baseline.py',
              'from validators.statuses import configured_status_rules\n',
              'from validators.statuses import STATUS_RULES, configured_status_rules\n',
          )
          patch(
              'tools/documentation_baseline.py',
              '    statistics = collect_statistics(repository)\n'
              '    configured_rules, status_rule_errors = configured_status_rules(repository)\n'
              '    if status_rule_errors:\n'
              '        raise BaselineError(\n'
              '            "cannot resolve status rules: " + "; ".join(status_rule_errors)\n'
              '        )\n'
              '    master = repository / "data" / "master"\n',
              '    statistics = collect_statistics(repository)\n'
              '    registry = repository / "data/master/attribute_enum_domains.csv"\n'
              '    if registry.is_file():\n'
              '        configured_rules, status_rule_errors = configured_status_rules(repository)\n'
              '        if status_rule_errors:\n'
              '            raise BaselineError(\n'
              '                "cannot resolve status rules: " + "; ".join(status_rule_errors)\n'
              '            )\n'
              '    else:\n'
              '        configured_rules = STATUS_RULES\n'
              '    master = repository / "data" / "master"\n',
          )

          patch(
              'tests/test_duster_technical_specifications.py',
              '        self.assertEqual(len(self.all_values), 1198)\n'
              '        self.assertEqual(len(list(SPECS.glob("*.json"))), 70)\n',
              '        self.assertEqual(len(self.all_values), 1204)\n'
              '        self.assertEqual(len(list(SPECS.glob("*.json"))), 71)\n',
          )

          patch(
              'tests/test_jogger_technical_specifications.py',
              '                "jogger-page6-hybrid-system-power-total-20260401.json",\n'
              '            }\n',
              '                "jogger-page6-hybrid-system-power-total-20260401.json",\n'
              '                "jogger-page6-hybrid-battery-chemistry-20260401.json",\n'
              '            }\n',
          )

          patch(
              'tests/test_jogger_total_hybrid_system_power.py',
              '    def test_battery_chemistry_and_unspecified_capacity_remain_excluded(self) -> None:\n'
              '        excluded = [\n'
              '            row\n'
              '            for row in self.all_values\n'
              '            if row["configuration_code"] in self.hybrid_configurations\n'
              '            and row["source_code"] == SOURCE_CODE\n'
              '            and row["attribute_code"] in {\n'
              '                "hybrid_battery_type",\n'
              '                "hybrid_battery_capacity",\n'
              '            }\n'
              '        ]\n'
              '        self.assertFalse(excluded)\n',
              '    def test_unspecified_capacity_remains_excluded_after_chemistry_import(self) -> None:\n'
              '        excluded = [\n'
              '            row\n'
              '            for row in self.all_values\n'
              '            if row["configuration_code"] in self.hybrid_configurations\n'
              '            and row["source_code"] == SOURCE_CODE\n'
              '            and row["attribute_code"] == "hybrid_battery_capacity"\n'
              '        ]\n'
              '        self.assertFalse(excluded)\n',
          )
          PY
      - name: Verify repaired package
        id: verify
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q tools scripts tests
            python -m unittest discover -s tests -p 'test_*.py' -q
            python tools/dkb.py project-state --check
            python tools/dkb.py quality --concise --database "${RUNNER_TEMP}/dacia.sqlite"
          } > project/reviews/attribute-enum-domain-validation.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Finalize fix
        shell: bash
        run: |
          if [ "${{ steps.verify.outputs.status }}" = "0" ]; then
            rm -f project/reviews/attribute-enum-domain-validation.log
            python - <<'PY'
          from pathlib import Path
          path = Path('project/reviews/attribute-enum-domain-registry-and-jogger-battery-chemistry.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('`IMPLEMENTING`', '`IMPLEMENTED`', 1)
          if '## Local validation' not in text:
              text += '\n## Local validation\n\nThe repaired package passed 502 tests, canonical-state verification and the complete local Quality gate before removing its temporary workflow.\n'
          path.write_text(text, encoding='utf-8')
          PY
          fi
          rm -f .github/workflows/fix-attribute-enum-domains.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Repair enum-domain regression contracts"
          git push origin HEAD:architecture/attribute-enum-domains
          if [ "${{ steps.verify.outputs.status }}" != "0" ]; then
            exit 1
          fi
