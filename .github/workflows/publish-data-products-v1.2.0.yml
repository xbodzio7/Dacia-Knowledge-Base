name: Publish data products v1.2.0

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: publish-data-products-v1.2.0
  cancel-in-progress: false

jobs:
  publish:
    if: github.head_ref == 'release/data-products-v1.2.0-authorized'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: data-products-v1.2.0
      RELEASE_VERSION: 1.2.0
      RELEASE_COMMIT: 2982ff68b8e1f3097403d96afd1754ae473c2aa3
      ARCHIVE_SHA256: c4df387640451d4a9af0d1555d09b13901192064fbd4166c3ef371bf17dde3d8
      MANIFEST_SHA256: f7c36480b36f6f57097dd747607116ddb7c71f840f3521cb8066548dc5cd474e
      CHECKSUMS_SHA256: 095d2cdb88a3506260f13e3c3d9e8a3314f8ed0423888dd1e66be6587e45c3ba
    steps:
      - name: Check out exact green main commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: 2982ff68b8e1f3097403d96afd1754ae473c2aa3
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Confirm exact source identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          git diff --quiet
          git diff --cached --quiet

      - name: Build and independently verify release assets
        shell: bash
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/data-products-v1.2.0"
          python tools/dkb.py data-product-release \
            --version "$RELEASE_VERSION" \
            --commit-sha "$RELEASE_COMMIT" \
            --output-directory "$output"
          python tools/dkb.py data-product-release \
            --verify \
            --version "$RELEASE_VERSION" \
            --commit-sha "$RELEASE_COMMIT" \
            --output-directory "$output"
          test "$(sha256sum "$output/dacia-knowledge-base-data-products-v1.2.0.zip" | awk '{print $1}')" = "$ARCHIVE_SHA256"
          test "$(sha256sum "$output/data-product-release-manifest.json" | awk '{print $1}')" = "$MANIFEST_SHA256"
          test "$(sha256sum "$output/SHA256SUMS" | awk '{print $1}')" = "$CHECKSUMS_SHA256"
          test "$(stat -c %s "$output/dacia-knowledge-base-data-products-v1.2.0.zip")" -eq 45178017
          test "$(stat -c %s "$output/data-product-release-manifest.json")" -eq 18215
          test "$(stat -c %s "$output/SHA256SUMS")" -eq 213

      - name: Confirm immutable identity is unused
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Publish final GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/data-products-v1.2.0"
          cat > "$RUNNER_TEMP/release-notes.md" <<'EOF'
          # Dacia Knowledge Base Data Products v1.2.0

          Buyer-facing HTML interface release:

          - dynamically hides equipment unavailable in the currently compatible configurations;
          - prevents an incompatible equipment click from collapsing the result set to zero;
          - compares any number of explicitly selected configurations directly in the offline page;
          - shows catalogue and configured prices plus standard/package/option status;
          - removes the technical exclusion audit and generic search field from the primary interface;
          - expands equipment to the full page width;
          - adds deterministic offline SVG model illustrations to model choices, results and comparison headers.

          The exact release HTML was exercised in Chromium with Jogger faceting, one equipment selection and a three-configuration comparison. All 15 source Pull Request workflows passed, including 700 tests and Quality run 1188.
          EOF
          sed -i 's/^          //' "$RUNNER_TEMP/release-notes.md"
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_COMMIT" \
            --title "$RELEASE_TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            "$output/dacia-knowledge-base-data-products-v1.2.0.zip" \
            "$output/data-product-release-manifest.json" \
            "$output/SHA256SUMS"

      - name: Verify published tag and assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_COMMIT"
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName,targetCommitish,assets > "$RUNNER_TEMP/release.json"
          python - "$RUNNER_TEMP/release.json" <<'PY'
          import json, sys
          payload = json.load(open(sys.argv[1], encoding='utf-8'))
          assert payload['tagName'] == 'data-products-v1.2.0'
          assert payload['isDraft'] is False
          assert payload['isPrerelease'] is False
          names = sorted(asset['name'] for asset in payload['assets'])
          assert names == ['SHA256SUMS', 'dacia-knowledge-base-data-products-v1.2.0.zip', 'data-product-release-manifest.json']
          PY
