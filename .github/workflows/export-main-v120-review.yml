name: Export current main v1.2 review

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'transport/export-main-v120-review'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: 8aaf18fa48f6ef606411af8616a58573b924e44a
          fetch-depth: 0
      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output="$RUNNER_TEMP/dkb-main-8aaf18fa.tar.gz" HEAD
      - name: Upload source archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dkb-main-8aaf18fa
          path: ${{ runner.temp }}/dkb-main-8aaf18fa.tar.gz
          if-no-files-found: error
          retention-days: 1
