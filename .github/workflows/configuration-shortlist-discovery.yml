name: Configuration Shortlist Discovery

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  discover:
    if: github.head_ref == 'review/configuration-discovery-shortlist-planning'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Audit shortlist criteria
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import json
          from collections import Counter, defaultdict
          from decimal import Decimal
          from pathlib import Path

          root = Path("data/master")

          def rows(name: str) -> list[dict[str, str]]:
              with (root / name).open(encoding="utf-8-sig", newline="") as handle:
                  return list(csv.DictReader(handle))

          def latest(records, key_fields, date_field):
              selected = {}
              for row in records:
                  key = tuple(row[field] for field in key_fields)
                  current = selected.get(key)
                  if current is None or row[date_field] > current[date_field]:
                      selected[key] = row
              return selected

          models = {row["code"]: row for row in rows("models.csv")}
          versions = {row["code"]: row for row in rows("versions.csv")}
          configurations = [
              row for row in rows("configurations.csv") if row["status"] == "active"
          ]
          codes = {row["code"] for row in configurations}

          prices = latest(
              [row for row in rows("configuration_prices.csv") if row["configuration_code"] in codes],
              ("configuration_code", "market", "price_type", "currency_code"),
              "price_date",
          )
          values = latest(
              [row for row in rows("configuration_attribute_values.csv") if row["configuration_code"] in codes],
              ("configuration_code", "attribute_code", "fuel_type_code"),
              "observation_date",
          )
          availability = latest(
              [row for row in rows("configuration_attribute_availability.csv") if row["configuration_code"] in codes],
              ("configuration_code", "attribute_code"),
              "observation_date",
          )

          enriched = []
          for configuration in configurations:
              version = versions[configuration["version_code"]]
              model = models[version["model_code"]]
              price = prices.get((configuration["code"], "PL", "catalog_gross", "PLN"))
              seats = values.get((configuration["code"], "number_of_seats", ""))
              enriched.append(
                  {
                      "configuration_code": configuration["code"],
                      "model_code": model["code"],
                      "model_name": model["name"],
                      "version_code": version["code"],
                      "version_name": version["name"],
                      "powertrain_label": configuration["powertrain_label"],
                      "transmission_type": configuration["transmission_type"],
                      "price": price["amount"] if price else None,
                      "price_date": price["price_date"] if price else None,
                      "seats": seats["value"] if seats else None,
                  }
              )

          equipment_by_attribute = defaultdict(dict)
          for (configuration_code, attribute_code), row in availability.items():
              equipment_by_attribute[attribute_code][configuration_code] = row["availability_status"]

          full_coverage = []
          partial_coverage = []
          discriminating = []
          for attribute_code, states in sorted(equipment_by_attribute.items()):
              counts = Counter(states.values())
              item = {
                  "attribute_code": attribute_code,
                  "recorded_configurations": len(states),
                  "missing_configurations": len(codes - set(states)),
                  "states": dict(sorted(counts.items())),
              }
              if len(states) == len(codes):
                  full_coverage.append(item)
              else:
                  partial_coverage.append(item)
              available = counts["standard"] + counts["optional"]
              unavailable = counts["not_available"]
              if available and unavailable:
                  discriminating.append(item)

          numeric_prices = [Decimal(item["price"]) for item in enriched if item["price"] is not None]
          report = {
              "active_configurations": len(enriched),
              "models": dict(sorted(Counter(item["model_code"] for item in enriched).items())),
              "transmissions": dict(sorted(Counter(item["transmission_type"] for item in enriched).items())),
              "powertrains": dict(sorted(Counter(item["powertrain_label"] for item in enriched).items())),
              "seat_counts": dict(sorted(Counter(item["seats"] or "missing" for item in enriched).items())),
              "criterion_coverage": {
                  "model": sum(bool(item["model_code"]) for item in enriched),
                  "version": sum(bool(item["version_code"]) for item in enriched),
                  "powertrain": sum(bool(item["powertrain_label"]) for item in enriched),
                  "transmission": sum(bool(item["transmission_type"]) for item in enriched),
                  "catalog_price_pln": sum(item["price"] is not None for item in enriched),
                  "number_of_seats": sum(item["seats"] is not None for item in enriched),
              },
              "price_range_pln": {
                  "minimum": str(min(numeric_prices)),
                  "maximum": str(max(numeric_prices)),
                  "distinct_dates": sorted({item["price_date"] for item in enriched if item["price_date"]}),
              },
              "equipment": {
                  "attributes_with_any_record": len(equipment_by_attribute),
                  "attributes_with_full_coverage": len(full_coverage),
                  "attributes_with_partial_coverage": len(partial_coverage),
                  "discriminating_attributes": len(discriminating),
                  "top_discriminating": sorted(
                      discriminating,
                      key=lambda item: (
                          -min(
                              item["states"].get("standard", 0) + item["states"].get("optional", 0),
                              item["states"].get("not_available", 0),
                          ),
                          item["attribute_code"],
                      ),
                  )[:30],
              },
              "candidate_output_columns": [
                  "configuration_code",
                  "model_code",
                  "model_name",
                  "version_code",
                  "version_name",
                  "powertrain_label",
                  "transmission_type",
                  "number_of_seats",
                  "catalog_price_pln",
                  "price_date",
                  "matching_equipment",
                  "missing_criteria",
              ],
              "recommended_semantics": {
                  "required_equipment": "standard_or_optional",
                  "standard_equipment": "standard_only",
                  "missing_equipment_statement": "does_not_match_and_is_reported",
                  "price": "latest_catalog_gross_PLN_as_of",
                  "ordering": "price_then_model_version_configuration_code",
              },
          }
          output = Path("configuration-shortlist-discovery.json")
          output.write_text(json.dumps(report, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(output.read_text(encoding="utf-8"))
          PY
      - name: Upload discovery artifact
        uses: actions/upload-artifact@v7
        with:
          name: configuration-shortlist-discovery
          path: configuration-shortlist-discovery.json
          if-no-files-found: error
          retention-days: 1
