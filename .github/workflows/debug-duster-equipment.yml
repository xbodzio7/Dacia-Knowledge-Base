name: Snapshot Duster equipment branch

on:
  pull_request:

jobs:
  snapshot:
    if: github.head_ref == 'dev/duster-equipment-materialize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: data/duster-equipment-availability-import
      - name: Create source snapshot
        shell: bash
        run: |
          zip -qr duster-equipment-source.zip . -x '.git/*'
      - name: Upload source snapshot
        uses: actions/upload-artifact@v7
        with:
          name: duster-equipment-source-snapshot
          path: duster-equipment-source.zip
          if-no-files-found: error
          retention-days: 1
