name: Debug Duster equipment materializer

on:
  pull_request:

jobs:
  debug:
    if: github.head_ref == 'dev/duster-equipment-materialize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev/duster-equipment-materialize
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Capture importer output
        shell: bash
        run: |
          set +e
          python tools/import_duster_equipment_availability.py --apply > materializer.log 2>&1
          status=$?
          cat materializer.log
          echo "$status" > materializer.status
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: duster-equipment-materializer-debug
          path: |
            materializer.log
            materializer.status
          if-no-files-found: error
          retention-days: 1
