name: Debug Duster equipment tests

on:
  pull_request:

jobs:
  debug:
    if: github.head_ref == 'dev/duster-equipment-materialize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: data/duster-equipment-availability-import
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Capture full unit-test output
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_*.py' -q > unit-tests.log 2>&1
          status=$?
          cat unit-tests.log
          echo "$status" > unit-tests.status
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: duster-equipment-unit-test-debug
          path: |
            unit-tests.log
            unit-tests.status
          if-no-files-found: error
          retention-days: 1
