name: Jogger Page 6 Review Extract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: jogger-page6-review-extract
  cancel-in-progress: true

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v7
        with:
          ref: review/jogger-range-qualifier-modeling
          fetch-depth: 0

      - name: Install PDF extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi

      - name: Extract exact page 6 text
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p project/reviews
          pdftotext -f 6 -l 6 -layout \
            "PDF/Cenniki/DACIA JOGGER cennik MY26 20260401.pdf" \
            project/reviews/jogger-page6-source-extract.txt
          test -s project/reviews/jogger-page6-source-extract.txt
          grep -q "SILNIKI" project/reviews/jogger-page6-source-extract.txt

      - name: Commit extract and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/jogger-page6-review-extract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "review: capture Jogger page 6 source text"
          git push origin HEAD:review/jogger-range-qualifier-modeling
