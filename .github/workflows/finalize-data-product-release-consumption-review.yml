name: Finalize Data Product Release Consumption Review

on:
  push:
    branches:
      - review/data-product-release-consumption
    paths:
      - tools/_finalize_data_product_release_consumption_review.py
      - .github/workflows/finalize-data-product-release-consumption-review.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: review/data-product-release-consumption
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply canonical state
        run: python tools/_finalize_data_product_release_consumption_review.py
      - name: Verify canonical state
        run: python tools/project_state.py --check
      - name: Remove temporary finalizer
        run: |
          git rm tools/_finalize_data_product_release_consumption_review.py
          git rm .github/workflows/finalize-data-product-release-consumption-review.yml
      - name: Commit finalized review
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add project/state.json project/STATE_SUMMARY.md
          git commit -m 'project: finalize data product release consumption review'
          git push origin HEAD:review/data-product-release-consumption
