name: Jogger Hybrid Semantics Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: jogger-hybrid-semantics-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v7
        with:
          ref: review/jogger-hybrid-system-semantics
          fetch-depth: 0

      - name: Capture exact repository contracts
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Enum files"
            find data/master/enums -maxdepth 1 -type f -printf '%f\n' | sort
            echo
            echo "# Hybrid battery type references"
            grep -RIn --exclude='jogger-hybrid-semantics-audit.txt' \
              -E 'hybrid_battery_type|lithium[-_ ]?ion|li[-_ ]?ion' \
              data tests project tools || true
            echo
            echo "# Hybrid system power references"
            grep -RIn --exclude='jogger-hybrid-semantics-audit.txt' \
              -E 'hybrid_system_power|system_power|total.*power|power.*total' \
              data tests project tools || true
          } > project/reviews/jogger-hybrid-semantics-audit.txt
          test -s project/reviews/jogger-hybrid-semantics-audit.txt

      - name: Commit audit and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/jogger-hybrid-semantics-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "review: capture Jogger hybrid semantic contracts"
          git push origin HEAD:review/jogger-hybrid-system-semantics
