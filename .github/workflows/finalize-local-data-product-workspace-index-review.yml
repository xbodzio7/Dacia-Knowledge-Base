name: Finalize Local Data Product Workspace Index Review

on:
  push:
    branches:
      - review/local-data-product-workspace-index
    paths:
      - tools/_finalize_local_data_product_workspace_index_review.py
      - .github/workflows/finalize-local-data-product-workspace-index-review.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v7
        with:
          ref: review/local-data-product-workspace-index
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply canonical state
        run: python tools/_finalize_local_data_product_workspace_index_review.py
      - name: Verify canonical project state
        run: python tools/project_state.py --check
      - name: Remove temporary finalizer
        run: |
          git rm tools/_finalize_local_data_product_workspace_index_review.py
          git rm .github/workflows/finalize-local-data-product-workspace-index-review.yml
      - name: Commit finalized review
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add project/state.json project/STATE_SUMMARY.md
          git commit -m 'project: finalize local data product workspace index review'
          git push origin HEAD:review/local-data-product-workspace-index
