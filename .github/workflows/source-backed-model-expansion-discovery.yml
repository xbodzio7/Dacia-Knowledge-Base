name: Source-Backed Model Expansion Discovery

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  discover:
    if: github.head_ref == 'review/source-backed-model-expansion-planning'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build and evaluate homogeneous Sandero candidates
        run: |
          python - <<'PY'
          import csv
          import json
          import subprocess
          from pathlib import Path

          root = Path.cwd()
          out = root / "candidate-reporting"
          out.mkdir()
          source = json.loads((root / "data/reporting/configuration_completeness.json").read_text(encoding="utf-8"))
          source_evidence = json.loads((root / "data/reporting/configuration_gap_evidence.json").read_text(encoding="utf-8"))
          with (root / "data/master/configurations.csv").open(encoding="utf-8-sig", newline="") as handle:
              configurations = {row["code"]: row for row in csv.DictReader(handle)}

          candidates = {
              "sandero-ecog120-manual": [
                  item for item in source["configurations"]
                  if configurations[item["configuration_code"]]["transmission_type"] == "manual"
              ],
              "sandero-stepway-ecog120-automatic": [
                  item for item in source["configurations"]
                  if configurations[item["configuration_code"]]["transmission_type"] == "automatic"
              ],
          }
          expected = {"sandero-ecog120-manual": 5, "sandero-stepway-ecog120-automatic": 2}
          commands = []
          for name, selected in candidates.items():
              assert len(selected) == expected[name], (name, selected)
              selected_codes = {item["configuration_code"] for item in selected}
              spec = {
                  "version": source["version"],
                  "configuration_status": source["configuration_status"],
                  "configurations": selected,
                  "technical_slots": source["technical_slots"],
                  "equipment_attributes": source["equipment_attributes"],
                  "not_applicable": source["not_applicable"],
              }
              evidence = {
                  key: value for key, value in source_evidence.items() if key != "decisions"
              }
              evidence["decisions"] = [
                  decision for decision in source_evidence["decisions"]
                  if decision["configuration_code"] in selected_codes
              ]
              spec_path = out / f"{name}-completeness.json"
              evidence_path = out / f"{name}-gap-evidence.json"
              spec_path.write_text(json.dumps(spec, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
              evidence_path.write_text(json.dumps(evidence, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
              commands.extend([
                  (name, "completeness", [
                      "python", "tools/dkb.py", "configuration-completeness",
                      "--spec", str(spec_path), "--as-of", "2026-06-26",
                      "--json", str(out / f"{name}-completeness-report.json"),
                      "--markdown", str(out / f"{name}-completeness-report.md"),
                  ]),
                  (name, "source-coverage", [
                      "python", "tools/dkb.py", "source-coverage",
                      "--spec", str(spec_path), "--as-of", "2026-06-26",
                      "--json", str(out / f"{name}-source-coverage.json"),
                      "--markdown", str(out / f"{name}-source-coverage.md"),
                  ]),
                  (name, "comparison", [
                      "python", "tools/dkb.py", "configuration-comparison",
                      "--completeness-spec", str(spec_path),
                      "--evidence-spec", str(evidence_path),
                      "--as-of", "2026-06-26",
                      "--json", str(out / f"{name}-comparison.json"),
                      "--markdown", str(out / f"{name}-comparison.md"),
                      "--csv", str(out / f"{name}-comparison-differences.csv"),
                  ]),
              ])

          diagnostics = []
          for name, command_type, command in commands:
              completed = subprocess.run(command, cwd=root, text=True, capture_output=True, check=False)
              log_path = out / f"{name}-{command_type}.log"
              log_path.write_text(
                  "$ " + " ".join(command) + "\n\nSTDOUT\n" + completed.stdout + "\nSTDERR\n" + completed.stderr,
                  encoding="utf-8",
              )
              diagnostics.append({
                  "candidate": name,
                  "command": command_type,
                  "returncode": completed.returncode,
                  "log": log_path.name,
              })

          summary = {"diagnostics": diagnostics, "candidates": {}}
          for name in candidates:
              item = {}
              for key, filename in (
                  ("spec", f"{name}-completeness.json"),
                  ("evidence", f"{name}-gap-evidence.json"),
                  ("completeness", f"{name}-completeness-report.json"),
                  ("source_coverage", f"{name}-source-coverage.json"),
                  ("comparison", f"{name}-comparison.json"),
              ):
                  path = out / filename
                  if path.exists():
                      item[key] = json.loads(path.read_text(encoding="utf-8"))
              summary["candidates"][name] = item
          summary_path = out / "source-backed-model-expansion-decision-inputs.json"
          summary_path.write_text(json.dumps(summary, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(summary_path.read_text(encoding="utf-8"))
          if any(item["returncode"] != 0 for item in diagnostics):
              raise SystemExit(1)
          PY
      - name: Upload discovery artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: source-backed-model-expansion-discovery
          path: candidate-reporting/
          if-no-files-found: error
          retention-days: 1
