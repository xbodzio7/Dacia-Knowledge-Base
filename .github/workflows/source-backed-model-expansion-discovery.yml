name: Source-Backed Model Expansion Discovery

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  discover:
    if: github.head_ref == 'review/source-backed-model-expansion-planning'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build homogeneous Sandero candidate specifications
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          root = Path.cwd()
          source = json.loads((root / "data/reporting/configuration_completeness.json").read_text(encoding="utf-8"))
          with (root / "data/master/configurations.csv").open(encoding="utf-8-sig", newline="") as handle:
              configurations = {row["code"]: row for row in csv.DictReader(handle)}

          candidates = {
              "sandero-ecog120-manual": [
                  item for item in source["configurations"]
                  if configurations[item["configuration_code"]]["transmission_type"] == "manual"
              ],
              "sandero-stepway-ecog120-automatic": [
                  item for item in source["configurations"]
                  if configurations[item["configuration_code"]]["transmission_type"] == "automatic"
              ],
          }
          expected = {"sandero-ecog120-manual": 5, "sandero-stepway-ecog120-automatic": 2}
          temporary = Path("candidate-reporting")
          temporary.mkdir()
          evidence = {"version": 1, "as_of": "2026-06-26", "decisions": []}
          (temporary / "empty-gap-evidence.spec").write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          for name, selected in candidates.items():
              assert len(selected) == expected[name], (name, selected)
              spec = {
                  "version": source["version"],
                  "configuration_status": source["configuration_status"],
                  "configurations": selected,
                  "technical_slots": source["technical_slots"],
                  "equipment_attributes": source["equipment_attributes"],
                  "not_applicable": source["not_applicable"],
              }
              (temporary / f"{name}-completeness.json").write_text(
                  json.dumps(spec, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
          PY
      - name: Generate candidate reporting artifacts
        run: |
          for name in sandero-ecog120-manual sandero-stepway-ecog120-automatic; do
            python tools/dkb.py configuration-completeness \
              --spec "candidate-reporting/${name}-completeness.json" \
              --as-of 2026-06-26 \
              --json "candidate-reporting/${name}-completeness-report.json" \
              --markdown "candidate-reporting/${name}-completeness-report.md"
            python tools/dkb.py source-coverage \
              --spec "candidate-reporting/${name}-completeness.json" \
              --as-of 2026-06-26 \
              --json "candidate-reporting/${name}-source-coverage.json" \
              --markdown "candidate-reporting/${name}-source-coverage.md"
            python tools/dkb.py configuration-comparison \
              --completeness-spec "candidate-reporting/${name}-completeness.json" \
              --evidence-spec candidate-reporting/empty-gap-evidence.spec \
              --as-of 2026-06-26 \
              --json "candidate-reporting/${name}-comparison.json" \
              --markdown "candidate-reporting/${name}-comparison.md" \
              --csv "candidate-reporting/${name}-comparison-differences.csv"
          done
      - name: Summarize planning decision inputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("candidate-reporting")
          output = {}
          for name in ("sandero-ecog120-manual", "sandero-stepway-ecog120-automatic"):
              completeness = json.loads((root / f"{name}-completeness-report.json").read_text(encoding="utf-8"))
              coverage = json.loads((root / f"{name}-source-coverage.json").read_text(encoding="utf-8"))
              comparison = json.loads((root / f"{name}-comparison.json").read_text(encoding="utf-8"))
              output[name] = {
                  "scope": completeness["scope"],
                  "technical": completeness["technical"],
                  "equipment": completeness["equipment"],
                  "gaps": completeness["gaps"],
                  "source_registration": coverage["source_registration"],
                  "areas": coverage["areas"],
                  "sections": coverage["sections"],
                  "records": coverage["records"],
                  "source_gaps": coverage["gaps"],
                  "comparison_summary": comparison["summary"],
                  "evidence_summary": comparison["evidence_summary"],
                  "pair_count": len(comparison["pairs"]),
                  "pair_types": sorted({pair["pair_type"] for pair in comparison["pairs"]}),
              }
          path = root / "source-backed-model-expansion-decision-inputs.json"
          path.write_text(json.dumps(output, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(path.read_text(encoding="utf-8"))
          PY
      - name: Upload discovery artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-backed-model-expansion-discovery
          path: candidate-reporting/
          if-no-files-found: error
          retention-days: 1
