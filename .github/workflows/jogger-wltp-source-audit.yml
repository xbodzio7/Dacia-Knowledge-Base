name: Jogger WLTP Source Audit

on:
  push:
    branches:
      - review/jogger-wltp-efficiency-ranges

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: review/jogger-wltp-efficiency-ranges
          fetch-depth: 0
      - name: Install PDF extraction backend
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils
      - name: Extract page 6 source evidence
        shell: bash
        run: |
          pdf='PDF/Cenniki/DACIA JOGGER cennik MY26 20260401.pdf'
          test -f "$pdf"
          pdftotext -f 6 -l 6 -layout "$pdf" project/reviews/jogger-page6-layout.txt
          pdftotext -f 6 -l 6 -bbox-layout "$pdf" project/reviews/jogger-page6-bbox.html
          sha256sum "$pdf" > project/reviews/jogger-page6-source-sha256.txt
      - name: Commit audit and remove workflow
        shell: bash
        run: |
          rm .github/workflows/jogger-wltp-source-audit.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add project/reviews/jogger-page6-layout.txt project/reviews/jogger-page6-bbox.html project/reviews/jogger-page6-source-sha256.txt .github/workflows/jogger-wltp-source-audit.yml
          git commit -m "Record Jogger page 6 WLTP source audit"
          git push origin HEAD:review/jogger-wltp-efficiency-ranges
