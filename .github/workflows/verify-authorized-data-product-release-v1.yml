name: Verify Authorized Data Product Release v1.0.0

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-publication:
    if: github.head_ref == 'release/data-products-v1.0.0-authorized'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: data-products-v1.0.0
      RELEASE_VERSION: 1.0.0
      TESTED_MAIN_SHA: 653ddacf9dcaeefa356f53e3c00e71666f5c5b3e
    steps:
      - name: Check out exact released main
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TESTED_MAIN_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Require published release and tag
        shell: bash
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > release.json
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" > tag.json

      - name: Download and verify public assets
        shell: bash
        run: |
          mkdir published-assets
          gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --dir published-assets
          python tools/data_product_release.py \
            --verify \
            --version "${RELEASE_VERSION}" \
            --commit-sha "${TESTED_MAIN_SHA}" \
            --output-directory published-assets

      - name: Write publication evidence
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          release = json.loads(Path('release.json').read_text())
          tag = json.loads(Path('tag.json').read_text())
          files = []
          for path in sorted(Path('published-assets').iterdir(), key=lambda item: item.name):
              files.append({
                  'name': path.name,
                  'size': path.stat().st_size,
                  'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
              })
          evidence = {
              'release_tag': os.environ['RELEASE_TAG'],
              'release_url': release['html_url'],
              'release_id': release['id'],
              'published_at': release['published_at'],
              'tag_target_sha': tag['object']['sha'],
              'tested_main_sha': os.environ['TESTED_MAIN_SHA'],
              'assets': files,
          }
          assert evidence['tag_target_sha'] == evidence['tested_main_sha']
          assert [item['name'] for item in files] == [
              'SHA256SUMS',
              'dacia-knowledge-base-data-products-v1.0.0.zip',
              'data-product-release-manifest.json',
          ]
          Path('publication-evidence.json').write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(evidence, ensure_ascii=False, indent=2))
          PY

      - name: Upload publication evidence
        uses: actions/upload-artifact@v7
        with:
          name: data-products-v1.0.0-publication-evidence
          path: publication-evidence.json
          if-no-files-found: error
          retention-days: 90
