name: Finalize data products v1.1.0 publication record

on:
  push:
    branches:
      - docs/record-data-products-v1.1.0-publication
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: record-v1.1.0-publication-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name == 'push' || github.head_ref == 'docs/record-data-products-v1.1.0-publication'
    runs-on: ubuntu-latest
    steps:
      - name: Check out transport branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          show-progress: false

      - name: Materialize publication record on exact main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          git reset --hard origin/main
          git clean -fdx

          python - <<'PY'
          from pathlib import Path
          import json

          root = Path('.')
          release_doc = '''# Data Products v1.1.0 Publication

          Date: 2026-07-22

          ## Published identity

          - GitHub Release: `data-products-v1.1.0`
          - Release ID: `358319723`
          - Published at: `2026-07-22T20:54:27Z`
          - Exact tag target and source commit: `397958ba740c0b3b9370822d7e1d473c4829c11e`
          - Source Pull Request: `#198`
          - Verified Pull Request head: `801155a10e0f16787f93c85765eba0e8b3da0b15`
          - Quality workflow: `#1139`

          The tag resolves exactly to the merged `main` commit above. The release is final, not a draft and not a prerelease.

          ## Public assets

          | Asset | Size | SHA-256 | Asset ID |
          | --- | ---: | --- | ---: |
          | `dacia-knowledge-base-data-products-v1.1.0.zip` | 45,160,526 bytes | `ce06feb4c81c4dc1a79f5977e9d057aebd0db254b72ede6bee10c2a1a6f453af` | `486410534` |
          | `data-product-release-manifest.json` | 18,215 bytes | `9ac6598dde587571203d1c6cea5d7f0b32621cfa16570f2ee9f26e0129ec5ee2` | `486410538` |
          | `SHA256SUMS` | 213 bytes | `7943fda211bebc793632d264881e96ac9ceb46d9918569467cf77bda25e3c1f2` | `486410537` |

          GitHub's recorded API digests match the independently calculated SHA-256 values for all three uploaded assets.

          ## Release contents

          - 67 active configurations;
          - 17 independent comparison scopes;
          - 75 deterministic archive members;
          - complete shortlist in JSON, Markdown, CSV and self-contained HTML;
          - comparison bundles, provenance and the existing deterministic workbook;
          - corrected offline HTML selector with clean model labels, dependent version choices, one transmission choice and multiple powertrain choices.

          ## Verification

          The exact HTML from the release candidate was exercised in Chromium. Model/version dependency, transmission selection, multiple powertrains, explicit configuration selection, export and reset all completed without JavaScript errors.

          All 15 Pull Request workflows passed on the final HTML-only commit, including `Configuration Shortlist HTML`, `Configuration Selection Export`, `Versioned Data Product Release`, `Configuration Comparison Workbook` and the complete `Quality` workflow on Python 3.10, 3.13 and 3.14 plus Windows.

          The public assets were then downloaded again from the published GitHub Release and accepted by the repository's independent `data-product-release --verify` contract. Publication audit result: `PASS`.

          ## Immutability

          The release assets and tag are immutable. Later corrections or extensions must use a new semantic version and must not replace or rewrite `data-products-v1.1.0`.
          '''
          release_doc = '\n'.join(line[10:] if line.startswith('          ') else line for line in release_doc.splitlines()) + '\n'
          (root / 'project/releases/data-products-v1.1.0.md').write_text(release_doc, encoding='utf-8')

          audit = {
              'release_id': 358319723,
              'tag': 'data-products-v1.1.0',
              'target_commit_sha': '397958ba740c0b3b9370822d7e1d473c4829c11e',
              'published_at': '2026-07-22T20:54:27Z',
              'html_url': 'https://github.com/xbodzio7/Dacia-Knowledge-Base/releases/tag/data-products-v1.1.0',
              'draft': False,
              'prerelease': False,
              'assets': [
                  {'name': 'SHA256SUMS', 'asset_id': 486410537, 'size': 213, 'sha256': '7943fda211bebc793632d264881e96ac9ceb46d9918569467cf77bda25e3c1f2', 'api_digest': 'sha256:7943fda211bebc793632d264881e96ac9ceb46d9918569467cf77bda25e3c1f2', 'state': 'uploaded'},
                  {'name': 'dacia-knowledge-base-data-products-v1.1.0.zip', 'asset_id': 486410534, 'size': 45160526, 'sha256': 'ce06feb4c81c4dc1a79f5977e9d057aebd0db254b72ede6bee10c2a1a6f453af', 'api_digest': 'sha256:ce06feb4c81c4dc1a79f5977e9d057aebd0db254b72ede6bee10c2a1a6f453af', 'state': 'uploaded'},
                  {'name': 'data-product-release-manifest.json', 'asset_id': 486410538, 'size': 18215, 'sha256': '9ac6598dde587571203d1c6cea5d7f0b32621cfa16570f2ee9f26e0129ec5ee2', 'api_digest': 'sha256:9ac6598dde587571203d1c6cea5d7f0b32621cfa16570f2ee9f26e0129ec5ee2', 'state': 'uploaded'},
              ],
              'verification': 'PASS',
          }
          (root / 'project/releases/data-products-v1.1.0-publication-audit.json').write_text(json.dumps(audit, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          path = root / 'README.md'
          text = path.read_text(encoding='utf-8')
          text = text.replace('Zweryfikowane publiczne wydanie `data-products-v1.0.0` można pobrać, sprawdzić', 'Najnowsze zweryfikowane publiczne wydanie `data-products-v1.1.0` można pobrać, sprawdzić')
          text = text.replace('--version 1.0.0 \\\n            --output-directory ../dkb-data-products-v1.0.0', '--version 1.1.0 \\\n            --output-directory ../dkb-data-products-v1.1.0', 1)
          text = text.replace('--workspace-directory ../dkb-data-products-v1.0.0', '--workspace-directory ../dkb-data-products-v1.1.0', 1)
          old = 'Pierwsze publiczne wydanie zostało opublikowane jako [`data-products-v1.0.0`](https://github.com/xbodzio7/Dacia-Knowledge-Base/releases/tag/data-products-v1.0.0) z commita `653ddacf9dcaeefa356f53e3c00e71666f5c5b3e`. Trzy publiczne assety zostały ponownie pobrane, zweryfikowane przez `data-product-release --verify` i zapisane w `project/releases/data-products-v1.0.0.md`.'
          new = old + '\n\nNajnowsze wydanie [`data-products-v1.1.0`](https://github.com/xbodzio7/Dacia-Knowledge-Base/releases/tag/data-products-v1.1.0) zostało opublikowane z dokładnego commita `397958ba740c0b3b9370822d7e1d473c4829c11e`. Obejmuje 67 konfiguracji, 17 zakresów i poprawiony samodzielny selektor HTML. Wszystkie trzy publiczne assety zostały ponownie pobrane i zweryfikowane; trwały zapis znajduje się w `project/releases/data-products-v1.1.0.md`.'
          if old not in text:
              raise SystemExit('README release paragraph not found')
          path.write_text(text.replace(old, new), encoding='utf-8')

          path = root / 'CHANGELOG.md'
          text = path.read_text(encoding='utf-8')
          old = '* Planned immutable `data-products-v1.1.0` release contract covering the current 67 configurations and 17 independent comparison scopes.'
          new = '* Published and independently re-verified immutable `data-products-v1.1.0` from exact main commit `397958ba740c0b3b9370822d7e1d473c4829c11e`, covering 67 configurations, 17 scopes and the corrected offline HTML selector.'
          if old not in text:
              raise SystemExit('CHANGELOG entry not found')
          path.write_text(text.replace(old, new), encoding='utf-8')

          path = root / 'project/ROADMAP.md'
          text = path.read_text(encoding='utf-8')
          marker = '- pierwsze publiczne wydanie `data-products-v1.0.0` z trzema pobranymi i ponownie zweryfikowanymi assetami,'
          addition = marker + '\n- publiczne wydanie `data-products-v1.1.0` z poprawionym selektorem HTML, 67 konfiguracjami, 17 zakresami i trzema ponownie zweryfikowanymi assetami,'
          if marker not in text:
              raise SystemExit('ROADMAP marker not found')
          path.write_text(text.replace(marker, addition), encoding='utf-8')

          path = root / 'project/packages/data-products-v1.1.0-interface-selector.md'
          text = path.read_text(encoding='utf-8')
          text = text.replace('The published `data-products-v1.0.0` assets remain immutable. The new public identity is planned as `data-products-v1.1.0`.', 'The published `data-products-v1.0.0` assets remain immutable. The corrected public identity was published as `data-products-v1.1.0` from exact main commit `397958ba740c0b3b9370822d7e1d473c4829c11e`.')
          text = text.replace('The complete repository quality portfolio is required before merge. Publication of `data-products-v1.1.0` is a separate durable operation performed only after the package has been merged and verified on exact `main`.', 'The complete repository quality portfolio passed before merge. After the package was merged and verified on exact `main`, `data-products-v1.1.0` was published and all three public assets were downloaded again and accepted by the independent release verifier. Durable identities and hashes are recorded in `project/releases/data-products-v1.1.0.md`.')
          path.write_text(text, encoding='utf-8')

          path = root / 'project/state.json'
          state = json.loads(path.read_text(encoding='utf-8'))
          state['phase'] = 'Data Products v1.1.0 Publication'
          state['reference_delivery'] = {'name': 'Data Products v1.1.0 HTML Selector', 'pull_request': 198, 'head_sha': '801155a10e0f16787f93c85765eba0e8b3da0b15', 'quality_run': 1139}
          state['current_package'] = {'name': 'Data Products v1.1.0 Publication', 'status': 'complete', 'goal': 'Publish the immutable data-products-v1.1.0 assets from exact green main commit 397958ba740c0b3b9370822d7e1d473c4829c11e and independently re-verify their public identities, sizes and SHA-256 values.'}
          state['next_package'] = {'name': 'Excel Selector Planning Review', 'status': 'planned', 'goal': 'Design a genuinely usable optional Excel selector as a separate package without changing or blocking the published HTML release.'}
          path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          python tools/dkb.py project-state --apply
          git add CHANGELOG.md README.md project/ROADMAP.md project/STATE_SUMMARY.md project/packages/data-products-v1.1.0-interface-selector.md project/releases/data-products-v1.1.0-publication-audit.json project/releases/data-products-v1.1.0.md project/state.json
          git diff --cached --check

      - name: Verify exact scope and documentation
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected-paths <<'EOF'
          CHANGELOG.md
          README.md
          project/ROADMAP.md
          project/STATE_SUMMARY.md
          project/packages/data-products-v1.1.0-interface-selector.md
          project/releases/data-products-v1.1.0-publication-audit.json
          project/releases/data-products-v1.1.0.md
          project/state.json
          EOF
          sed -i 's/^          //' /tmp/expected-paths
          git diff --cached --name-only | sort > /tmp/actual-paths
          sort -o /tmp/expected-paths /tmp/expected-paths
          diff -u /tmp/expected-paths /tmp/actual-paths
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python tests/project_state_contract.py
          python tests/test_documentation_baseline.py -q

      - name: Publish clean package commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DKB Autonomous Maintainer"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "docs(release): record data-products-v1.1.0 publication"
          git push --force origin HEAD:docs/record-data-products-v1.1.0-publication
