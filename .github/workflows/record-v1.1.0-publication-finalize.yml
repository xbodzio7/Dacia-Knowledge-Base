name: Finalize data products v1.1.0 publication record

on:
  push:
    branches:
      - docs/record-data-products-v1.1.0-publication
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: record-v1.1.0-publication-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name == 'push' || github.head_ref == 'docs/record-data-products-v1.1.0-publication'
    runs-on: ubuntu-latest
    steps:
      - name: Check out transport branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          show-progress: false

      - name: Decode verified patch
        shell: bash
        run: |
          set -euo pipefail
          payload=.dkb/record-v1.1.0-publication.patch.gz.b64
          test "$(sha256sum "$payload" | awk '{print $1}')" = "95ef8644e470bfa4ddf014fb5cfacb7ee1348643f7a97a018d16789b6130930f"
          base64 --decode "$payload" > /tmp/record-v1.1.0-publication.patch.gz
          test "$(sha256sum /tmp/record-v1.1.0-publication.patch.gz | awk '{print $1}')" = "ceb35b53979c5d39abe88da4254c02c2efbc99cca6aa00aba62a76f35a06271f"
          gzip --decompress --stdout /tmp/record-v1.1.0-publication.patch.gz > /tmp/record-v1.1.0-publication.patch
          test "$(sha256sum /tmp/record-v1.1.0-publication.patch | awk '{print $1}')" = "9daaaaf4d23d5bac8f85bfbaa25ccfb0fafdbd4cf79eccc669c76b642efb3666"

      - name: Apply publication record to exact main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          git reset --hard origin/main
          git clean -fdx
          git apply --index /tmp/record-v1.1.0-publication.patch
          git diff --cached --check

      - name: Verify exact scope and documentation
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected-paths <<'EOF'
          CHANGELOG.md
          README.md
          project/ROADMAP.md
          project/STATE_SUMMARY.md
          project/packages/data-products-v1.1.0-interface-selector.md
          project/releases/data-products-v1.1.0-publication-audit.json
          project/releases/data-products-v1.1.0.md
          project/state.json
          EOF
          sed -i 's/^          //' /tmp/expected-paths
          git diff --cached --name-only | sort > /tmp/actual-paths
          sort -o /tmp/expected-paths /tmp/expected-paths
          diff -u /tmp/expected-paths /tmp/actual-paths
          test "$(wc -l < /tmp/actual-paths)" -eq 8
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python tests/project_state_contract.py
          python tests/test_documentation_baseline.py -q

      - name: Publish clean package commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DKB Autonomous Maintainer"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "docs(release): record data-products-v1.1.0 publication"
          git push --force origin HEAD:docs/record-data-products-v1.1.0-publication
