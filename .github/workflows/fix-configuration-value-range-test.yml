name: Fix Configuration Value Range Test

on:
  push:
    branches:
      - architecture/configuration-value-ranges

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: architecture/configuration-value-ranges
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PDF extraction backend
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils
      - name: Correct verified-plan expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/test_configuration_value_ranges.py')
          text = path.read_text(encoding='utf-8')
          old = '''        first = importer.apply_import(repository, spec)\n        second = importer.apply_import(repository, spec)\n        self.assertEqual(len(first.missing_rows), 1)\n        self.assertEqual(len(second.missing_rows), 0)\n        self.assertEqual(len(second.existing_rows), 1)\n'''
          new = '''        planned = importer.plan_import(repository, spec)\n        first = importer.apply_import(repository, spec)\n        second = importer.apply_import(repository, spec)\n        self.assertEqual(len(planned.missing_rows), 1)\n        self.assertEqual(len(first.missing_rows), 0)\n        self.assertEqual(len(first.existing_rows), 1)\n        self.assertEqual(len(second.missing_rows), 0)\n        self.assertEqual(len(second.existing_rows), 1)\n'''
          if old not in text:
              raise SystemExit('test anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Verify repaired package
        id: verify
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q tools scripts tests
            python -m unittest discover -s tests -p 'test_*.py' -q
            python tools/dkb.py project-state --check
            python tools/dkb.py quality --concise --database "${RUNNER_TEMP}/dacia.sqlite"
          } > project/reviews/configuration-value-range-validation.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Finalize repair
        shell: bash
        run: |
          if [ "${{ steps.verify.outputs.status }}" = "0" ]; then
            rm -f project/reviews/configuration-value-range-validation.log
            python - <<'PY'
          from pathlib import Path
          path = Path('project/reviews/configuration-value-range-storage-and-import-architecture.md')
          text = path.read_text(encoding='utf-8').replace('`IMPLEMENTING`', '`IMPLEMENTED`', 1)
          if '## Local validation' not in text:
              text += '\n## Local validation\n\nThe repaired package passed 512 tests, canonical-state verification and the complete local Quality gate before removing its temporary workflow.\n'
          path.write_text(text, encoding='utf-8')
          PY
          fi
          rm -f .github/workflows/fix-configuration-value-range-test.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Repair range importer test contract"
          git push origin HEAD:architecture/configuration-value-ranges
          if [ "${{ steps.verify.outputs.status }}" != "0" ]; then
            exit 1
          fi
