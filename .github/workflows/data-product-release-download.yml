name: Verified Data Product Release Download

on:
  pull_request:
    paths-ignore:
      - project/state.json
      - project/STATE_SUMMARY.md
      - project/reviews/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download-and-verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: workspace-index-linux
          - os: windows-latest
            artifact: workspace-index-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run downloader regression tests
        run: python -m unittest -q tests.test_data_product_release_download
      - name: Run workspace renderer checks
        run: python tests/workspace_index_checks.py -q
      - name: Run workspace integration check
        run: python tests/workspace_download_integration_checks.py -q
      - name: Run workspace verification checks
        run: python tests/workspace_verification_checks.py -q
      - name: Run consumer guide checks
        run: python tests/data_product_consumer_guide_checks.py -q
      - name: Download immutable public v1.0.0
        run: python tools/dkb.py data-product-release-download --version 1.0.0 --output-directory downloaded-release
      - name: Independently verify downloaded assets
        run: python tools/data_product_release.py --verify --version 1.0.0 --commit-sha 653ddacf9dcaeefa356f53e3c00e71666f5c5b3e --output-directory downloaded-release/assets
      - name: Verify complete workspace offline
        run: python tools/dkb.py data-product-workspace-verify --workspace-directory downloaded-release --json
      - name: Reject a corrupted copied workspace without further changes
        run: |
          python -c "from pathlib import Path; import shutil,subprocess,sys; source=Path('downloaded-release'); copied=Path('corrupted-release'); shutil.copytree(source,copied); target=next(path for path in sorted((copied/'contents').rglob('*')) if path.is_file()); target.write_bytes(target.read_bytes()+b'corruption'); damaged=target.read_bytes(); result=subprocess.run([sys.executable,'tools/dkb.py','data-product-workspace-verify','--workspace-directory',str(copied)],capture_output=True,text=True); assert result.returncode != 0; assert target.read_bytes() == damaged; print(result.stderr.strip())"
      - name: Check ready-to-open entry points
        run: |
          python -c "from pathlib import Path; root=Path('downloaded-release'); required=['index.html','contents/shortlist/configuration-shortlist.html','contents/comparison-bundle/configuration-comparison-workbook.xlsx','contents/comparison-bundle/comparison-bundle-manifest.json','contents/RELEASE_NOTES.md']; assert all((root / path).is_file() for path in required)"
      - name: Verify local index links and offline contract
        run: |
          python -c "from html.parser import HTMLParser; from pathlib import Path; from urllib.parse import unquote; root=Path('downloaded-release'); text=(root/'index.html').read_text(encoding='utf-8'); assert '<script' not in text.lower(); P=type('P',(HTMLParser,),{'__init__':lambda self:(HTMLParser.__init__(self),setattr(self,'hrefs',[]))[-1],'handle_starttag':lambda self,tag,attrs:self.hrefs.extend([value for key,value in attrs if key=='href' and value])}); parser=P(); parser.feed(text); local=[href for href in parser.hrefs if not href.startswith('https://')]; assert local; assert all(root.joinpath(*Path(unquote(href)).parts).is_file() for href in local)"
      - name: Upload deterministic workspace index
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: downloaded-release/index.html
          if-no-files-found: error
          retention-days: 7

  compare-workspace-index:
    needs: download-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux index
        uses: actions/download-artifact@v7
        with:
          name: workspace-index-linux
          path: linux
      - name: Download Windows index
        uses: actions/download-artifact@v7
        with:
          name: workspace-index-windows
          path: windows
      - name: Compare index bytes
        run: |
          python -c "from pathlib import Path; left=(Path('linux')/'index.html').read_bytes(); right=(Path('windows')/'index.html').read_bytes(); assert left == right; print(f'byte-identical index.html: {len(left)} bytes')"
