name: Temporary Python 3.10 Notice

on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: write

jobs:
  build-readme:
    if: github.head_ref == 'maintenance/python-310-deprecation-notice'
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Build README candidate
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          import base64
          import json
          import os
          from hashlib import sha1
          from pathlib import Path
          from urllib.request import Request, urlopen

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          marker = '''* eksport danych do SQLite i innych systemów,
          * wygodne wyszukiwanie informacji w repozytorium.

          ## Gotowe produkty offline
          '''
          replacement = '''* eksport danych do SQLite i innych systemów,
          * wygodne wyszukiwanie informacji w repozytorium.

          ## Wymagania Pythona

          Projekt obecnie wymaga Pythona 3.10 lub nowszego. Wsparcie dla 3.10 jest
          jednak oznaczone jako wycofywane i zostanie zakończone przed lub wraz z
          upstreamowym końcem wsparcia w październiku 2026 r. Planowanym kolejnym
          minimum jest Python 3.13, a dla nowych środowisk zalecany jest Python 3.14.

          Aktualne minimum nie zmienia się w tym pakiecie. Szczegółową politykę,
          zweryfikowane linie CI i warunki późniejszego podniesienia minimum opisuje
          [`project/guides/python-runtime-support.md`](project/guides/python-runtime-support.md).

          ## Gotowe produkty offline
          '''
          if text.count(marker) != 1:
              raise SystemExit('unexpected README insertion marker count')
          updated = text.replace(marker, replacement, 1)
          payload = updated.encode('utf-8')
          expected = sha1(b'blob ' + str(len(payload)).encode() + b'\0' + payload).hexdigest()

          body = json.dumps({
              'content': base64.b64encode(payload).decode('ascii'),
              'encoding': 'base64',
          }).encode('utf-8')
          request = Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/git/blobs",
              data=body,
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          with urlopen(request) as response:
              result = json.load(response)
          if result['sha'] != expected:
              raise SystemExit(f"README blob mismatch: {result['sha']} != {expected}")

          output = Path(os.environ['RUNNER_TEMP']) / 'python-310-notice'
          output.mkdir(parents=True, exist_ok=True)
          (output / 'receipt.json').write_text(
              json.dumps({
                  'readme_blob_sha': result['sha'],
                  'bytes': len(payload),
                  'insertions': 1,
              }, indent=2) + '\n',
              encoding='utf-8',
          )

      - name: Upload README receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-310-notice-readme
          path: ${{ runner.temp }}/python-310-notice
          if-no-files-found: error
          retention-days: 1
