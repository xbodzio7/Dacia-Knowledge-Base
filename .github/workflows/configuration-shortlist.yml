name: Configuration Shortlist

on:
  pull_request:
    paths-ignore:
      - project/state.json
      - project/STATE_SUMMARY.md
      - project/reviews/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shortlist:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
      - name: Generate shortlist artifacts
        run: |
          python tools/configuration_shortlist.py \
            --json "${RUNNER_TEMP}/configuration-shortlist-all.json" \
            --markdown "${RUNNER_TEMP}/configuration-shortlist-all.md" \
            --csv "${RUNNER_TEMP}/configuration-shortlist-all.csv"
          python tools/configuration_shortlist.py \
            --transmission automatic \
            --max-price 100000 \
            --json "${RUNNER_TEMP}/configuration-shortlist-automatic-under-100000.json" \
            --markdown "${RUNNER_TEMP}/configuration-shortlist-automatic-under-100000.md" \
            --csv "${RUNNER_TEMP}/configuration-shortlist-automatic-under-100000.csv"
      - name: Generate artifact manifest
        run: |
          python tools/quality_artifact_manifest.py \
            --output "${RUNNER_TEMP}/configuration-shortlist-manifest.json" \
            --file "${RUNNER_TEMP}/configuration-shortlist-all.json" \
            --file "${RUNNER_TEMP}/configuration-shortlist-all.md" \
            --file "${RUNNER_TEMP}/configuration-shortlist-all.csv" \
            --file "${RUNNER_TEMP}/configuration-shortlist-automatic-under-100000.json" \
            --file "${RUNNER_TEMP}/configuration-shortlist-automatic-under-100000.md" \
            --file "${RUNNER_TEMP}/configuration-shortlist-automatic-under-100000.csv"
      - name: Upload shortlist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: configuration-shortlist
          path: |
            ${{ runner.temp }}/configuration-shortlist-all.json
            ${{ runner.temp }}/configuration-shortlist-all.md
            ${{ runner.temp }}/configuration-shortlist-all.csv
            ${{ runner.temp }}/configuration-shortlist-automatic-under-100000.json
            ${{ runner.temp }}/configuration-shortlist-automatic-under-100000.md
            ${{ runner.temp }}/configuration-shortlist-automatic-under-100000.csv
            ${{ runner.temp }}/configuration-shortlist-manifest.json
          if-no-files-found: error
          retention-days: 7
