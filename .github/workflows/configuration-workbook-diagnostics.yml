name: Configuration Workbook Diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'product/configuration-comparison-workbook-export'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Apply bundle test contract
        run: python tools/_update_workbook_bundle_contract.py
      - name: Run workbook and bundle tests
        run: |
          python -m unittest -v \
            tests.test_configuration_comparison_bundle \
            tests.test_configuration_comparison_workbook
      - name: Commit bundle test contract
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/test_configuration_comparison_bundle.py
          if git diff --cached --quiet; then
            echo 'Bundle test contract already synchronized.'
          else
            git commit -m 'test: include workbook in bundle contract'
            git push origin HEAD:${{ github.head_ref }}
          fi
