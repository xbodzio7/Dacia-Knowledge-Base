name: Configuration Workbook Diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'product/configuration-comparison-workbook-export'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Apply workbook test contracts
        run: |
          python tools/_update_workbook_bundle_contract.py
          python tools/_fix_workbook_empty_cell_test.py
      - name: Commit workbook test contracts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            tests/test_configuration_comparison_bundle.py \
            tests/test_configuration_comparison_workbook.py
          if git diff --cached --quiet; then
            echo 'Workbook test contracts already synchronized.'
          else
            git commit -m 'test: finalize workbook export contract'
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Capture workbook and bundle tests
        shell: bash
        run: |
          set +e
          python -m unittest -v \
            tests.test_configuration_comparison_bundle \
            tests.test_configuration_comparison_workbook \
            > "${RUNNER_TEMP}/workbook-tests.log" 2>&1
          echo $? > "${RUNNER_TEMP}/workbook-tests.exit"
          set -e
      - uses: actions/upload-artifact@v7
        with:
          name: configuration-workbook-test-diagnostics
          path: |
            ${{ runner.temp }}/workbook-tests.log
            ${{ runner.temp }}/workbook-tests.exit
          if-no-files-found: error
