name: Temporary download-artifact v8 Candidate

on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: write

jobs:
  build-candidate:
    if: github.head_ref == 'maintenance/download-artifact-v8-upgrade'
    runs-on: ubuntu-latest
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Create verified workflow blobs
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          import base64
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          old = 'actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7'
          new = 'actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8'
          helper = Path('.github/workflows/temp-download-artifact-v8-candidate.yml')
          changed = []
          total = 0

          for path in sorted(Path('.github/workflows').glob('*.yml')):
              if path == helper:
                  continue
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if not count:
                  continue
              payload = text.replace(old, new).encode('utf-8')
              body = json.dumps({
                  'content': base64.b64encode(payload).decode('ascii'),
                  'encoding': 'base64',
              }).encode('utf-8')
              request = Request(
                  f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/git/blobs",
                  data=body,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                      'X-GitHub-Api-Version': '2022-11-28',
                      'Content-Type': 'application/json',
                  },
                  method='POST',
              )
              with urlopen(request) as response:
                  result = json.load(response)
              changed.append({
                  'path': path.as_posix(),
                  'sha': result['sha'],
                  'replacements': count,
                  'bytes': len(payload),
              })
              total += count

          if len(changed) != 3:
              raise SystemExit(f'unexpected changed workflow count: {len(changed)}')
          if total != 5:
              raise SystemExit(f'unexpected download-artifact reference count: {total}')

          output = Path(os.environ['RUNNER_TEMP']) / 'download-artifact-v8-candidate'
          output.mkdir(parents=True, exist_ok=True)
          (output / 'manifest.json').write_text(
              json.dumps({'total_replacements': total, 'files': changed}, indent=2) + '\n',
              encoding='utf-8',
          )

      - name: Upload candidate manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: download-artifact-v8-candidate
          path: ${{ runner.temp }}/download-artifact-v8-candidate
          if-no-files-found: error
          retention-days: 1
