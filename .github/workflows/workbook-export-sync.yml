name: Workbook Export Sync

on:
  pull_request:

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'product/configuration-comparison-workbook-export'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Apply workbook package state
        run: |
          python tools/_finalize_configuration_workbook_export.py
          python tools/_finalize_configuration_workbook_docs.py
          python tools/_finalize_workbook_roadmap.py
          python tools/_finalize_workbook_changelog.py
          python tools/dkb.py documentation-baseline --apply
          python tools/dkb.py project-state --apply
      - name: Verify synchronized package
        run: |
          python tools/dkb.py documentation-baseline --check
          python tools/dkb.py project-state --check
          python -m unittest -v \
            tests.test_configuration_comparison_bundle \
            tests.test_configuration_comparison_workbook
      - name: Commit synchronized package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            README.md \
            CHANGELOG.md \
            project/ROADMAP.md \
            project/SESSION_STATE.md \
            project/STATE_SUMMARY.md \
            project/state.json \
            tests/test_jogger_payload_performance_ranges.py \
            tests/test_jogger_wltp_efficiency_ranges.py
          if git diff --cached --quiet; then
            echo 'Workbook package already synchronized.'
          else
            git commit -m 'docs: finalize comparison workbook export'
            git push origin HEAD:${{ github.head_ref }}
          fi
