name: Finalize Initial Data Product Release Publication

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'project/record-data-products-v1.0.0-publication'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Record verified release publication
        run: python tools/_finalize_initial_release_publication.py

      - name: Verify final repository state
        run: |
          python -m compileall -q tools tests
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python -m unittest -q \
            tests.test_data_product_release \
            tests.test_data_product_release_contracts
          grep -F '434be3ba2daa941f4fb37dbc1a542ede705e8396f32e8c1221fbfc02080dcf78' \
            project/releases/data-products-v1.0.0.md

      - name: Commit durable release record
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A README.md CHANGELOG.md project \
            .github/workflows/finalize-initial-release-publication.yml \
            tools/_finalize_initial_release_publication.py
          if git diff --cached --quiet; then
            echo 'Release publication record already finalized.'
          else
            git commit -m 'docs: record data products v1.0.0 publication'
            git push origin HEAD:${{ github.head_ref }}
          fi
