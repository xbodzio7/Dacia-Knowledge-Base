name: Export current main v1.2.0 recorded

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'transport/export-main-v1.2.0-recorded'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact PR base
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          git archive --format=tar.gz --output="$RUNNER_TEMP/dkb-main-$base_sha.tar.gz" "$base_sha"

      - name: Upload source archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dkb-main-${{ github.event.pull_request.base.sha }}
          path: ${{ runner.temp }}/dkb-main-${{ github.event.pull_request.base.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 1
