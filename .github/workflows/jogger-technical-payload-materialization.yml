name: Jogger Technical Payload Materialization

on:
  push:
    branches:
      - data/jogger-technical-specifications
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-technical-specifications

      - name: Resolve exact payload fragments
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          work="${RUNNER_TEMP}/jogger-tech-parts"
          mkdir -p "$work"

          fetch_blob_text() {
            local sha="$1"
            local target="$2"
            gh api "repos/${GH_REPOSITORY}/git/blobs/${sha}" --jq '.content' \
              | tr -d '\r\n' \
              | base64 --decode > "$target"
          }

          fetch_blob_text cf30fd9ba853523e9ee49c0f9c4c50e5b43a1ab1 "$work/part-00.b64"
          cp .jogger-tech-parts/part-01.b64 "$work/part-01.b64"
          cp .jogger-tech-parts/part-02.b64 "$work/part-02.b64"
          cp .jogger-tech-parts/part-03.b64 "$work/part-03.b64"
          cp .jogger-tech-parts/part-04.b64 "$work/part-04.b64"
          fetch_blob_text 1f4a6d53f14dd7039efcb1f35989565d84dea6bf "$work/part-05.b64"
          fetch_blob_text 42582f1e4e576f8efaa153c80b6b6a97a93cc4dd "$work/part-06.b64"
          fetch_blob_text 7a9417b255f2c52e01231c6257848030e0d1ce2a "$work/part-07.b64"

          payload="${RUNNER_TEMP}/jogger-tech-payload.tgz"
          cat "$work"/part-*.b64 | tr -d '\r\n' | base64 --decode > "$payload"
          echo "240de5c0ac0afc797b9b0c061c1984ba24c81058b4c30775b149fdb7bb7b99cb  ${payload}" \
            | sha256sum --check --strict
          tar -xzf "$payload" -C .

      - name: Validate selected Jogger technical package
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q tools scripts tests
          python -m unittest tests.test_jogger_technical_specifications -v
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check

      - name: Commit final package and remove transport
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .jogger-tech-parts
          rm .github/workflows/jogger-technical-source-snapshot.yml
          rm .github/workflows/jogger-technical-payload-materialization.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "data: import selected Jogger technical specifications"
          git push origin HEAD:data/jogger-technical-specifications
