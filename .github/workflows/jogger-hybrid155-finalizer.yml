name: Jogger Hybrid 155 Reporting Finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'reporting/jogger-hybrid155-automatic'
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: reporting/jogger-hybrid155-automatic
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Synchronize project state and package contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          state_path = Path("project/state.json")
          state = json.loads(state_path.read_text(encoding="utf-8"))
          state["baseline"]["tests"] = 565
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          for relative in (
              "tests/test_jogger_payload_performance_ranges.py",
              "tests/test_jogger_wltp_efficiency_ranges.py",
          ):
              path = Path(relative)
              text = path.read_text(encoding="utf-8")
              updated = text.replace('baseline["tests"], 558', 'baseline["tests"], 565')
              if updated == text:
                  raise SystemExit(f"baseline assertion was not updated: {relative}")
              path.write_text(updated, encoding="utf-8")

          package_content = (
              "# Jogger Hybrid 155 Automatic Reporting Scope Promotion\n\n"
              "## Status\n\n"
              "`IMPLEMENTED`\n\n"
              "This package promotes the six configurations selected in PR #134 into an explicit independent reporting scope. It changes no source data.\n\n"
              "## Scope\n\n"
              "The scope contains expression, extreme and journey, each in five- and seven-seat Hybrid 155 automatic form. One registered Jogger MY26 source documents all six configurations.\n\n"
              "## Denominator\n\n"
              "Each configuration has 27 technical slots: 23 scalar observations and four closed ranges. The scope therefore contains 162 technical observations, 318 equipment observations across 53 attributes and six dated catalogue prices.\n\n"
              "The four range slots preserve the source-stated acceleration interval, petrol WLTP CO2 and fuel-consumption intervals, and maximum-payload interval. No endpoint, midpoint or average substitutes for a range.\n\n"
              "Hybrid-specific scalar observations preserve battery type and voltage, total system power, starter-generator power, traction-motor power and traction-motor torque without projecting Eco-G or TCe semantics onto the group.\n\n"
              "## Comparison contract\n\n"
              "Fifteen deterministic pairs produce:\n\n"
              "- 15 price comparisons: all different;\n"
              "- 405 technical comparisons: 351 equal, 54 different and zero not comparable;\n"
              "- 795 equipment comparisons: 679 equal, 116 different and zero not comparable;\n"
              "- 185 total differences.\n\n"
              "Exactly 60 technical comparisons preserve range states: 51 identical and nine disjoint.\n\n"
              "## Source and completeness contract\n\n"
              "Completeness is 162/162 technical observations and 318/318 equipment observations: 258 standard, 22 optional and 38 not available. Source coverage includes six prices, 24/24 covered areas and 168/168 covered sections. The validated gap-evidence specification is empty.\n\n"
              "## Artifacts\n\n"
              "The dedicated Jogger reporting workflow publishes JSON and Markdown completeness and source-coverage reports, JSON and Markdown comparison reports, a flat comparison-differences CSV and a SHA-256 manifest under the `jogger-hybrid155-automatic` prefix.\n\n"
              "## Expected baseline\n\n"
              "- 565 tests;\n"
              "- 37 master CSV files and 5,155 rows;\n"
              "- 1,204 scalar values and 71 scalar specifications;\n"
              "- 144 range values and 19 range specifications;\n"
              "- 2,977 availability records;\n"
              "- 357 attributes in 30 categories.\n\n"
              "## Next package\n\n"
              "**Jogger TCe 110 Manual Reporting Scope Promotion** will publish the final homogeneous Jogger powertrain group.\n"
          )
          Path("project/packages/jogger-hybrid155-automatic-reporting.md").write_text(package_content, encoding="utf-8")
          PY
      - name: Synchronize documentation baseline
        run: python tools/dkb.py documentation-baseline --apply
      - name: Generate reporting audit
        run: |
          mkdir -p "${RUNNER_TEMP}/jogger-hybrid155"
          python tools/dkb.py configuration-completeness \
            --spec data/reporting/jogger_hybrid155_automatic_completeness.json \
            --as-of 2026-04-01 \
            --json "${RUNNER_TEMP}/jogger-hybrid155/completeness.json"
          python tools/dkb.py source-coverage \
            --spec data/reporting/jogger_hybrid155_automatic_completeness.json \
            --as-of 2026-04-01 \
            --json "${RUNNER_TEMP}/jogger-hybrid155/source-coverage.json"
          python tools/dkb.py configuration-comparison \
            --completeness-spec data/reporting/jogger_hybrid155_automatic_completeness.json \
            --evidence-spec data/reporting/jogger_hybrid155_automatic_gap_evidence.spec \
            --as-of 2026-04-01 \
            --json "${RUNNER_TEMP}/jogger-hybrid155/comparison.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temporary = Path(os.environ["RUNNER_TEMP"]) / "jogger-hybrid155"
          payload = {
              "completeness": json.loads((temporary / "completeness.json").read_text(encoding="utf-8")),
              "source_coverage": json.loads((temporary / "source-coverage.json").read_text(encoding="utf-8")),
              "comparison": json.loads((temporary / "comparison.json").read_text(encoding="utf-8")),
          }
          output = Path("project/audits/jogger-hybrid155-automatic-reporting.json")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo "Generated files are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md project/ROADMAP.md project/SESSION_STATE.md project/state.json project/packages/jogger-hybrid155-automatic-reporting.md project/audits/jogger-hybrid155-automatic-reporting.json tests/test_jogger_payload_performance_ranges.py tests/test_jogger_wltp_efficiency_ranges.py
          git commit -m "ci: finalize Jogger Hybrid 155 reporting"
          git push origin HEAD:reporting/jogger-hybrid155-automatic
