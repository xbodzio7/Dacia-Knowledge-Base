name: Configuration Comparison HTML

on:
  pull_request:
    paths-ignore:
      - project/state.json
      - project/STATE_SUMMARY.md
      - project/reviews/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  html-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
      - name: Generate browser reports
        run: |
          python tools/dkb.py configuration-comparison \
            --completeness-spec data/reporting/sandero_ecog120_manual_completeness.json \
            --evidence-spec data/reporting/sandero_ecog120_manual_gap_evidence.json \
            --as-of 2026-06-26 \
            --html "${RUNNER_TEMP}/sandero-ecog120-manual-comparison.html"
          python tools/dkb.py configuration-comparison \
            --completeness-spec data/reporting/sandero_stepway_ecog120_automatic_completeness.json \
            --evidence-spec data/reporting/sandero_stepway_ecog120_automatic_gap_evidence.json \
            --as-of 2026-06-26 \
            --html "${RUNNER_TEMP}/sandero-stepway-ecog120-automatic-comparison.html"
      - name: Generate artifact manifest
        run: |
          python tools/quality_artifact_manifest.py \
            --output "${RUNNER_TEMP}/configuration-comparison-html-manifest.json" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-comparison.html" \
            --file "${RUNNER_TEMP}/sandero-stepway-ecog120-automatic-comparison.html"
      - name: Upload browser reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: configuration-comparison-html
          path: |
            ${{ runner.temp }}/sandero-ecog120-manual-comparison.html
            ${{ runner.temp }}/sandero-stepway-ecog120-automatic-comparison.html
            ${{ runner.temp }}/configuration-comparison-html-manifest.json
          if-no-files-found: error
          retention-days: 7
