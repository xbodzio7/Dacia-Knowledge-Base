name: Quality

on:
  push:
    branches:
      - main
      - "dev/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Compile Python sources
        run: python -m compileall -q tools scripts

      - name: Check CSV encoding
        run: python tools/dkb.py normalize

      - name: Validate repository data
        run: python tools/dkb.py validate

      - name: Build SQLite database
        run: python tools/dkb.py sqlite --output "${RUNNER_TEMP}/dacia_knowledge_base.sqlite"

      - name: Verify SQLite database
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          database = Path(os.environ["RUNNER_TEMP"]) / "dacia_knowledge_base.sqlite"

          if not database.is_file():
              raise SystemExit(f"SQLite database was not created: {database}")

          required_tables = {
              "attributes",
              "engines",
              "gearboxes",
              "models",
          }

          with sqlite3.connect(database) as connection:
              integrity = connection.execute("PRAGMA integrity_check").fetchone()[0]
              tables = {
                  row[0]
                  for row in connection.execute(
                      """
                      SELECT name
                      FROM sqlite_master
                      WHERE type = 'table'
                      """
                  )
              }

          if integrity != "ok":
              raise SystemExit(f"SQLite integrity check failed: {integrity}")

          missing_tables = required_tables - tables

          if missing_tables:
              missing = ", ".join(sorted(missing_tables))
              raise SystemExit(f"SQLite database is missing required tables: {missing}")

          print(f"SQLite integrity: {integrity}")
          print(f"SQLite tables: {len(tables)}")
          PY

      - name: Upload generated artifacts
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: dacia-knowledge-base-build
          path: |
            ${{ runner.temp }}/dacia_knowledge_base.sqlite
            reports/validation_report.md
          if-no-files-found: error
          retention-days: 7