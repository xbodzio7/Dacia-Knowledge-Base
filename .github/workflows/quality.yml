name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-payload-performance-ranges
          fetch-depth: 0

      - name: Apply historical range-test scope patch
        run: python tools/_patch_jogger_range_test_scopes.py

      - name: Restore Quality and commit patch
        shell: bash
        run: |
          git fetch origin main --no-tags
          git show FETCH_HEAD:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f tools/_patch_jogger_range_test_scopes.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Scope historical range tests to their denominators"
          git push origin HEAD:data/jogger-payload-performance-ranges
