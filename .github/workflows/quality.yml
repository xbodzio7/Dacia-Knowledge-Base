name: Quality

on:
  push:
    branches:
      - main
      - "dev/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Compile Python sources
        run: python -m compileall -q tools scripts tests

      - name: Run unit tests
        run: |
          python -m unittest discover \
            -s tests \
            -p "test_*.py" \
            -v

      - name: Check CSV encoding
        run: python tools/dkb.py normalize

      - name: Validate repository data
        run: python tools/dkb.py validate

      - name: Build SQLite database
        run: |
          python tools/dkb.py sqlite \
            --output "${RUNNER_TEMP}/dacia_knowledge_base.sqlite"

      - name: Verify SQLite database
        run: |
          python tools/dkb.py sqlite-verify \
            "${RUNNER_TEMP}/dacia_knowledge_base.sqlite"

      - name: Upload generated artifacts
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: dacia-knowledge-base-build
          path: |
            ${{ runner.temp }}/dacia_knowledge_base.sqlite
            reports/validation_report.md
          if-no-files-found: error
          retention-days: 7

  workflow-windows:
    name: Package workflow / Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Show Python version
        run: python --version

      - name: Run package workflow tests
        run: |
          python -m unittest -v `
            tests.test_package_workflow `
            tests.test_dkb_cli `
            tests.test_quality
