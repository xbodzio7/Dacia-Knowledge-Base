name: Quality

on:
  push:
    branches:
      - main
      - "dev/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Install PDF text extraction backend
        if: matrix.python-version == '3.13'
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi
          pdftotext -v

      - name: Compile Python sources
        if: matrix.python-version == '3.10'
        run: python -m compileall -q tools scripts tests

      - name: Run unit tests
        if: matrix.python-version == '3.10'
        run: |
          python -m unittest discover \
            -s tests \
            -p "test_*.py" \
            -q

      - name: Run orchestration contract tests
        if: matrix.python-version == '3.10'
        run: |
          python -m unittest -q \
            tests.project_state_contract \
            tests.autonomy_policy_contract

      - name: Check canonical project state
        if: matrix.python-version == '3.10'
        run: python tools/dkb.py project-state --check

      - name: Run full quality gate
        if: matrix.python-version == '3.13'
        run: |
          python tools/dkb.py quality \
            --concise \
            --database "${RUNNER_TEMP}/dacia_knowledge_base.sqlite" \
            --log-file "${RUNNER_TEMP}/quality.log" \
            --summary-json "${RUNNER_TEMP}/quality-summary.json"

      - name: Generate configuration comparison item catalog artifact
        if: matrix.python-version == '3.13'
        run: |
          python tools/dkb.py configuration-comparison-item-catalog \
            --csv "${RUNNER_TEMP}/configuration-comparison-item-catalog.csv"

      - name: Upload generated artifacts
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: dacia-knowledge-base-build
          path: |
            ${{ runner.temp }}/dacia_knowledge_base.sqlite
            ${{ runner.temp }}/quality.log
            ${{ runner.temp }}/quality-summary.json
            ${{ runner.temp }}/documentation-baseline.json
            ${{ runner.temp }}/documentation-baseline.md
            ${{ runner.temp }}/configuration-completeness.json
            ${{ runner.temp }}/configuration-completeness.md
            ${{ runner.temp }}/source-coverage.json
            ${{ runner.temp }}/source-coverage.md
            ${{ runner.temp }}/configuration-gap-triage.json
            ${{ runner.temp }}/configuration-gap-triage.md
            ${{ runner.temp }}/configuration-gap-source-review.json
            ${{ runner.temp }}/configuration-gap-source-review.md
            ${{ runner.temp }}/configuration-gap-evidence.json
            ${{ runner.temp }}/configuration-gap-evidence.md
            ${{ runner.temp }}/configuration-gap-resolution-plan.json
            ${{ runner.temp }}/configuration-gap-resolution-plan.md
            ${{ runner.temp }}/configuration-comparison.json
            ${{ runner.temp }}/configuration-comparison.md
            ${{ runner.temp }}/configuration-comparison-differences.csv
            ${{ runner.temp }}/configuration-comparison-item-catalog.csv
            reports/validation_report.md
          if-no-files-found: error
          retention-days: 7

  workflow-windows:
    name: Package workflow / Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Show Python version
        run: python --version

      - name: Run package publishing tests
        run: |
          python -m unittest -q `
            tests.test_package_workflow `
            tests.test_package_receipt `
            tests.test_package_publish `
            tests.test_dkb_cli `
            tests.test_quality `
            tests.project_state_contract `
            tests.autonomy_policy_contract

      - name: Check canonical project state
        run: python tools/dkb.py project-state --check
