name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: reporting/jogger-ecog120-automatic
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install PDF text extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi
      - name: Finalize and validate package
        run: python tools/_tmp_finalize_jogger_ecog120_reporting.py
      - name: Commit final package
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/_tmp_finalize_jogger_ecog120_reporting.py
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "reporting: finalize Jogger Eco-G 120 automatic scope"
          git push origin HEAD:reporting/jogger-ecog120-automatic
