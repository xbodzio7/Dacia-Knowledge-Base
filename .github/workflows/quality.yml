name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out reporting branch
        uses: actions/checkout@v7
        with:
          ref: reporting/jogger-ecog120-automatic
          fetch-depth: 0
          persist-credentials: true

      - name: Generate reporting audit
        run: |
          PYTHONPATH=tools python - <<'PY'
          import json
          from pathlib import Path
          import configuration_completeness as completeness
          import configuration_comparison as comparison
          import source_coverage

          root = Path('.').resolve()
          spec = root / 'data/reporting/jogger_ecog120_automatic_completeness.json'
          evidence = root / 'data/reporting/jogger_ecog120_automatic_gap_evidence.spec'
          result = {
              'completeness': completeness.collect_report(root, spec, '2026-04-01'),
              'source_coverage': source_coverage.collect_report(root, spec, '2026-04-01'),
              'comparison': comparison.collect_report(root, spec, evidence, '2026-04-01'),
          }
          output = root / 'project/audits/jogger-ecog120-automatic-reporting.json'
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(result, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY

      - name: Restore Quality and commit audit
        if: always()
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: capture Jogger Eco-G 120 automatic reporting audit"
          git push origin HEAD:reporting/jogger-ecog120-automatic
