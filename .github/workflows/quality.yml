name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jogger-wltp-unit-diagnostic
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-wltp-efficiency-ranges
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Capture concise unit-test failure
        id: tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" -q > "${RUNNER_TEMP}/unit.log" 2>&1
          status=$?
          python - <<'PY'
          from pathlib import Path
          source = Path("${RUNNER_TEMP}/unit.log")
          text = source.read_text(encoding="utf-8", errors="replace")
          markers = [
              text.rfind("======================================================================"),
              text.rfind("Traceback (most recent call last):"),
          ]
          start = max(markers)
          if start < 0:
              lines = text.splitlines()
              excerpt = "\n".join(lines[-240:])
          else:
              excerpt = text[start:]
          Path("project/reviews/jogger-wltp-unit-test-diagnostic.log").write_text(
              excerpt.rstrip() + "\n",
              encoding="utf-8",
          )
          PY
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Restore Quality and commit diagnostic
        if: always()
        shell: bash
        run: |
          git fetch origin main --no-tags
          git show FETCH_HEAD:.github/workflows/quality.yml > .github/workflows/quality.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/quality.yml project/reviews/jogger-wltp-unit-test-diagnostic.log
          git commit -m "Capture Jogger WLTP unit-test diagnostic"
          git push origin HEAD:data/jogger-wltp-efficiency-ranges
          exit "${{ steps.tests.outputs.status }}"
