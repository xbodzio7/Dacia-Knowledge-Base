name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-equipment-availability
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDF text extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi

      - name: Patch and validate historical Sandero scope
        run: |
          set +e
          set -o pipefail
          {
            python - <<'PY'
          from pathlib import Path
          changed = 0
          for path in sorted(Path('tests').glob('test_sandero*.py')):
              text = path.read_text(encoding='utf-8')
              updated = text.replace('.startswith("duster_iii_")', '.startswith(("duster_iii_", "jogger_"))')
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed += 1
          if changed != 11:
              raise RuntimeError(f'expected 11 Sandero test files to change, found {changed}')
          PY
            python tools/import_jogger_equipment_availability.py --check
            python -m unittest discover -s tests -p "test_*.py" -q
            python tools/dkb.py project-state --check
            python tools/dkb.py quality --concise --database "${RUNNER_TEMP}/dkb.sqlite" --log-file "${RUNNER_TEMP}/quality.log" --summary-json "${RUNNER_TEMP}/quality-summary.json"
          } 2>&1 | tee jogger-equipment-materializer.log
          status=${PIPESTATUS[0]}
          echo "$status" > .jogger-equipment-patch-status
          exit 0

      - name: Commit patch and restore standard Quality
        if: always()
        run: |
          status=$(cat .jogger-equipment-patch-status 2>/dev/null || echo 1)
          git fetch origin main
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f .jogger-equipment-patch-status
          rm -f project/audits/jogger-equipment-materializer.log
          if [ "$status" -eq 0 ]; then
            rm -f jogger-equipment-materializer.log
          else
            mkdir -p project/audits
            mv jogger-equipment-materializer.log project/audits/jogger-equipment-materializer.log
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: preserve Sandero availability scope after Jogger import"
          git push origin HEAD:data/jogger-equipment-availability
          exit "$status"
