name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v7
        with:
          ref: review/jogger-equipment-matrix-intake
          fetch-depth: 0
          persist-credentials: true

      - name: Audit candidate denominator
        run: python tools/_tmp_audit_jogger_equipment_candidates.py || true

      - name: Restore Quality and commit audit
        if: always()
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f tools/_tmp_audit_jogger_equipment_candidates.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/quality.yml project/audits/jogger-equipment-candidate-audit.txt tools/_tmp_audit_jogger_equipment_candidates.py
          git commit -m "ci: capture Jogger equipment candidate audit"
          git push origin HEAD:review/jogger-equipment-matrix-intake
