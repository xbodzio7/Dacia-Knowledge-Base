name: Quality

on:
  push:
    branches:
      - main
      - "dev/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Install PDF text extraction backend
        if: matrix.python-version == '3.13'
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi
          pdftotext -v

      - name: Compile Python sources
        if: matrix.python-version == '3.10'
        run: python -m compileall -q tools scripts tests

      - name: Run unit tests
        if: matrix.python-version == '3.10'
        run: |
          python -m unittest discover \
            -s tests \
            -p "test_*.py" \
            -q

      - name: Run orchestration contract tests
        if: matrix.python-version == '3.10'
        run: |
          python -m unittest -q \
            tests.project_state_contract \
            tests.autonomy_policy_contract \
            tests.quality_artifact_manifest_contract \
            tests.configuration_comparison_context_filter_contract \
            tests.configuration_comparison_pair_summary_contract

      - name: Check canonical project state
        if: matrix.python-version == '3.10'
        run: python tools/dkb.py project-state --check

      - name: Run full quality gate
        if: matrix.python-version == '3.13'
        run: |
          python tools/dkb.py quality \
            --concise \
            --database "${RUNNER_TEMP}/dacia_knowledge_base.sqlite" \
            --log-file "${RUNNER_TEMP}/quality.log" \
            --summary-json "${RUNNER_TEMP}/quality-summary.json"

      - name: Generate configuration comparison item catalog artifact
        if: matrix.python-version == '3.13'
        run: |
          python tools/dkb.py configuration-comparison-item-catalog \
            --csv "${RUNNER_TEMP}/configuration-comparison-item-catalog.csv"

      - name: Generate configuration comparison pair summary artifact
        if: matrix.python-version == '3.13'
        run: |
          python tools/dkb.py configuration-comparison-pair-summary \
            --csv "${RUNNER_TEMP}/configuration-comparison-pair-summary.csv"

      - name: Generate Quality artifact manifest
        if: matrix.python-version == '3.13'
        run: |
          python tools/quality_artifact_manifest.py \
            --output "${RUNNER_TEMP}/artifact-manifest.json" \
            --file "${RUNNER_TEMP}/dacia_knowledge_base.sqlite" \
            --file "${RUNNER_TEMP}/quality.log" \
            --file "${RUNNER_TEMP}/quality-summary.json" \
            --file "${RUNNER_TEMP}/documentation-baseline.json" \
            --file "${RUNNER_TEMP}/documentation-baseline.md" \
            --file "${RUNNER_TEMP}/configuration-completeness.json" \
            --file "${RUNNER_TEMP}/configuration-completeness.md" \
            --file "${RUNNER_TEMP}/source-coverage.json" \
            --file "${RUNNER_TEMP}/source-coverage.md" \
            --file "${RUNNER_TEMP}/configuration-gap-triage.json" \
            --file "${RUNNER_TEMP}/configuration-gap-triage.md" \
            --file "${RUNNER_TEMP}/configuration-gap-source-review.json" \
            --file "${RUNNER_TEMP}/configuration-gap-source-review.md" \
            --file "${RUNNER_TEMP}/configuration-gap-evidence.json" \
            --file "${RUNNER_TEMP}/configuration-gap-evidence.md" \
            --file "${RUNNER_TEMP}/configuration-gap-resolution-plan.json" \
            --file "${RUNNER_TEMP}/configuration-gap-resolution-plan.md" \
            --file "${RUNNER_TEMP}/configuration-comparison.json" \
            --file "${RUNNER_TEMP}/configuration-comparison.md" \
            --file "${RUNNER_TEMP}/configuration-comparison-differences.csv" \
            --file "${RUNNER_TEMP}/configuration-comparison-item-catalog.csv" \
            --file "${RUNNER_TEMP}/configuration-comparison-pair-summary.csv" \
            --file "reports/validation_report.md"

      - name: Upload generated artifacts
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: dacia-knowledge-base-build
          path: |
            ${{ runner.temp }}/dacia_knowledge_base.sqlite
            ${{ runner.temp }}/quality.log
            ${{ runner.temp }}/quality-summary.json
            ${{ runner.temp }}/documentation-baseline.json
            ${{ runner.temp }}/documentation-baseline.md
            ${{ runner.temp }}/configuration-completeness.json
            ${{ runner.temp }}/configuration-completeness.md
            ${{ runner.temp }}/source-coverage.json
            ${{ runner.temp }}/source-coverage.md
            ${{ runner.temp }}/configuration-gap-triage.json
            ${{ runner.temp }}/configuration-gap-triage.md
            ${{ runner.temp }}/configuration-gap-source-review.json
            ${{ runner.temp }}/configuration-gap-source-review.md
            ${{ runner.temp }}/configuration-gap-evidence.json
            ${{ runner.temp }}/configuration-gap-evidence.md
            ${{ runner.temp }}/configuration-gap-resolution-plan.json
            ${{ runner.temp }}/configuration-gap-resolution-plan.md
            ${{ runner.temp }}/configuration-comparison.json
            ${{ runner.temp }}/configuration-comparison.md
            ${{ runner.temp }}/configuration-comparison-differences.csv
            ${{ runner.temp }}/configuration-comparison-item-catalog.csv
            ${{ runner.temp }}/configuration-comparison-pair-summary.csv
            ${{ runner.temp }}/artifact-manifest.json
            reports/validation_report.md
          if-no-files-found: error
          retention-days: 7

  workflow-windows:
    name: Package workflow / Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Show Python version
        run: python --version

      - name: Run package publishing tests
        run: |
          python -m unittest -q `
            tests.test_package_workflow `
            tests.test_package_receipt `
            tests.test_package_publish `
            tests.test_dkb_cli `
            tests.test_quality `
            tests.project_state_contract `
            tests.autonomy_policy_contract `
            tests.quality_artifact_manifest_contract `
            tests.configuration_comparison_context_filter_contract `
            tests.configuration_comparison_pair_summary_contract

      - name: Check canonical project state
        run: python tools/dkb.py project-state --check

  materialize-duster-technical:
    name: Materialize Duster technical specifications
    if: github.event_name == 'pull_request' && github.head_ref == 'data/duster-technical-specification-import'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: data/duster-technical-specification-import
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDF text extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi

      - name: Generate source-backed specifications and rows
        run: python tools/duster_technical_specifications.py --apply

      - name: Install canonical state and narrative documentation
        run: |
          mv project/state.next.json project/state.json
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              text = path.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"unexpected match count in {path}: {text.count(old)}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          readme = Path("README.md")
          price = (
              "Dla wszystkich 24 konfiguracji Duster zapisano również datowane ceny katalogowe\n"
              "brutto obowiązujące od 6 lutego 2026 r. Promocyjny rabat oraz korzyści finansowania\n"
              "nie są cenami katalogowymi i nie zostały zaimportowane.\n"
          )
          technical = (
              "\nTechniczne tabele stron 8-9 dostarczają 392 datowane obserwacje dla 17\n"
              "kanonicznych atrybutów Duster. Import zachowuje rozróżnienie LPG i benzyny,\n"
              "oddzielne moce silnika spalinowego, silnika trakcyjnego i HSG oraz pomija\n"
              "wartości zależne od wersji, których źródło nie przypisuje do konkretnego trimu.\n"
          )
          replace_once(readme, price, price + technical)

          changelog = Path("CHANGELOG.md")
          marker = "## Unreleased\n\n### Added\n\n"
          bullet = (
              "* Source-backed Duster III technical import with 392 observations across 17 canonical "
              "attributes, explicit fuel context and conservative exclusion of trim-ambiguous values.\n"
          )
          replace_once(changelog, marker, marker + bullet)
          PY
          python tools/dkb.py project-state --apply

      - name: Verify generated package
        run: |
          python tools/duster_technical_specifications.py
          python -m unittest -q tests.test_duster_technical_specifications
          python tools/dkb.py validate --concise
          python tools/dkb.py project-state --check

      - name: Publish clean package branch
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f project/state.next.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "data: import Duster technical specifications"
          git push origin HEAD:data/duster-technical-specification-import
