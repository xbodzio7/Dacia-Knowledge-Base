name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: reporting/jogger-ecog120-automatic
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install PDF text extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi
      - name: Finalize package and capture result
        run: |
          set +e
          python tools/_tmp_finalize_jogger_ecog120_reporting.py > /tmp/finalize.log 2>&1
          status=$?
          set -e
          tail -n 160 /tmp/finalize.log > project/audits/jogger-ecog120-automatic-finalize.log
          echo "exit_status=${status}" >> project/audits/jogger-ecog120-automatic-finalize.log
      - name: Commit non-workflow result
        run: |
          git checkout origin/main -- .github/workflows/quality.yml
          rm -f tools/_tmp_finalize_jogger_ecog120_reporting.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "reporting: synchronize Jogger Eco-G 120 scope"
          git push origin HEAD:reporting/jogger-ecog120-automatic
