name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v7
        with:
          ref: review/jogger-equipment-matrix-intake
          fetch-depth: 0

      - name: Install PDF extraction backend
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils

      - name: Extract equipment matrix layout
        shell: bash
        run: |
          pdftotext -f 4 -l 5 -layout \
            "PDF/Cenniki/DACIA JOGGER cennik MY26 20260401.pdf" \
            project/reviews/jogger-equipment-matrix-layout.txt

      - name: Restore Quality and commit audit
        shell: bash
        run: |
          git fetch origin main --no-tags
          git show FETCH_HEAD:.github/workflows/quality.yml > .github/workflows/quality.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Audit Jogger equipment matrix layout"
          git push origin HEAD:review/jogger-equipment-matrix-intake
