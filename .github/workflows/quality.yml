name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v7
        with:
          ref: review/jogger-reporting-scope-selection
          fetch-depth: 0
          persist-credentials: true

      - name: Audit reporting groups
        run: python tools/_tmp_audit_jogger_reporting_groups.py

      - name: Restore Quality and commit audit
        if: always()
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f tools/_tmp_audit_jogger_reporting_groups.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: capture Jogger reporting group audit"
          git push origin HEAD:review/jogger-reporting-scope-selection
