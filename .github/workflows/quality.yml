name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v7
        with:
          ref: review/jogger-reporting-scope-selection
          fetch-depth: 0
          persist-credentials: true

      - name: Audit reporting groups
        run: |
          python - <<'PY'
          import csv, json
          from collections import Counter
          from itertools import combinations
          from pathlib import Path

          root = Path('.')
          master = root / 'data/master'
          date = '2026-04-01'
          source = 'src_pl_jogger_price_my26_20260401'
          groups = {
              'ecog120-manual': '_ecog120_manual',
              'ecog120-automatic': '_ecog120_automatic',
              'tce110-manual': '_tce110_manual',
              'hybrid155-automatic': '_hybrid155_automatic',
          }
          def rows(name):
              with (master / name).open(encoding='utf-8-sig', newline='') as handle:
                  return list(csv.DictReader(handle))

          configurations = [row for row in rows('configurations.csv') if row['status'] == 'active' and row['code'].startswith('jogger_')]
          scalar = rows('configuration_attribute_values.csv')
          ranges = rows('configuration_attribute_value_ranges.csv')
          availability = rows('configuration_attribute_availability.csv')
          prices = rows('configuration_prices.csv')
          result = {}
          for group, token in groups.items():
              selected = sorted(row['code'] for row in configurations if token in row['code'])
              slot_sets = {}
              for code in selected:
                  slots = {(row['attribute_code'], row['fuel_type_code'], 'scalar') for row in scalar if row['configuration_code'] == code and row['observation_date'] == date and row['source_code'] == source}
                  slots |= {(row['attribute_code'], row['fuel_type_code'], 'range') for row in ranges if row['configuration_code'] == code and row['observation_date'] == date and row['source_code'] == source}
                  slot_sets[code] = slots
              values = list(slot_sets.values())
              intersection = set.intersection(*values) if values else set()
              union = set.union(*values) if values else set()
              equipment = {code: sum(row['configuration_code'] == code and row['observation_date'] == date and row['source_code'] == source for row in availability) for code in selected}
              price = {code: sum(row['configuration_code'] == code and row['price_date'] == date and row['source_code'] == source for row in prices) for code in selected}
              statuses = Counter(row['availability_status'] for row in availability if row['configuration_code'] in selected and row['observation_date'] == date and row['source_code'] == source)
              result[group] = {
                  'configurations': selected,
                  'configuration_count': len(selected),
                  'pair_count': len(list(combinations(selected, 2))),
                  'technical_slot_counts': {code: len(slots) for code, slots in slot_sets.items()},
                  'technical_sets_identical': intersection == union,
                  'technical_slot_count': len(intersection),
                  'scalar_slot_count': sum(kind == 'scalar' for _, _, kind in intersection),
                  'range_slot_count': sum(kind == 'range' for _, _, kind in intersection),
                  'technical_observation_count': len(intersection) * len(selected),
                  'technical_slots': [{'attribute_code': attribute, 'fuel_type_code': fuel, 'kind': kind} for attribute, fuel, kind in sorted(intersection)],
                  'equipment_counts': equipment,
                  'equipment_observation_count': sum(equipment.values()),
                  'equipment_status_counts': dict(sorted(statuses.items())),
                  'price_counts': price,
                  'price_observation_count': sum(price.values()),
                  'complete': bool(selected) and intersection == union and set(equipment.values()) == {53} and set(price.values()) == {1},
              }
          output = root / 'project/audits/jogger-reporting-groups.json'
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(result, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          if len(configurations) != 22 or not all(item['complete'] for item in result.values()):
              raise SystemExit(1)
          PY

      - name: Restore Quality and commit audit
        if: always()
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/quality.yml > .github/workflows/quality.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: capture corrected Jogger reporting group audit"
          git push origin HEAD:review/jogger-reporting-scope-selection
