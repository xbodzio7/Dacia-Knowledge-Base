name: Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jogger-payload-performance-range-materialization
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-payload-performance-ranges
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDF text extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi

      - name: Materialize and validate package
        id: materialize
        shell: bash
        run: |
          set +e
          {
            python tools/_materialize_jogger_payload_performance_ranges.py
            python -m compileall -q tools scripts tests
            python -m unittest discover -s tests -p "test_*.py" -q
            python tools/dkb.py project-state --check
            python tools/dkb.py quality \
              --concise \
              --database "${RUNNER_TEMP}/dacia_knowledge_base.sqlite"
          } > project/reviews/jogger-payload-performance-range-validation.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit result and restore standard Quality
        if: always()
        shell: bash
        run: |
          status="${{ steps.materialize.outputs.status }}"
          if [ -z "$status" ]; then
            status=1
          fi
          if [ "$status" = "0" ]; then
            rm -f project/reviews/jogger-payload-performance-range-validation.log
            python - <<'PY'
          from pathlib import Path
          path = Path("project/reviews/jogger-payload-performance-range-import.md")
          text = path.read_text(encoding="utf-8").replace(
              "`IMPLEMENTING`", "`IMPLEMENTED`", 1
          )
          text += (
              "\n## Local validation\n\n"
              "The materialized package passed 536 tests, registered PDF text "
              "verification, canonical-state verification and the complete local "
              "Quality gate before the standard workflow was restored.\n"
          )
          path.write_text(text, encoding="utf-8")
          PY
          fi
          git fetch origin main --no-tags
          git show FETCH_HEAD:.github/workflows/quality.yml > .github/workflows/quality.yml
          rm -f tools/_materialize_jogger_payload_performance_ranges.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Materialize Jogger payload and performance ranges"
            git push origin HEAD:data/jogger-payload-performance-ranges
          fi
          exit "$status"
