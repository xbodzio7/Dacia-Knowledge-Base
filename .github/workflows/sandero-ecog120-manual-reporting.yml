name: Sandero Eco-G 120 Manual Reporting

on:
  pull_request:
    paths-ignore:
      - project/state.json
      - project/STATE_SUMMARY.md
      - project/reviews/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reporting:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Generate reporting artifacts
        run: |
          python tools/dkb.py configuration-completeness \
            --spec data/reporting/sandero_ecog120_manual_completeness.json \
            --as-of 2026-06-26 \
            --json "${RUNNER_TEMP}/sandero-ecog120-manual-completeness.json" \
            --markdown "${RUNNER_TEMP}/sandero-ecog120-manual-completeness.md"
          python tools/dkb.py source-coverage \
            --spec data/reporting/sandero_ecog120_manual_completeness.json \
            --as-of 2026-06-26 \
            --json "${RUNNER_TEMP}/sandero-ecog120-manual-source-coverage.json" \
            --markdown "${RUNNER_TEMP}/sandero-ecog120-manual-source-coverage.md"
          python tools/dkb.py configuration-comparison \
            --completeness-spec data/reporting/sandero_ecog120_manual_completeness.json \
            --evidence-spec data/reporting/sandero_ecog120_manual_gap_evidence.json \
            --as-of 2026-06-26 \
            --json "${RUNNER_TEMP}/sandero-ecog120-manual-comparison.json" \
            --markdown "${RUNNER_TEMP}/sandero-ecog120-manual-comparison.md" \
            --csv "${RUNNER_TEMP}/sandero-ecog120-manual-comparison-differences.csv"
      - name: Generate artifact manifest
        run: |
          python tools/quality_artifact_manifest.py \
            --output "${RUNNER_TEMP}/sandero-ecog120-manual-artifact-manifest.json" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-completeness.json" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-completeness.md" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-source-coverage.json" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-source-coverage.md" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-comparison.json" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-comparison.md" \
            --file "${RUNNER_TEMP}/sandero-ecog120-manual-comparison-differences.csv"
      - name: Upload reporting artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sandero-ecog120-manual-reporting
          path: |
            ${{ runner.temp }}/sandero-ecog120-manual-completeness.json
            ${{ runner.temp }}/sandero-ecog120-manual-completeness.md
            ${{ runner.temp }}/sandero-ecog120-manual-source-coverage.json
            ${{ runner.temp }}/sandero-ecog120-manual-source-coverage.md
            ${{ runner.temp }}/sandero-ecog120-manual-comparison.json
            ${{ runner.temp }}/sandero-ecog120-manual-comparison.md
            ${{ runner.temp }}/sandero-ecog120-manual-comparison-differences.csv
            ${{ runner.temp }}/sandero-ecog120-manual-artifact-manifest.json
          if-no-files-found: error
          retention-days: 7
