name: Jogger Cargo Measurements

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: jogger-cargo-measurements
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-cargo-measurements
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDF extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi

      - name: Materialize cargo measurement package
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          root = Path.cwd()
          master = root / "data" / "master"
          spec_dir = root / "data" / "imports" / "configuration_values"

          attributes_path = master / "attributes.csv"
          with attributes_path.open("r", encoding="utf-8-sig", newline="") as handle:
              reader = csv.DictReader(handle)
              attributes = list(reader)
              fieldnames = list(reader.fieldnames or [])
          expected_attributes = [
              {
                  "id": "360",
                  "code": "cargo_volume_vda_to_luggage_cover",
                  "category": "Capacities",
                  "name": "Cargo volume VDA to luggage-cover height",
                  "data_type": "integer",
                  "unit": "L",
                  "description": (
                      "Luggage compartment volume measured according to VDA up to "
                      "the source-stated luggage-cover or roller-blind height"
                  ),
                  "status": "active",
              },
              {
                  "id": "361",
                  "code": "cargo_volume_vda_to_seatback",
                  "category": "Capacities",
                  "name": "Cargo volume VDA to seat-back height",
                  "data_type": "integer",
                  "unit": "L",
                  "description": (
                      "Luggage compartment volume measured according to VDA up to "
                      "the source-stated seat-back height"
                  ),
                  "status": "active",
              },
          ]
          by_code = {row["code"]: row for row in attributes}
          by_id = {row["id"]: row for row in attributes}
          for expected in expected_attributes:
              existing = by_code.get(expected["code"])
              if existing is None:
                  if expected["id"] in by_id:
                      raise SystemExit(f"attribute ID {expected['id']} is already used")
                  attributes.append(expected)
                  by_code[expected["code"]] = expected
                  by_id[expected["id"]] = expected
              elif existing != expected:
                  raise SystemExit(f"attribute differs: {existing}")
          with attributes_path.open("w", encoding="utf-8", newline="") as handle:
              writer = csv.DictWriter(handle, fieldnames=fieldnames, lineterminator="\n")
              writer.writeheader()
              writer.writerows(attributes)

          five_seat = [
              "jogger_essential_5seat_ecog120_manual",
              "jogger_expression_5seat_ecog120_manual",
              "jogger_extreme_5seat_ecog120_manual",
              "jogger_extreme_5seat_ecog120_automatic",
              "jogger_journey_5seat_ecog120_automatic",
              "jogger_expression_5seat_tce110_manual",
              "jogger_extreme_5seat_tce110_manual",
              "jogger_journey_5seat_tce110_manual",
              "jogger_expression_5seat_hybrid155_automatic",
              "jogger_extreme_5seat_hybrid155_automatic",
              "jogger_journey_5seat_hybrid155_automatic",
          ]
          seven_seat = [code.replace("_5seat_", "_7seat_") for code in five_seat]

          def write_spec(
              filename: str,
              id_start: int,
              attribute_code: str,
              five_value: str,
              seven_value: str,
              source_text: str,
              boundary: str,
              source_row: str,
          ) -> None:
              rows = []
              for configuration in five_seat:
                  rows.append({
                      "configuration_code": configuration,
                      "source_code": "src_pl_jogger_price_my26_20260401",
                      "value": five_value,
                      "source_text": source_text,
                  })
              for configuration in seven_seat:
                  rows.append({
                      "configuration_code": configuration,
                      "source_code": "src_pl_jogger_price_my26_20260401",
                      "value": seven_value,
                      "source_text": source_text,
                  })
              value = {
                  "version": 1,
                  "kind": "configuration_attribute_values",
                  "id_start": id_start,
                  "attribute_code": attribute_code,
                  "attribute_contract": {
                      "data_type": "integer",
                      "unit": "L",
                      "status": "active",
                  },
                  "observation_date": "2026-04-01",
                  "fuel_type_code": "",
                  "source_page": 6,
                  "source_section": "BAGAŻNIK",
                  "notes_template": (
                      "Source page {page}, section {section}: VDA cargo volume "
                      f"{boundary}; source row {source_row}; {{source_text}}"
                  ),
                  "rows": rows,
              }
              (spec_dir / filename).write_text(
                  json.dumps(value, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
                  newline="\n",
              )

          write_spec(
              "jogger-page6-cargo-vda-luggage-cover-20260401.json",
              1129,
              "cargo_volume_vda_to_luggage_cover",
              "708",
              "160",
              "708/160",
              "to luggage-cover height",
              "Pojemność bagażnika do wysokości rolety w dm³ (wg normy VDA) 5-m. / 7-m.",
          )
          write_spec(
              "jogger-page6-cargo-vda-seatback-20260401.json",
              1151,
              "cargo_volume_vda_to_seatback",
              "607",
              "506",
              "607/506",
              "to seat-back height",
              "Pojemność bagażnika do wysokości oparcia w dm³ (wg normy VDA) 5-m. / 7-m.",
          )

          duster_test = root / "tests" / "test_duster_technical_specifications.py"
          text = duster_test.read_text(encoding="utf-8")
          old = (
              '        self.assertEqual(len(self.all_values), 1128)\n'
              '        self.assertEqual(len(list(SPECS.glob("*.json"))), 65)\n'
          )
          new = (
              '        self.assertEqual(len(self.all_values), 1172)\n'
              '        self.assertEqual(len(list(SPECS.glob("*.json"))), 67)\n'
          )
          if old not in text:
              raise SystemExit("repository total contract marker not found")
          duster_test.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          jogger_test = root / "tests" / "test_jogger_technical_specifications.py"
          text = jogger_test.read_text(encoding="utf-8")
          old = (
              '                "jogger-page6-minimum-kerb-weight-20260401.json",\n'
              '            }\n'
          )
          new = (
              '                "jogger-page6-minimum-kerb-weight-20260401.json",\n'
              '                "jogger-page6-cargo-vda-luggage-cover-20260401.json",\n'
              '                "jogger-page6-cargo-vda-seatback-20260401.json",\n'
              '            }\n'
          )
          if old not in text:
              raise SystemExit("Jogger denominator exclusion marker not found")
          jogger_test.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          sandero_test = root / "tests" / "test_sandero_total_valve_count_model.py"
          text = sandero_test.read_text(encoding="utf-8")
          old = "        self.assertEqual(len(self.attributes), 352)\n"
          new = "        self.assertEqual(len(self.attributes), 354)\n"
          if old not in text:
              raise SystemExit("canonical attribute total marker not found")
          sandero_test.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          readme_path = root / "README.md"
          readme = readme_path.read_text(encoding="utf-8")
          paragraph = (
              "Pomiary bagażnika Jogger zachowują dwie odrębne granice VDA: "
              "do wysokości rolety i do wysokości oparcia. Pakiet dodaje dwa "
              "precyzyjne atrybuty oraz 44 obserwacje bez nadpisywania ogólnych "
              "`boot_capacity` ani `cargo_volume_vda`.\n\n"
          )
          marker = "<!-- dkb:documentation-baseline:readme:start -->"
          if marker not in readme:
              raise SystemExit("README baseline marker not found")
          if paragraph not in readme:
              readme = readme.replace(marker, paragraph + marker, 1)
          readme_path.write_text(readme, encoding="utf-8", newline="\n")

          changelog_path = root / "CHANGELOG.md"
          changelog = changelog_path.read_text(encoding="utf-8")
          bullet = (
              "* Jogger MY26 cargo measurements modeled as two VDA height-specific "
              "attributes with 44 source-backed observations.\n"
          )
          marker = "### Added\n\n"
          if marker not in changelog:
              raise SystemExit("CHANGELOG Added marker not found")
          if bullet not in changelog:
              changelog = changelog.replace(marker, marker + bullet, 1)
          changelog_path.write_text(changelog, encoding="utf-8", newline="\n")
          PY
          python tools/import_configuration_values.py \
            --spec data/imports/configuration_values/jogger-page6-cargo-vda-luggage-cover-20260401.json \
            --apply
          python tools/import_configuration_values.py \
            --spec data/imports/configuration_values/jogger-page6-cargo-vda-seatback-20260401.json \
            --apply
          python tools/dkb.py documentation-baseline --apply
          python tools/dkb.py project-state --apply

      - name: Verify complete package
        shell: bash
        run: |
          set -euo pipefail
          python tools/import_configuration_values.py \
            --spec data/imports/configuration_values/jogger-page6-cargo-vda-luggage-cover-20260401.json \
            --verify
          python tools/import_configuration_values.py \
            --spec data/imports/configuration_values/jogger-page6-cargo-vda-seatback-20260401.json \
            --verify
          python -m compileall -q tools scripts tests
          python -m unittest discover -s tests -p "test_*.py" -q
          python -m unittest -q \
            tests.project_state_contract \
            tests.autonomy_policy_contract \
            tests.quality_artifact_manifest_contract \
            tests.configuration_comparison_context_filter_contract \
            tests.configuration_comparison_pair_summary_contract
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python tools/dkb.py quality \
            --concise \
            --database "${RUNNER_TEMP}/dacia_knowledge_base.sqlite" \
            --log-file "${RUNNER_TEMP}/quality.log" \
            --summary-json "${RUNNER_TEMP}/quality-summary.json"

      - name: Commit final package
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/jogger-cargo-measurements.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "data: add Jogger cargo measurements"
          git push origin HEAD:data/jogger-cargo-measurements
