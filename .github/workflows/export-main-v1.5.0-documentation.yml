name: Export main v1.5.0 documentation snapshot

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'transport/export-main-v1.5.0-documentation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact main commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: 7f325d254b68eb495204c01c075727ee34893e1f
          persist-credentials: false
          fetch-depth: 0

      - name: Record exact source tree identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "7f325d254b68eb495204c01c075727ee34893e1f"
          git diff --quiet
          git diff --cached --quiet
          git rev-parse 'HEAD^{tree}' | tee /tmp/main-tree-sha.txt

      - name: Upload exact source tree identity
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dkb-main-tree-7f325d2
          path: /tmp/main-tree-sha.txt
          if-no-files-found: error
          retention-days: 7
