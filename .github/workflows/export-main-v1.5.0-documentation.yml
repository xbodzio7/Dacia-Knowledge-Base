name: Publish v1.5.0 documentation commit

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: publish-v1.5.0-documentation-commit
  cancel-in-progress: false

jobs:
  publish:
    if: github.head_ref == 'transport/export-main-v1.5.0-documentation'
    runs-on: ubuntu-latest
    steps:
      - name: Check out transport branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: transport
          persist-credentials: false
          fetch-depth: 1

      - name: Check out exact main commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: 7f325d254b68eb495204c01c075727ee34893e1f
          path: repo
          fetch-depth: 0

      - name: Apply and verify documentation package
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "7f325d254b68eb495204c01c075727ee34893e1f"
          git diff --quiet
          git diff --cached --quiet
          git switch -c docs/record-data-products-v1.5.0-publication
          git apply --index ../transport/.github/transport/data-products-v1.5.0-documentation.patch
          git diff --cached --check
          cat > "$RUNNER_TEMP/expected-paths.txt" <<'EOF'
          CHANGELOG.md
          README.md
          project/ROADMAP.md
          project/STATE_SUMMARY.md
          project/packages/official-configurator-sandero-configuration-import.md
          project/releases/data-products-v1.5.0-publication-audit.json
          project/releases/data-products-v1.5.0.md
          project/state.json
          EOF
          sed -i 's/^          //' "$RUNNER_TEMP/expected-paths.txt"
          git diff --cached --name-only | sort > "$RUNNER_TEMP/actual-paths.txt"
          sort -o "$RUNNER_TEMP/expected-paths.txt" "$RUNNER_TEMP/expected-paths.txt"
          diff -u "$RUNNER_TEMP/expected-paths.txt" "$RUNNER_TEMP/actual-paths.txt"
          python tools/dkb.py project-state --check
          python -m unittest discover -s tests -p 'test_*.py' -q

      - name: Create and push one logical commit
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(release): record data-products-v1.5.0 publication"
          test "$(git rev-list --count 7f325d254b68eb495204c01c075727ee34893e1f..HEAD)" -eq 1
          git rev-parse HEAD | tee "$RUNNER_TEMP/docs-commit-sha.txt"
          git push origin HEAD:refs/heads/docs/record-data-products-v1.5.0-publication

      - name: Upload commit identity
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: data-products-v1.5.0-documentation-commit
          path: ${{ runner.temp }}/docs-commit-sha.txt
          if-no-files-found: error
          retention-days: 7
