name: Publish data products v1.3.0

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: publish-data-products-v1.3.0
  cancel-in-progress: false

jobs:
  publish:
    if: github.head_ref == 'release/data-products-v1.3.0-authorized'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: data-products-v1.3.0
      RELEASE_VERSION: 1.3.0
      RELEASE_COMMIT: beb2151853b2d3de8837ff7c5e8d2b55b78af76e
      ARCHIVE_SHA256: 6e5db817a1cd003999914df510faa8b4a04803415af8ef249778f74a2fdfc41e
      MANIFEST_SHA256: c8ec6877bebb1b0301876d482ee947be9d93c2d0886feef3649ad9d3095862a0
      CHECKSUMS_SHA256: 31c0e99f64b93302ff49e485f0647df9199aa66483ffc5082d82bbcb47d80c5e
    steps:
      - name: Check out exact green main commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: beb2151853b2d3de8837ff7c5e8d2b55b78af76e
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Confirm exact source identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          git diff --quiet
          git diff --cached --quiet

      - name: Build and independently verify release assets
        shell: bash
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/data-products-v1.3.0"
          python tools/dkb.py data-product-release \
            --version "$RELEASE_VERSION" \
            --commit-sha "$RELEASE_COMMIT" \
            --output-directory "$output"
          python tools/dkb.py data-product-release \
            --verify \
            --version "$RELEASE_VERSION" \
            --commit-sha "$RELEASE_COMMIT" \
            --output-directory "$output"
          test "$(sha256sum "$output/dacia-knowledge-base-data-products-v1.3.0.zip" | awk '{print $1}')" = "$ARCHIVE_SHA256"
          test "$(sha256sum "$output/data-product-release-manifest.json" | awk '{print $1}')" = "$MANIFEST_SHA256"
          test "$(sha256sum "$output/SHA256SUMS" | awk '{print $1}')" = "$CHECKSUMS_SHA256"
          test "$(stat -c %s "$output/dacia-knowledge-base-data-products-v1.3.0.zip")" -eq 45190680
          test "$(stat -c %s "$output/data-product-release-manifest.json")" -eq 18215
          test "$(stat -c %s "$output/SHA256SUMS")" -eq 213

      - name: Confirm immutable identity is unused
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Publish final GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/data-products-v1.3.0"
          cat > "$RUNNER_TEMP/release-notes.md" <<'EOF'
          # Dacia Knowledge Base Data Products v1.3.0

          Minor release extending the offline configuration browser and source registry.

          - vertical buyer-oriented filter sections;
          - model- and trim-specific offline silhouettes;
          - model and version names at the top of result cards;
          - complete Polish equipment category labels;
          - comparison of all source-recorded equipment for any number of selected configurations;
          - `Pokaż tylko różnice` comparison mode;
          - technical configuration IDs removed from the buyer-facing view;
          - dated official Dacia Poland configurator source intake for five active models.

          The official web configurators are recorded as dynamic dated sources. Equipment and prices are not inferred across trims or powertrains without explicit source confirmation.

          All 15 pull-request workflows passed on the source commit, including 703 tests, Windows, HTML comparison, workbook and versioned release verification.
          EOF
          sed -i 's/^          //' "$RUNNER_TEMP/release-notes.md"
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_COMMIT" \
            --title "$RELEASE_TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            "$output/dacia-knowledge-base-data-products-v1.3.0.zip" \
            "$output/data-product-release-manifest.json" \
            "$output/SHA256SUMS"

      - name: Verify published tag and assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_COMMIT"
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName,targetCommitish,assets > "$RUNNER_TEMP/release.json"
          python - "$RUNNER_TEMP/release.json" <<'PY'
          import json, sys
          payload = json.load(open(sys.argv[1], encoding='utf-8'))
          assert payload['tagName'] == 'data-products-v1.3.0'
          assert payload['isDraft'] is False
          assert payload['isPrerelease'] is False
          names = sorted(asset['name'] for asset in payload['assets'])
          assert names == ['SHA256SUMS', 'dacia-knowledge-base-data-products-v1.3.0.zip', 'data-product-release-manifest.json']
          PY
