name: Jogger Hybrid Enum Contract Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: jogger-hybrid-enum-contract-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v7
        with:
          ref: review/jogger-hybrid-system-semantics
          fetch-depth: 0

      - name: Capture enum validation contracts
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Enum file references"
            grep -RIn --exclude='jogger-hybrid-enum-contract-audit.txt' \
              -E 'injection_types\.csv|transmission_type\.csv|emission_standards\.csv' \
              tools tests project data || true
            echo
            echo "# Enum validation implementation"
            grep -RIn --exclude='jogger-hybrid-enum-contract-audit.txt' \
              -E 'enum.*file|enum.*mapping|ENUM|enums/' \
              tools scripts tests | head -n 300 || true
          } > project/reviews/jogger-hybrid-enum-contract-audit.txt
          test -s project/reviews/jogger-hybrid-enum-contract-audit.txt

      - name: Commit audit and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/jogger-hybrid-enum-contract-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "review: capture hybrid enum contracts"
          git push origin HEAD:review/jogger-hybrid-system-semantics
