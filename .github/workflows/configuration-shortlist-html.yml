name: Configuration Shortlist HTML

on:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  shortlist-html:
    runs-on: ubuntu-latest
    steps:
      - name: Extract failed Quality log sections
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/29818935213/logs" \
            -o "${RUNNER_TEMP}/quality-logs.zip"
          mkdir -p "${RUNNER_TEMP}/quality-logs"
          unzip -q "${RUNNER_TEMP}/quality-logs.zip" -d "${RUNNER_TEMP}/quality-logs"
          {
            grep -RIn -A35 -B8 -E '(^|[^A-Z])(FAIL|ERROR):|FAILED \(|AssertionError|Traceback \(most recent call last\)' "${RUNNER_TEMP}/quality-logs" || true
          } > "${RUNNER_TEMP}/quality-failures.txt"
          find "${RUNNER_TEMP}/quality-logs" -type f -maxdepth 3 -printf '%p\n' > "${RUNNER_TEMP}/quality-log-files.txt"
          cat "${RUNNER_TEMP}/quality-failures.txt"
      - name: Upload extracted diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: configuration-shortlist-html
          path: |
            ${{ runner.temp }}/quality-failures.txt
            ${{ runner.temp }}/quality-log-files.txt
          if-no-files-found: error
          retention-days: 1
