name: Temporary Finalize Additive Source Mapping Contracts

on:
  push:
    branches:
      - agent/register-sandero-stepway-price-20260703

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v4
        with:
          ref: agent/register-sandero-stepway-price-20260703
          fetch-depth: 0
      - name: Update additive source mapping assertions
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          python - <<'PY'
          from pathlib import Path

          direct_expected = '''        self.assertEqual(
              {
                  row["configuration_code"]: row["source_code"]
                  for row in self.source_configurations
                  if row["configuration_code"] in EXPECTED
              },
              EXPECTED,
          )'''
          direct_expected_replacement = '''        registered_pairs = {
              (row["configuration_code"], row["source_code"])
              for row in self.source_configurations
          }
          self.assertTrue(set(EXPECTED.items()) <= registered_pairs)'''
          for filename in (
              "tests/test_sandero_50_kmh_noise_level_values.py",
              "tests/test_sandero_euro_6e_bis_values.py",
              "tests/test_sandero_front_wheel_drive_values.py",
              "tests/test_sandero_number_of_doors_values.py",
          ):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if text.count(direct_expected) != 1:
                  raise SystemExit(f"expected one direct mapping assertion in {filename}")
              path.write_text(text.replace(direct_expected, direct_expected_replacement), encoding="utf-8")

          replacements = {
              "tests/test_sandero_exterior_colour_values.py": (
                  '''        actual = {
              row["configuration_code"]: row["source_code"]
              for row in self.source_configurations
              if row["configuration_code"] in EXPECTED
          }
          self.assertEqual(actual, EXPECTED)''',
                  '''        registered_pairs = {
              (row["configuration_code"], row["source_code"])
              for row in self.source_configurations
          }
          self.assertTrue(set(EXPECTED.items()) <= registered_pairs)''',
              ),
              "tests/test_sandero_standard_tyre_specification.py": (
                  '''        source_mapping = {
              row["configuration_code"]: row["source_code"]
              for row in self.source_configurations
              if row["configuration_code"] in EXPECTED
          }
          self.assertEqual(source_mapping, EXPECTED)''',
                  '''        registered_pairs = {
              (row["configuration_code"], row["source_code"])
              for row in self.source_configurations
          }
          self.assertTrue(set(EXPECTED.items()) <= registered_pairs)''',
              ),
              "tests/test_sandero_total_valve_count_model.py": (
                  '''        self.assertEqual(
              {
                  row["configuration_code"]: row["source_code"]
                  for row in self.source_configurations
                  if row["configuration_code"] in EXPECTED_MAPPING
              },
              EXPECTED_MAPPING,
          )''',
                  '''        registered_pairs = {
              (row["configuration_code"], row["source_code"])
              for row in self.source_configurations
          }
          self.assertTrue(set(EXPECTED_MAPPING.items()) <= registered_pairs)''',
              ),
          }
          for filename, (before, after) in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if text.count(before) != 1:
                  raise SystemExit(f"expected one mapping assertion in {filename}")
              path.write_text(text.replace(before, after), encoding="utf-8")
          PY
          git checkout origin/main -- .github/workflows/configuration-shortlist-html.yml
          python -m unittest -v \
            tests.test_sandero_50_kmh_noise_level_values \
            tests.test_sandero_euro_6e_bis_values \
            tests.test_sandero_front_wheel_drive_values \
            tests.test_sandero_number_of_doors_values \
            tests.test_sandero_exterior_colour_values \
            tests.test_sandero_standard_tyre_specification \
            tests.test_sandero_total_valve_count_model
      - name: Commit contract updates and workflow restoration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/workflows/configuration-shortlist-html.yml \
            tests/test_sandero_50_kmh_noise_level_values.py \
            tests/test_sandero_euro_6e_bis_values.py \
            tests/test_sandero_front_wheel_drive_values.py \
            tests/test_sandero_number_of_doors_values.py \
            tests/test_sandero_exterior_colour_values.py \
            tests/test_sandero_standard_tyre_specification.py \
            tests/test_sandero_total_valve_count_model.py
          git commit -m 'Test additive configuration source mappings'
          git push origin HEAD:agent/register-sandero-stepway-price-20260703
