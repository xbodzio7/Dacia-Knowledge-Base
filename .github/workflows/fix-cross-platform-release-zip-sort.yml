name: Fix Cross-Platform Release ZIP Sort

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/_fix_cross_platform_release_zip_sort.py
      - .github/workflows/fix-cross-platform-release-zip-sort.yml

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/verified-data-product-release-download
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply normalized ZIP sort
        run: python tools/_fix_cross_platform_release_zip_sort.py
      - name: Run focused regression tests
        run: python -m unittest -q tests.test_data_product_release_download tests.test_data_product_release
      - name: Verify project state
        run: python tools/project_state.py --check
      - name: Upload verified fix files
        uses: actions/upload-artifact@v7
        with:
          name: cross-platform-release-zip-sort-fix
          path: |
            .github/workflows/data-product-release-download.yml
            project/packages/verified-data-product-release-download-cli.md
            tools/reporting/data_product_release_model.py
          if-no-files-found: error
          retention-days: 7
