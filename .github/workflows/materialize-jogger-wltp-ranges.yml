name: Diagnose Jogger WLTP Materializer

on:
  push:
    branches:
      - data/jogger-wltp-efficiency-ranges

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: data/jogger-wltp-efficiency-ranges
          fetch-depth: 0
      - name: Inspect materialization anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          checks = {
              'baseline_dataclass': (
                  'tools/documentation_baseline.py',
                  '    configuration_values: int\n    configuration_import_specs: int\n',
              ),
              'baseline_values_read': (
                  'tools/documentation_baseline.py',
                  '    values = read_csv_rows(master / "configuration_attribute_values.csv")\n    availability = read_csv_rows(\n',
              ),
              'baseline_import_dir': (
                  'tools/documentation_baseline.py',
                  '    import_dir = repository / "data" / "imports" / "configuration_values"\n    if not import_dir.is_dir():\n        raise BaselineError(f"import directory does not exist: {import_dir}")\n',
              ),
              'baseline_constructor': (
                  'tools/documentation_baseline.py',
                  '        configuration_values=len(values),\n        configuration_import_specs=len(list(import_dir.glob("*.json"))),\n',
              ),
              'baseline_payload': (
                  'tools/documentation_baseline.py',
                  '            "values": value.configuration_values,\n            "import_specs": value.configuration_import_specs,\n',
              ),
              'baseline_markdown': (
                  'tools/documentation_baseline.py',
                  '        ("Configuration import specs", value.configuration_import_specs),\n',
              ),
              'baseline_readme': (
                  'tools/documentation_baseline.py',
                  '            f"{value.configuration_import_specs}\n"\n            "deklaratywnych specyfikacji importu oraz "\n',
              ),
              'baseline_changelog': (
                  'tools/documentation_baseline.py',
                  '                    "* Declarative configuration-value imports now contain "\n',
              ),
              'baseline_session': (
                  'tools/documentation_baseline.py',
                  '                    f"- {value.configuration_import_specs} wersjonowanych "\n                    "specyfikacji w `data/imports/configuration_values`,"\n',
              ),
              'baseline_print': (
                  'tools/documentation_baseline.py',
                  '    print(f"Import specs         : {value.configuration_import_specs}")\n',
              ),
              'state_mapping': (
                  'tools/project_state.py',
                  '    "configuration_import_specs": "configuration_import_specs",\n',
              ),
              'state_summary': (
                  'tools/project_state.py',
                  '            "- Configuration import specifications: "\n',
              ),
              'fixture_assertion': (
                  'tests/test_documentation_baseline.py',
                  '        self.assertEqual(value.configuration_import_specs, 2)\n',
              ),
          }

          lines = ['# Jogger WLTP materializer diagnostic', '']
          failed = []
          for name, (path, anchor) in checks.items():
              text = Path(path).read_text(encoding='utf-8')
              count = text.count(anchor)
              lines.append(f'- {name}: count={count}')
              if count != 1:
                  failed.append(name)
          lines.extend(['', f'failed={failed!r}'])
          Path('project/reviews/jogger-wltp-materializer-diagnostic.txt').write_text(
              '\n'.join(lines) + '\n', encoding='utf-8'
          )
          PY
      - name: Commit diagnostic and remove workflow
        shell: bash
        run: |
          rm .github/workflows/materialize-jogger-wltp-ranges.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add project/reviews/jogger-wltp-materializer-diagnostic.txt .github/workflows/materialize-jogger-wltp-ranges.yml
          git commit -m "Record Jogger WLTP materializer diagnostic"
          git push origin HEAD:data/jogger-wltp-efficiency-ranges
