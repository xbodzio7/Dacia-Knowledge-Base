name: Jogger Technical Payload

on:
  push:
    branches:
      - data/jogger-my26-technical-specifications

permissions:
  contents: write

concurrency:
  group: jogger-technical-payload
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-my26-technical-specifications
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Materialize exact package patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import lzma
          import subprocess
          from pathlib import Path

          root = Path.cwd()
          payload_dir = root / ".github" / "jogger-technical-payload"
          paths = sorted(payload_dir.glob("part-*.txt"))
          expected = {
              "part-00.txt": "11f2219c291d58f35b7026da27805fec92e1554e33467cab14702b28e0f508a6",
              "part-01.txt": "7c5bec8bb51e51a5ca0f713ef52a629d6df01181ec688a2e34802f9cb0e81b95",
              "part-02.txt": "baf53156c89ca635bdaf1eda8d932705beddfc00e2a6fc7150f1808a3bab706d",
              "part-03.txt": "1a166ab6bc1c78fcd5f80d5ad6bf6af5bcf918439c0662a4883c8150a57aabf4",
          }
          if [path.name for path in paths] != list(expected):
              raise SystemExit(f"unexpected payload parts: {[path.name for path in paths]}")
          chunks = []
          for path in paths:
              data = path.read_bytes()
              actual = hashlib.sha256(data).hexdigest()
              if actual != expected[path.name]:
                  raise SystemExit(f"payload hash mismatch for {path.name}: {actual}")
              chunks.append(data.decode("ascii"))
          encoded = "".join(chunks)
          if len(encoded) != 15810:
              raise SystemExit(f"unexpected encoded payload length: {len(encoded)}")
          patch = lzma.decompress(base64.b85decode(encoded.encode("ascii")))
          actual_patch = hashlib.sha256(patch).hexdigest()
          expected_patch = "0c721edd1e66b80baaedb920e06191a32066ea937afdc3813d44925ab5c6be75"
          if actual_patch != expected_patch or len(patch) != 175682:
              raise SystemExit(f"patch contract mismatch: {actual_patch}, {len(patch)}")
          subprocess.run(
              ["git", "apply", "--check", "--whitespace=nowarn", "-"],
              cwd=root,
              input=patch,
              check=True,
          )
          subprocess.run(
              ["git", "apply", "--whitespace=nowarn", "-"],
              cwd=root,
              input=patch,
              check=True,
          )
          PY

      - name: Verify materialized package
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi
          python -m compileall -q tools scripts tests
          python -m unittest discover -s tests -p "test_*.py" -q
          python -m unittest -q \
            tests.project_state_contract \
            tests.autonomy_policy_contract \
            tests.quality_artifact_manifest_contract \
            tests.configuration_comparison_context_filter_contract \
            tests.configuration_comparison_pair_summary_contract
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python tools/dkb.py quality \
            --concise \
            --database "${RUNNER_TEMP}/dacia_knowledge_base.sqlite" \
            --log-file "${RUNNER_TEMP}/quality.log" \
            --summary-json "${RUNNER_TEMP}/quality-summary.json"

      - name: Commit final package and remove transport files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/jogger-technical-payload
          rm .github/workflows/jogger-technical-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          test "$(git diff --cached --name-only | wc -l)" -eq 28
          git commit -m "data: import Jogger MY26 technical specifications"
          git push origin HEAD:data/jogger-my26-technical-specifications
