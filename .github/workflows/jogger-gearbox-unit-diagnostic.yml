name: Jogger Gearbox Unit Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-gearbox-reconciliation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Capture buffered unit-test result
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" -b -v \
            > project/reviews/jogger-gearbox-unit-diagnostic.log 2>&1
          status=$?
          rm .github/workflows/jogger-gearbox-unit-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: capture Jogger gearbox unit diagnostic"
          git push origin HEAD:data/jogger-gearbox-reconciliation
          exit "$status"
