name: Configuration Comparison Workbook

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run workbook regression tests
        shell: bash
        run: python -m unittest -v tests.test_configuration_comparison_workbook
      - name: Generate fixture comparison bundle
        shell: bash
        env:
          BUNDLE_DIR: ${{ runner.temp }}/configuration-workbook-bundle
        run: >-
          python tools/configuration_comparison_bundle.py
          --configuration-code sandero_stepway_iii_expression_ecog120_automatic
          --configuration-code sandero_stepway_iii_extreme_ecog120_automatic
          --configuration-code jogger_extreme_5seat_ecog120_automatic
          --configuration-code jogger_journey_5seat_ecog120_automatic
          --configuration-code duster_iii_expression_ecog100_4x2_manual
          --output-directory "${BUNDLE_DIR}"
      - name: Record workbook SHA-256
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import os
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"])
          workbook = (
              root
              / "configuration-workbook-bundle"
              / "configuration-comparison-workbook.xlsx"
          )
          digest = hashlib.sha256(workbook.read_bytes()).hexdigest()
          (root / "configuration-workbook.sha256").write_text(
              digest + "\n",
              encoding="utf-8",
          )
          print(digest)
          PY
      - name: Upload platform workbook
        uses: actions/upload-artifact@v7
        with:
          name: configuration-comparison-workbook-${{ matrix.label }}
          path: |
            ${{ runner.temp }}/configuration-workbook-bundle/configuration-comparison-workbook.xlsx
            ${{ runner.temp }}/configuration-workbook.sha256
          if-no-files-found: error
          retention-days: 7

  verify-cross-platform:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Download Linux workbook
        uses: actions/download-artifact@v7
        with:
          name: configuration-comparison-workbook-linux
          path: ${{ runner.temp }}/linux
      - name: Download Windows workbook
        uses: actions/download-artifact@v7
        with:
          name: configuration-comparison-workbook-windows
          path: ${{ runner.temp }}/windows
      - name: Verify byte-identical workbooks
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import os
          import sys
          from pathlib import Path

          repository = Path.cwd()
          sys.path.insert(0, str(repository / "tools"))
          from reporting.deterministic_xlsx_sheet import read_workbook

          root = Path(os.environ["RUNNER_TEMP"])
          linux = next((root / "linux").rglob("*.xlsx"))
          windows = next((root / "windows").rglob("*.xlsx"))
          linux_bytes = linux.read_bytes()
          windows_bytes = windows.read_bytes()
          assert linux_bytes == windows_bytes
          digest = hashlib.sha256(linux_bytes).hexdigest()
          for directory in (root / "linux", root / "windows"):
              recorded = next(directory.rglob("*.sha256")).read_text(
                  encoding="utf-8"
              ).strip()
              assert recorded == digest
          expected = (
              "Overview",
              "Scopes",
              "Configurations",
              "Comparisons",
              "Sources",
              "Artifacts",
          )
          assert tuple(read_workbook(linux)) == expected
          assert tuple(read_workbook(windows)) == expected
          print(digest)
          PY
