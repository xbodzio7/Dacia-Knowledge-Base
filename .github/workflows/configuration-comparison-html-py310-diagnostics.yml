name: Configuration Comparison HTML Python 3.10 Diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'product/configuration-comparison-html'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Run verbose unit suite
        id: tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v > "${RUNNER_TEMP}/unit-tests-py310.log" 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test log
        uses: actions/upload-artifact@v7
        with:
          name: configuration-comparison-html-py310-diagnostics
          path: ${{ runner.temp }}/unit-tests-py310.log
          if-no-files-found: error
          retention-days: 1
      - name: Fail when tests failed
        if: steps.tests.outputs.status != '0'
        run: exit 1
