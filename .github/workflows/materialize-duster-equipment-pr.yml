name: Repair Duster equipment regression contracts

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'dev/duster-equipment-materialize'
    runs-on: ubuntu-latest
    steps:
      - name: Check out package branch
        uses: actions/checkout@v7
        with:
          ref: data/duster-equipment-availability-import
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Scope historical availability contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          availability_files = [
              'tests/test_sandero_50_kmh_noise_level_model.py',
              'tests/test_sandero_50_kmh_noise_level_values.py',
              'tests/test_sandero_euro_6e_bis_model.py',
              'tests/test_sandero_euro_6e_bis_values.py',
              'tests/test_sandero_exterior_colour_values.py',
              'tests/test_sandero_front_wheel_drive_values.py',
              'tests/test_sandero_maximum_payload_model.py',
              'tests/test_sandero_number_of_doors_values.py',
              'tests/test_sandero_standard_tyre_specification.py',
              'tests/test_sandero_total_valve_count_model.py',
          ]
          old = 'self.assertEqual(len(self.availability), 419)'
          new = '''self.assertEqual(
                      len([
                          row for row in self.availability
                          if not row["configuration_code"].startswith("duster_iii_")
                      ]),
                      419,
                  )'''
          for name in availability_files:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{name}: expected one global availability assertion')
              path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          path = Path('tests/test_sandero_passive_safety_availability.py')
          text = path.read_text(encoding='utf-8')
          old = 'self.assertEqual(len(self.all_rows), 419)'
          new = '''self.assertEqual(
                      len([
                          row for row in self.all_rows
                          if not row["configuration_code"].startswith("duster_iii_")
                      ]),
                      419,
                  )'''
          if text.count(old) != 1:
              raise SystemExit('passive-safety global assertion not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          path = Path('tests/test_sandero_equipment_availability.py')
          text = path.read_text(encoding='utf-8')
          old = '''        cls.attributes = read_rows(ATTRIBUTES_PATH)
                  cls.rows = read_rows(AVAILABILITY_PATH)
          '''
          new = '''        cls.attributes = read_rows(ATTRIBUTES_PATH)
                  cls.rows = [
                      row for row in read_rows(AVAILABILITY_PATH)
                      if row["configuration_code"] in EXPECTED_CONFIGURATION_COUNTS
                  ]
          '''
          if text.count(old) != 1:
              raise SystemExit('Sandero equipment setup not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          path = Path('tests/test_duster_catalog_bootstrap.py')
          text = path.read_text(encoding='utf-8')
          old = '''    def test_catalog_configurations_have_no_equipment_availability_yet(self) -> None:
                  configuration_codes = set(self.expected)
                  self.assertFalse(
                      [
                          row for row in rows("configuration_attribute_availability.csv")
                          if row["configuration_code"] in configuration_codes
                      ],
                  )
          '''
          new = '''    def test_catalog_identity_remains_valid_after_equipment_enrichment(self) -> None:
                  configuration_codes = set(self.expected)
                  availability = [
                      row for row in rows("configuration_attribute_availability.csv")
                      if row["configuration_code"].startswith("duster_iii_")
                  ]
                  self.assertTrue(
                      all(row["configuration_code"] in configuration_codes for row in availability)
                  )
          '''
          if text.count(old) != 1:
              raise SystemExit('Duster bootstrap availability assertion not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
          PY

      - name: Run full regression suite
        run: python -m unittest discover -s tests -p "test_*.py" -q

      - name: Publish clean repair commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests
          git diff --cached --check
          tree=$(git write-tree)
          parent=$(git rev-parse origin/data/duster-equipment-availability-import)
          commit=$(printf '%s\n' 'Scope historical availability regression contracts' | git commit-tree "$tree" -p "$parent")
          git push origin "$commit":refs/heads/data/duster-equipment-availability-import
