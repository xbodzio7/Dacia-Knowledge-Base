name: Current Main Release Candidate Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TESTED_MAIN_SHA: 653ddacf9dcaeefa356f53e3c00e71666f5c5b3e
      RELEASE_VERSION: 1.0.0
      RELEASE_DIR: current-main-candidate
    steps:
      - name: Check out exact current main
        uses: actions/checkout@v7
        with:
          ref: 653ddacf9dcaeefa356f53e3c00e71666f5c5b3e
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Reconfirm release identity availability
        shell: bash
        run: |
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            > releases.json
          gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/data-products-v" \
            > data-product-tags.json
      - name: Build exact current main candidate
        run: |
          python tools/data_product_release.py \
            --version "${RELEASE_VERSION}" \
            --commit-sha "${TESTED_MAIN_SHA}" \
            --output-directory "${RELEASE_DIR}"
      - name: Verify exact current main candidate
        run: |
          python tools/data_product_release.py \
            --verify \
            --version "${RELEASE_VERSION}" \
            --commit-sha "${TESTED_MAIN_SHA}" \
            --output-directory "${RELEASE_DIR}"
      - name: Summarize exact current main candidate
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          releases = json.loads(Path("releases.json").read_text())
          tags = json.loads(Path("data-product-tags.json").read_text())
          root = Path(os.environ["RELEASE_DIR"])
          manifest = json.loads(
              (root / "data-product-release-manifest.json").read_text()
          )
          result = {
              "tested_main_sha": os.environ["TESTED_MAIN_SHA"],
              "release_version": os.environ["RELEASE_VERSION"],
              "existing_release_count": len(releases),
              "existing_data_product_tag_count": len(tags),
              "manifest": manifest,
          }
          Path("current-main-summary.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n"
          )
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY
      - name: Upload exact current main evidence
        uses: actions/upload-artifact@v7
        with:
          name: current-main-initial-release-candidate
          path: |
            releases.json
            data-product-tags.json
            current-main-summary.json
            current-main-candidate
          if-no-files-found: error
          retention-days: 7
