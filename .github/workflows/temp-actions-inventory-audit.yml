name: Temporary Actions Inventory Audit

on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'maintenance/github-actions-inventory-correction'
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Audit immutable action references
        shell: python
        run: |
          import json
          import os
          import re
          from collections import Counter, defaultdict
          from pathlib import Path

          helper = Path('.github/workflows/temp-actions-inventory-audit.yml')
          workflow_paths = [
              path
              for path in sorted(Path('.github/workflows').glob('*.yml'))
              if path != helper
          ]
          if len(workflow_paths) != 15:
              raise SystemExit(f'unexpected workflow count: {len(workflow_paths)}')

          pattern = re.compile(
              r'uses:\s+(actions/(?:checkout|setup-python|setup-node|upload-artifact|download-artifact))@([0-9a-f]{40})\s+#\s+(v\d+)'
          )
          movable = re.compile(r'uses:\s+actions/[^@\s]+@(?![0-9a-f]{40}(?:\s|$))')
          counts = Counter()
          pins = defaultdict(set)
          files = defaultdict(list)
          all_matches = []

          for path in workflow_paths:
              text = path.read_text(encoding='utf-8')
              if movable.search(text):
                  raise SystemExit(f'movable GitHub action reference in {path}')
              for action, sha, version in pattern.findall(text):
                  counts[action] += 1
                  pins[action].add((sha, version))
                  files[action].append(path.as_posix())
                  all_matches.append((path.as_posix(), action, sha, version))

          expected_actions = {
              'actions/checkout',
              'actions/setup-python',
              'actions/setup-node',
              'actions/upload-artifact',
              'actions/download-artifact',
          }
          if set(counts) != expected_actions:
              raise SystemExit(f'unexpected action inventory: {sorted(counts)}')
          if any(len(value) != 1 for value in pins.values()):
              raise SystemExit(f'inconsistent pins: {dict(pins)}')

          payload = {
              'workflow_count': len(workflow_paths),
              'total_references': sum(counts.values()),
              'actions': {
                  action: {
                      'count': counts[action],
                      'sha': next(iter(pins[action]))[0],
                      'version_comment': next(iter(pins[action]))[1],
                      'files': sorted(set(files[action])),
                  }
                  for action in sorted(counts)
              },
              'references': [
                  {'path': path, 'action': action, 'sha': sha, 'version_comment': version}
                  for path, action, sha, version in all_matches
              ],
          }
          output = Path(os.environ['RUNNER_TEMP']) / 'actions-inventory-audit'
          output.mkdir(parents=True, exist_ok=True)
          (output / 'inventory.json').write_text(
              json.dumps(payload, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(payload['actions'], indent=2))
          print(f"total_references={payload['total_references']}")

      - name: Upload inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: github-actions-current-inventory
          path: ${{ runner.temp }}/actions-inventory-audit
          if-no-files-found: error
          retention-days: 1
