name: Registered Source Reporting Portfolio Discovery

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  discover:
    if: github.head_ref == 'review/registered-source-reporting-portfolio-completion'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Audit independent reporting scopes
        run: |
          python - <<'PY'
          import csv
          import json
          import sys
          from collections import Counter, defaultdict
          from pathlib import Path

          root = Path.cwd()
          sys.path.insert(0, str(root / "tools"))

          import configuration_completeness
          import configuration_comparison
          import source_coverage

          scopes = [
              ("Sandero Eco-G 120 manual", "sandero", "2026-06-26", "data/reporting/sandero_ecog120_manual_completeness.json", "data/reporting/sandero_ecog120_manual_gap_evidence.json"),
              ("Sandero Stepway Eco-G 120 automatic", "sandero", "2026-06-26", "data/reporting/sandero_stepway_ecog120_automatic_completeness.json", "data/reporting/sandero_stepway_ecog120_automatic_gap_evidence.json"),
              ("Duster mild hybrid 140 4x2", "duster", "2026-02-06", "data/reporting/duster_mildhybrid140_4x2_completeness.json", "data/reporting/duster_mildhybrid140_4x2_gap_evidence.spec"),
              ("Duster mild hybrid 130 4x4", "duster", "2026-02-06", "data/reporting/duster_mildhybrid130_4x4_completeness.json", "data/reporting/duster_mildhybrid130_4x4_gap_evidence.spec"),
              ("Duster mild hybrid 130 4x2", "duster", "2026-02-06", "data/reporting/duster_mildhybrid130_4x2_completeness.json", "data/reporting/duster_mildhybrid130_4x2_gap_evidence.spec"),
              ("Duster Hybrid 155", "duster", "2026-02-06", "data/reporting/duster_hybrid155_completeness.json", "data/reporting/duster_hybrid155_gap_evidence.spec"),
              ("Duster Hybrid 140", "duster", "2026-02-06", "data/reporting/duster_hybrid140_completeness.json", "data/reporting/duster_hybrid140_gap_evidence.spec"),
              ("Duster Eco-G 100", "duster", "2026-02-06", "data/reporting/duster_ecog100_completeness.json", "data/reporting/duster_ecog100_gap_evidence.spec"),
              ("Duster Eco-G 120", "duster", "2026-02-06", "data/reporting/duster_ecog120_completeness.json", "data/reporting/duster_ecog120_gap_evidence.spec"),
              ("Jogger Eco-G 120 automatic", "jogger", "2026-04-01", "data/reporting/jogger_ecog120_automatic_completeness.json", "data/reporting/jogger_ecog120_automatic_gap_evidence.spec"),
              ("Jogger Eco-G 120 manual", "jogger", "2026-04-01", "data/reporting/jogger_ecog120_manual_completeness.json", "data/reporting/jogger_ecog120_manual_gap_evidence.spec"),
              ("Jogger Hybrid 155 automatic", "jogger", "2026-04-01", "data/reporting/jogger_hybrid155_automatic_completeness.json", "data/reporting/jogger_hybrid155_automatic_gap_evidence.spec"),
              ("Jogger TCe 110 manual", "jogger", "2026-04-01", "data/reporting/jogger_tce110_manual_completeness.json", "data/reporting/jogger_tce110_manual_gap_evidence.spec"),
          ]

          def read_rows(path):
              with path.open(encoding="utf-8-sig", newline="") as handle:
                  return list(csv.DictReader(handle))

          active_configurations = {
              row["code"] for row in read_rows(root / "data/master/configurations.csv")
              if row["status"] == "active"
          }
          source_rows = read_rows(root / "data/master/sources.csv")
          active_sources = {row["code"] for row in source_rows if row["status"] == "active"}

          assigned = set()
          assigned_sources = set()
          scope_reports = []
          model_totals = defaultdict(Counter)
          portfolio = Counter()
          evidence_totals = Counter()
          pair_types = Counter()
          range_relations = Counter()

          for name, model, as_of, spec_name, evidence_name in scopes:
              spec_path = root / spec_name
              evidence_path = root / evidence_name
              spec = json.loads(spec_path.read_text(encoding="utf-8"))
              codes = {item["configuration_code"] for item in spec["configurations"]}
              sources = {item["source_code"] for item in spec["configurations"]}
              overlap = assigned & codes
              assert not overlap, (name, sorted(overlap))
              assigned.update(codes)
              assigned_sources.update(sources)

              complete = configuration_completeness.collect_report(root, spec_path, as_of)
              coverage = source_coverage.collect_report(root, spec_path, as_of)
              compared = configuration_comparison.collect_report(root, spec_path, evidence_path, as_of)

              ranged = [
                  item
                  for pair in compared["pairs"]
                  for item in pair["technical"]
                  if "minimum_value" in item["left"] or "minimum_value" in item["right"]
              ]
              scope_range_relations = Counter(item.get("range_relation") for item in ranged)
              scope_pair_types = Counter(pair["pair_type"] for pair in compared["pairs"])

              metrics = Counter({
                  "configurations": complete["scope"]["reporting_configurations"],
                  "sources": complete["scope"]["sources"],
                  "technical_denominator": complete["technical"]["denominator"],
                  "technical_present": complete["technical"]["present"],
                  "technical_missing": complete["technical"]["missing"],
                  "equipment_denominator": complete["equipment"]["denominator"],
                  "equipment_recorded": complete["equipment"]["recorded"],
                  "equipment_missing": complete["equipment"]["missing"],
                  "equipment_standard": complete["equipment"]["standard"],
                  "equipment_optional": complete["equipment"]["optional"],
                  "equipment_not_available": complete["equipment"]["not_available"],
                  "equipment_unknown": complete["equipment"]["unknown"],
                  "prices": coverage["records"]["prices"]["present"],
                  "areas_denominator": coverage["areas"]["denominator"],
                  "areas_covered": coverage["areas"]["covered"],
                  "areas_partial": coverage["areas"]["partial"],
                  "areas_missing": coverage["areas"]["missing"],
                  "sections_denominator": coverage["sections"]["denominator"],
                  "sections_covered": coverage["sections"]["covered"],
                  "sections_partial": coverage["sections"]["partial"],
                  "sections_missing": coverage["sections"]["missing"],
                  "pairs": len(compared["pairs"]),
                  "technical_comparisons": compared["summary"]["technical"]["comparisons"],
                  "technical_equal": compared["summary"]["technical"]["equal"],
                  "technical_different": compared["summary"]["technical"]["different"],
                  "technical_not_comparable": compared["summary"]["technical"]["not_comparable"],
                  "equipment_comparisons": compared["summary"]["equipment"]["comparisons"],
                  "equipment_equal": compared["summary"]["equipment"]["equal"],
                  "equipment_different": compared["summary"]["equipment"]["different"],
                  "equipment_not_comparable": compared["summary"]["equipment"]["not_comparable"],
                  "price_comparisons": compared["summary"]["prices"]["comparisons"],
                  "price_equal": compared["summary"]["prices"]["equal"],
                  "price_different": compared["summary"]["prices"]["different"],
                  "price_not_comparable": compared["summary"]["prices"]["not_comparable"],
                  "total_differences": compared["summary"]["total_differences"],
                  "range_comparisons": len(ranged),
              })
              evidence = Counter(compared["evidence_summary"])
              portfolio.update(metrics)
              model_totals[model].update(metrics)
              evidence_totals.update(evidence)
              pair_types.update(scope_pair_types)
              range_relations.update(scope_range_relations)
              scope_reports.append({
                  "name": name,
                  "model": model,
                  "as_of": as_of,
                  "spec": spec_name,
                  "evidence": evidence_name,
                  "configuration_codes": sorted(codes),
                  "source_codes": sorted(sources),
                  "metrics": dict(metrics),
                  "evidence_summary": dict(evidence),
                  "pair_types": dict(scope_pair_types),
                  "range_relations": dict(scope_range_relations),
              })

          assert assigned == active_configurations, {
              "missing": sorted(active_configurations - assigned),
              "extra": sorted(assigned - active_configurations),
          }
          assert assigned_sources == active_sources, {
              "unused_sources": sorted(active_sources - assigned_sources),
              "unknown_sources": sorted(assigned_sources - active_sources),
          }
          assert portfolio["configurations"] == 53
          assert portfolio["sources"] >= len(active_sources)

          output = {
              "scope_count": len(scopes),
              "active_configuration_count": len(active_configurations),
              "assigned_configuration_count": len(assigned),
              "active_source_count": len(active_sources),
              "assigned_source_count": len(assigned_sources),
              "unassigned_configurations": sorted(active_configurations - assigned),
              "unused_active_sources": sorted(active_sources - assigned_sources),
              "portfolio": dict(portfolio),
              "evidence_summary": dict(evidence_totals),
              "pair_types": dict(pair_types),
              "range_relations": dict(range_relations),
              "models": {model: dict(metrics) for model, metrics in sorted(model_totals.items())},
              "scopes": scope_reports,
              "sources": [
                  {
                      "code": row["code"],
                      "title": row["title"],
                      "document_date": row["document_date"],
                      "status": row["status"],
                  }
                  for row in source_rows
              ],
          }
          path = Path("registered-source-reporting-portfolio.json")
          path.write_text(json.dumps(output, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(path.read_text(encoding="utf-8"))
          PY
      - name: Upload discovery artifact
        uses: actions/upload-artifact@v7
        with:
          name: registered-source-reporting-portfolio
          path: registered-source-reporting-portfolio.json
          if-no-files-found: error
          retention-days: 1
