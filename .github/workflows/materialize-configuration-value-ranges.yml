name: Materialize Configuration Value Ranges

on:
  push:
    branches:
      - architecture/configuration-value-ranges

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: architecture/configuration-value-ranges
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install PDF extraction backend
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils
      - name: Connect range architecture
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def patch(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'patch anchor not found: {path}: {old[:100]!r}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          audit = Path('project/reviews/range-architecture-audit.txt')
          if audit.exists():
              audit.unlink()

          patch(
              'tools/dkb.py',
              '    "import-configuration-values": (\n'
              '        "import_configuration_values.py",\n'
              '        "Apply or verify one declarative configuration-value import.",\n'
              '        "--spec FILE [--apply | --verify] [--skip-source-text] "\n'
              '        "[--skip-source-files]",\n'
              '    ),\n',
              '    "import-configuration-values": (\n'
              '        "import_configuration_values.py",\n'
              '        "Apply or verify one declarative configuration-value import.",\n'
              '        "--spec FILE [--apply | --verify] [--skip-source-text] "\n'
              '        "[--skip-source-files]",\n'
              '    ),\n'
              '    "import-configuration-value-ranges": (\n'
              '        "import_configuration_value_ranges.py",\n'
              '        "Apply or verify one declarative configuration-value range import.",\n'
              '        "--spec FILE [--apply | --verify] [--skip-source-text] "\n'
              '        "[--skip-source-files]",\n'
              '    ),\n',
          )

          patch(
              'tools/validators/references.py',
              'try:\n'
              '    from validators.enum_domains import validate_enum_domains\n'
              'except ModuleNotFoundError:  # package import in unit tests\n'
              '    from tools.validators.enum_domains import validate_enum_domains\n',
              'try:\n'
              '    from validators.enum_domains import validate_enum_domains\n'
              '    from validators.value_ranges import validate_configuration_value_ranges\n'
              'except ModuleNotFoundError:  # package import in unit tests\n'
              '    from tools.validators.enum_domains import validate_enum_domains\n'
              '    from tools.validators.value_ranges import validate_configuration_value_ranges\n',
          )
          patch(
              'tools/validators/references.py',
              '    _, enum_errors = validate_enum_domains(root)\n'
              '    errors.extend(enum_errors)\n'
              '    return errors\n',
              '    _, enum_errors = validate_enum_domains(root)\n'
              '    errors.extend(enum_errors)\n'
              '    _, range_errors = validate_configuration_value_ranges(root)\n'
              '    errors.extend(range_errors)\n'
              '    return errors\n',
          )

          state = {
              'version': 1,
              'updated_on': '2026-07-19',
              'repository': {
                  'full_name': 'xbodzio7/Dacia-Knowledge-Base',
                  'default_branch': 'main',
                  'source_of_truth': 'repository',
                  'main_sha_tracking': 'dynamic',
              },
              'phase': 'Source-Backed Model Expansion',
              'reference_delivery': {
                  'name': 'Attribute Enum Domain Registry and Jogger Battery Chemistry',
                  'pull_request': 120,
                  'head_sha': 'b5c5520822474fe3c76987485540133b3a2c8b9a',
                  'quality_run': 514,
              },
              'baseline': {
                  'tests': 512,
                  'csv_files': 37,
                  'rows': 3845,
                  'configuration_values': 1204,
                  'configuration_import_specs': 71,
                  'availability_records': 1811,
                  'attributes': 357,
                  'attribute_categories': 30,
              },
              'current_package': {
                  'name': 'Configuration Value Range Storage and Import Architecture',
                  'status': 'active',
                  'goal': 'Add a separate header-only numeric range table, strict declarative importer, global validation and automatic SQLite support without changing scalar observations.',
              },
              'next_package': {
                  'name': 'Configuration Value Range Reporting Integration',
                  'status': 'planned',
                  'goal': 'Integrate ranges with completeness, source coverage and comparison states for identical, overlapping and disjoint evidence before importing Jogger ranges.',
              },
              'autonomy': {
                  'mode': 'autonomous_until_action_required',
                  'allowed_operations': [
                      'create_package_branch',
                      'modify_manifest_paths',
                      'run_tests_and_quality',
                      'create_package_commit',
                      'push_package_branch',
                      'create_and_update_pull_request',
                      'repair_in_scope_ci_failures',
                      'merge_green_pull_request',
                      'update_project_state_and_generated_documentation',
                  ],
                  'stop_conditions': [
                      'missing_source_file_or_local_access',
                      'authentication_mfa_secret_or_new_permission',
                      'ambiguous_source_evidence',
                      'new_domain_or_architecture_decision',
                      'scope_expansion_beyond_current_milestone',
                      'destructive_costly_or_irreversible_operation',
                      'manual_github_policy_block',
                      'conflict_not_resolvable_from_repository_evidence',
                  ],
                  'action_required_fields': [
                      'reason',
                      'required_action',
                      'options_and_consequences',
                      'resume_stage',
                  ],
              },
              'review_policy': {
                  'review_only_pull_requests': 'exception_only',
                  'milestone_review_interval_packages': 5,
                  'one_logical_package_per_pull_request': True,
                  'delete_remote_branches_automatically': False,
              },
          }
          Path('project/state.json').write_text(
              json.dumps(state, indent=2, ensure_ascii=False) + '\n', encoding='utf-8'
          )
          PY
          python tools/dkb.py project-state --apply
          python tools/dkb.py documentation-baseline --apply
      - name: Verify complete architecture
        id: verify
        shell: bash
        run: |
          set +e
          {
            python -m compileall -q tools scripts tests
            python -m unittest discover -s tests -p 'test_*.py' -q
            python tools/dkb.py project-state --check
            python tools/dkb.py quality --concise --database "${RUNNER_TEMP}/dacia.sqlite"
          } > project/reviews/configuration-value-range-validation.log 2>&1
          status=$?
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Finalize package
        shell: bash
        run: |
          if [ "${{ steps.verify.outputs.status }}" = "0" ]; then
            rm -f project/reviews/configuration-value-range-validation.log
            python - <<'PY'
          from pathlib import Path
          path = Path('project/reviews/configuration-value-range-storage-and-import-architecture.md')
          text = path.read_text(encoding='utf-8').replace('`IMPLEMENTING`', '`IMPLEMENTED`', 1)
          text += '\n## Local validation\n\nThe package passed 512 tests, canonical-state verification and the complete local Quality gate before removing its temporary workflow.\n'
          path.write_text(text, encoding='utf-8')
          PY
          fi
          rm -f .github/workflows/materialize-configuration-value-ranges.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Materialize configuration value range architecture"
          git push origin HEAD:architecture/configuration-value-ranges
          if [ "${{ steps.verify.outputs.status }}" != "0" ]; then
            exit 1
          fi
