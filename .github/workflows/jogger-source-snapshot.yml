name: Jogger Payload Applicator

on:
  push:
    branches:
      - data/jogger-my26-catalogue-entity-foundation
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-my26-catalogue-entity-foundation
          show-progress: false

      - name: Apply verified deterministic payload
        shell: bash
        run: |
          exec > >(tee "${RUNNER_TEMP}/jogger-apply.log") 2>&1
          set -euxo pipefail
          if [[ ! -f .jogger-payload.ready ]]; then
            echo "Payload is not complete; nothing to apply."
            exit 0
          fi
          cat .jogger-payload.part* > "${RUNNER_TEMP}/jogger-payload.b64"
          test "$(wc -c < "${RUNNER_TEMP}/jogger-payload.b64")" -eq 57088
          echo "b438e81995e8ac88b22f3344f05f83802ff748e009d236e3fee068287862fb0b  ${RUNNER_TEMP}/jogger-payload.b64" | sha256sum --check
          base64 --decode "${RUNNER_TEMP}/jogger-payload.b64" > "${RUNNER_TEMP}/jogger-payload.tar.gz"
          echo "fa186435c5ff12cd289e9825bf035cbcd003ca9e52fd951cdd455f5235c50f52  ${RUNNER_TEMP}/jogger-payload.tar.gz" | sha256sum --check
          tar -tzf "${RUNNER_TEMP}/jogger-payload.tar.gz"
          tar -xzf "${RUNNER_TEMP}/jogger-payload.tar.gz"
          rm .jogger-payload.part* .jogger-payload.ready
          rm .github/workflows/jogger-source-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git diff --cached --check
          git commit -m "data: materialize Jogger MY26 catalogue foundation"
          git push origin HEAD:data/jogger-my26-catalogue-entity-foundation

      - name: Upload applicator diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jogger-payload-applicator-diagnostics
          path: ${{ runner.temp }}/jogger-apply.log
          if-no-files-found: warn
          retention-days: 1
