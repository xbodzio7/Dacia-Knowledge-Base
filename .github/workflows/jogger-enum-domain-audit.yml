name: Jogger Enum Domain Audit

on:
  push:
    branches:
      - architecture/attribute-enum-domains

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out architecture branch
        uses: actions/checkout@v4
        with:
          ref: architecture/attribute-enum-domains
          fetch-depth: 0
      - name: Capture enum-domain migration evidence
        shell: bash
        run: |
          python - <<'PY'
          import csv
          from collections import defaultdict
          from pathlib import Path

          root = Path('.')
          master = root / 'data' / 'master'

          def rows(path):
              with path.open(encoding='utf-8-sig', newline='') as handle:
                  return list(csv.DictReader(handle))

          attributes = {r['code']: r for r in rows(master / 'attributes.csv')}
          values = rows(master / 'configuration_attribute_values.csv')
          enum_files = sorted((master / 'enums').glob('*.csv'))
          enum_codes = {}
          for path in enum_files:
              enum_codes[path.name] = {r['code'] for r in rows(path)}

          used = defaultdict(set)
          counts = defaultdict(int)
          for row in values:
              code = row['attribute_code']
              if attributes.get(code, {}).get('data_type') == 'enum':
                  used[code].add(row['value'])
                  counts[code] += 1

          lines = ['# Enum attributes with configuration values', '']
          for code in sorted(used):
              vals = sorted(used[code])
              matches = [name for name, codes in enum_codes.items() if set(vals) <= codes]
              lines.append(f'## {code}')
              lines.append(f'- observations: {counts[code]}')
              lines.append(f'- values: {", ".join(vals)}')
              lines.append(f'- matching enum files: {", ".join(matches) if matches else "NONE"}')
              lines.append('')

          lines.extend(['# All enum attributes', ''])
          for code, row in sorted(attributes.items()):
              if row['data_type'] == 'enum':
                  lines.append(f'- {code}: observations={counts.get(code, 0)}')

          lines.extend(['', '# Enum files', ''])
          for name in sorted(enum_codes):
              lines.append(f'- {name}: {", ".join(sorted(enum_codes[name]))}')

          out = root / 'project' / 'reviews' / 'jogger-enum-domain-audit.txt'
          out.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Commit audit and remove workflow
        shell: bash
        run: |
          rm .github/workflows/jogger-enum-domain-audit.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add project/reviews/jogger-enum-domain-audit.txt .github/workflows/jogger-enum-domain-audit.yml
          git commit -m "Record enum-domain migration audit"
          git push origin HEAD:architecture/attribute-enum-domains
