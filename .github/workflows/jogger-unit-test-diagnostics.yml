name: Jogger Unit Test Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Run and capture unit tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" -q 2>&1 \
            | tee "${RUNNER_TEMP}/unit-tests.log"

      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jogger-unit-test-diagnostics
          path: ${{ runner.temp }}/unit-tests.log
          if-no-files-found: error
          retention-days: 1
