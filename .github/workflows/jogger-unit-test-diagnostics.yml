name: Jogger Test Contract Applicator

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-my26-catalogue-entity-foundation

      - name: Update repository-total assertions and remove applicator
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_duster_catalog_bootstrap.py")
          text = path.read_text(encoding="utf-8")
          old = '''        self.assertEqual(scope["repository_status_configurations"], 31)
                  self.assertEqual(scope["excluded_configurations"], 24)
                  self.assertEqual(
                      set(scope["excluded_configuration_codes"]),
                      set(self.expected),
                  )'''
          new = '''        self.assertEqual(scope["repository_status_configurations"], 53)
                  self.assertEqual(scope["excluded_configurations"], 46)
                  self.assertTrue(
                      set(self.expected).issubset(scope["excluded_configuration_codes"])
                  )'''
          if old not in text:
              raise SystemExit("Duster catalogue assertion block not found")
          path.write_text(text.replace(old, new), encoding="utf-8")

          path = Path("tests/test_duster_technical_specifications.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '        self.assertEqual(report["scope"]["repository_status_configurations"], 31)\n'
              '        self.assertEqual(report["scope"]["excluded_configurations"], 24)',
              '        self.assertEqual(report["scope"]["repository_status_configurations"], 53)\n'
              '        self.assertEqual(report["scope"]["excluded_configurations"], 46)',
          )
          text = text.replace(
              '        self.assertEqual(len(self.all_values), 702)',
              '        self.assertEqual(len(self.all_values), 724)',
          )
          path.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/jogger-unit-test-diagnostics.yml
          python -m unittest -q \
            tests.test_duster_catalog_bootstrap \
            tests.test_duster_technical_specifications \
            tests.test_jogger_catalogue_entity_foundation
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: generalize Duster repository totals for Jogger"
          git push origin HEAD:data/jogger-my26-catalogue-entity-foundation
