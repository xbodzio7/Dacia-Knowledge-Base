name: Jogger Gearbox Finalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: jogger-gearbox-finalize
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: data/jogger-gearbox-reconciliation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDF extraction backend
        run: |
          if ! command -v pdftotext >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends poppler-utils
          fi

      - name: Bound original Jogger technical specification set
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_jogger_technical_specifications.py")
          text = path.read_text(encoding="utf-8")
          old = '            if path.name != "jogger-page6-injection-type-20260401.json"\n'
          new = (
              '            if path.name not in {\n'
              '                "jogger-page6-injection-type-20260401.json",\n'
              '                "jogger-page6-gearbox-type-20260401.json",\n'
              '                "jogger-page6-gear-count-20260401.json",\n'
              '            }\n'
          )
          if old not in text:
              raise SystemExit("historical Jogger spec boundary marker not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")
          PY
          rm -f \
            project/reviews/jogger-gearbox-reconciliation-failure.log \
            project/reviews/jogger-gearbox-unit-diagnostic.log

      - name: Verify final package
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q tools scripts tests
          python -m unittest discover -s tests -p "test_*.py" -q
          python -m unittest -q \
            tests.project_state_contract \
            tests.autonomy_policy_contract \
            tests.quality_artifact_manifest_contract \
            tests.configuration_comparison_context_filter_contract \
            tests.configuration_comparison_pair_summary_contract
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python tools/dkb.py quality \
            --concise \
            --database "${RUNNER_TEMP}/dacia_knowledge_base.sqlite" \
            --log-file "${RUNNER_TEMP}/quality.log" \
            --summary-json "${RUNNER_TEMP}/quality-summary.json"

      - name: Commit final package
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/jogger-gearbox-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: bound Jogger technical spec denominator"
          git push origin HEAD:data/jogger-gearbox-reconciliation
