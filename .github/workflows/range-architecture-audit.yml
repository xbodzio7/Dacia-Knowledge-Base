name: Range Architecture Audit

on:
  push:
    branches:
      - architecture/configuration-value-ranges

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out architecture branch
        uses: actions/checkout@v4
        with:
          ref: architecture/configuration-value-ranges
          fetch-depth: 0
      - name: Capture integration surface
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          needles = ('configuration_attribute_values', 'configuration_attribute_values.csv')
          lines = ['# Configuration value consumer audit', '']
          for base in ('tools', 'tests'):
              for path in sorted((root / base).rglob('*.py')):
                  text = path.read_text(encoding='utf-8')
                  matches = [
                      (number, line.rstrip())
                      for number, line in enumerate(text.splitlines(), start=1)
                      if any(needle in line for needle in needles)
                  ]
                  if not matches:
                      continue
                  lines.append(f'## {path.as_posix()}')
                  for number, line in matches[:20]:
                      lines.append(f'{number}: {line}')
                  if len(matches) > 20:
                      lines.append(f'... {len(matches) - 20} more matches')
                  lines.append('')

          lines.extend(['# Master CSV headers', ''])
          for name in ('configuration_attribute_values.csv', 'attributes.csv', 'sources.csv'):
              path = root / 'data/master' / name
              lines.append(f'- {name}: {path.read_text(encoding="utf-8-sig").splitlines()[0]}')

          out = root / 'project/reviews/range-architecture-audit.txt'
          out.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Commit audit and remove workflow
        shell: bash
        run: |
          rm .github/workflows/range-architecture-audit.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add project/reviews/range-architecture-audit.txt .github/workflows/range-architecture-audit.yml
          git commit -m "Record range architecture audit"
          git push origin HEAD:architecture/configuration-value-ranges
