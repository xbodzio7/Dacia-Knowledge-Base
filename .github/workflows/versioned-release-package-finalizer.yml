name: Versioned Release Package Finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'product/versioned-data-product-release-publication'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Finalize package documentation and state
        run: python tools/_finalize_versioned_data_product_release.py
      - name: Verify finalized package
        run: |
          python -m compileall -q tools tests
          python tools/dkb.py project-state --check
          python tools/dkb.py documentation-baseline --check
          python -m unittest -q \
            tests.test_data_product_release \
            tests.test_data_product_release_contracts
      - name: Commit finalized package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md CHANGELOG.md project tests
          if git diff --cached --quiet; then
            echo 'Release package already finalized.'
          else
            git commit -m 'docs: finalize versioned data product release'
            git push origin HEAD:${{ github.head_ref }}
          fi
